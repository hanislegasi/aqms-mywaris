<!DOCTYPE html>

<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AQM Management</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>
body{
font-family: Inter, sans-serif;
}
</style>  
  
</head>

 
<body class="bg-gray-100">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">
AQM Management
</h1>

<p>
Customers Management Centre
</p>

</div>

<div class="max-w-7xl mx-auto p-5">

<a
href="admin-dashboard.html"
class="inline-block bg-gray-200 px-5 py-3 rounded-xl mb-5">

← Dashboard

</a>


<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">

<div class="bg-white p-5 rounded-xl shadow">

<p class="text-gray-500 text-sm">
Jumlah Pelanggan
</p>

<p
id="totalCustomer"
class="text-3xl font-bold">

0

</p>

</div>

<div class="bg-white p-5 rounded-xl shadow">

<p class="text-gray-500 text-sm">
Prospek
</p>

<p
id="prospekCustomer"
class="text-3xl font-bold text-yellow-600">

0

</p>

</div>

<div class="bg-white p-5 rounded-xl shadow">

<p class="text-gray-500 text-sm">
Ahli Aktif
</p>

<p
id="aktifCustomer"
class="text-3xl font-bold text-green-600">

0

</p>

</div>

<div class="bg-white p-5 rounded-xl shadow">

<p class="text-gray-500 text-sm">
Keahlian Tamat
</p>

<p
id="expiredCustomer"
class="text-3xl font-bold text-red-600">

0

</p>

</div>

</div>

  
<div
id="sectionTitle">

<h2
class="text-3xl font-bold mb-4 text-[#153638]">

Pengurusan Pelanggan (AQM)

</h2>

<input
id="searchInput"
type="text"
placeholder="Cari nama, email, no AQM, referral atau tarikh daftar..."
class="w-full p-4 rounded-xl border border-gray-300 shadow-sm mb-6">

</div>

<div
id="listContainer"
class="bg-white rounded-xl shadow overflow-x-auto">

<table class="min-w-full bg-white rounded-xl overflow-hidden">

<thead class="bg-[#153638] text-white sticky top-0">

<tr>
  
<th class="p-3 text-center">Bil</th>
<th class="p-3 text-left">Tarikh Daftar</th>
<th class="p-3 text-left">No AQM</th>
<th class="p-3 text-left">Nama</th>
<th class="p-3 text-left">Email</th>
<th class="p-3 text-left">Referral</th>
<th class="p-3 text-center">Status</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

<script type="module">  

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
getDoc,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:"alqawthar-mywaris.firebaseapp.com",

projectId:"alqawthar-mywaris",

storageBucket:"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:"3498810778",

appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  
const db =
getFirestore(app);

const auth =
getAuth(app);  
  


onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

  
const snapshot =
await getDocs(
collection(db,"users")
);

let html = "";

window.customerHTML = "";

let allCustomers = [];

const users =
snapshot.docs;

users.sort((a,b)=>{

const dateA =
a.data().createdAt?.toDate() || new Date(0);

const dateB =
b.data().createdAt?.toDate() || new Date(0);

return dateB - dateA;

});

let bil = 1;

users.forEach((doc)=>{

let totalCustomer = 0;
let prospek = 0;
let aktif = 0;
let expired = 0;
  
const user = doc.data();

totalCustomer++;

if(user.paymentStatus==="paid"){

aktif++;

}else{

prospek++;

}

if(user.expiryDate){

const expiry =
new Date(user.expiryDate);

if(expiry < new Date()){

expired++;

}

}
  
if(user.role === "admin"){
return;
}

const memberNo = user.memberNo || "-";

const status =
user.paymentStatus === "paid"
? "AHLI AKTIF"
: "PROSPEK";

let registerDate = "-";

if(user.createdAt){

registerDate =
user.createdAt
.toDate()
.toLocaleDateString("ms-MY");

}
  
html += `

<tr
class="border-b hover:bg-gray-50 cursor-pointer"
onclick="window.location='customer-details.html?id=${doc.id}'">

<td class="p-3">
${bil++}
</td>


<td class="p-3">

${registerDate}

</td>

<td class="p-3">

${memberNo}

</td>

<td class="p-3 font-semibold">

${user.nama || "-"}

</td>

<td class="p-3">

${user.email || "-"}

</td>

<td class="p-3">

${user.referral || "-"}

</td>

<td class="p-3 text-center">

<span
class="
px-3 py-1 rounded-full text-xs
${user.paymentStatus==="paid"
? "bg-green-100 text-green-700"
: "bg-yellow-100 text-yellow-700"}">

${status}

</span>

</td>

</tr>

`;
  
});

document.getElementById(
"tableBody"
).innerHTML = html;

document.getElementById(
"totalCustomer"
).innerHTML =
totalCustomer;

document.getElementById(
"prospekCustomer"
).innerHTML =
prospek;

document.getElementById(
"aktifCustomer"
).innerHTML =
aktif;

document.getElementById(
"expiredCustomer"
).innerHTML =
expired;

  
document
.getElementById("searchInput")
.addEventListener("keyup",(e)=>{

const keyword =
e.target.value.toLowerCase();

const rows =
document.querySelectorAll(
"#tableBody tr"
);

rows.forEach((row)=>{

const text =
row.innerText.toLowerCase();

row.style.display =
text.includes(keyword)
? ""
: "none";

});

});
  
window.allCustomers =
allCustomers;  
  
});

</script>

</body>

</html>
