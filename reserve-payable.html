<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

<body class="bg-gray-100">

    <div class="bg-[#153638] text-white p-5">
        <h1 class="text-2xl font-bold">
            Internal Allocation & Reserve
        </h1>
    </div>

    <div class="max-w-7xl mx-auto p-5">

        <a href="accounts-dashboard.html" class="inline-block bg-gray-200 px-5 py-3 rounded-xl mb-5 text-gray-800">
            &larr; Akaun
        </a>

        <!-- Mobile Scroll Instruction (Only visible on small screens) -->
        <div class="flex items-center text-sm text-gray-500 mb-2 md:hidden">
            <svg class="w-4 h-4 mr-2 text-blue-500 animate-pulse flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
            </svg>
            <span>Tatal (scroll) ke kanan untuk melihat jadual penuh.</span>
        </div>

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full min-w-[600px]">
                    <thead class="bg-[#153638] text-white">
                        <tr>
                            <th class="p-3 text-left">Type</th>
                            <th class="p-3 text-left">Payee</th>
                            <th class="p-3 text-right">Amount</th>
                            <th class="p-3 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="payableTable">
                        <!-- Loading placeholder -->
                        <tr>
                            <td colspan="4" class="p-5 text-center text-gray-500">Memuatkan data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Custom Message Box -->
    <div id="customAlert" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4">
        <div class="bg-white p-6 rounded-xl shadow-xl max-w-sm w-full text-center">
            <!-- Icon Background & SVG dynamic update -->
            <div id="alertIconBg" class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 transition-colors">
                <span id="alertIcon">
                    <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </span>
            </div>
            <h3 id="alertTitle" class="text-xl font-bold text-gray-800 mb-2">Berjaya!</h3>
            <p id="alertMessage" class="text-gray-600 mb-6">Mesej di sini</p>
            <button onclick="closeCustomAlert()" class="bg-[#153638] text-white px-6 py-2 rounded-lg w-full font-medium hover:bg-[#0f2728] transition-colors">
                Tutup & Muat Semula
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
            authDomain: "alqawthar-mywaris.firebaseapp.com",
            projectId: "alqawthar-mywaris",
            storageBucket: "alqawthar-mywaris.firebasestorage.app",
            messagingSenderId: "3498810778",
            appId: "1:3498810778:web:ee36e0fe42f76698046e23"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fetch data

let royaltyPayable = 0;
let allowancePayable = 0;
let adminPayable = 0;
let shareholderReserve = 0;
      
       const snap =
await getDocs(
collection(
db,
"companyAllocation"
)
);
        const payable = {};

       snap.forEach((d)=>{

const row =
d.data();

royaltyPayable +=
Number(
row.royalty || 0
);

allowancePayable +=
Number(
row.allowance || 0
);

adminPayable +=
Number(
row.adminOperation || 0
);

shareholderReserve +=
Number(
row.shareholder || 0
);

});

const pvSnap =
await getDocs(
collection(
db,
"paymentVouchers"
)
);

pvSnap.forEach((d)=>{

const pv =
d.data();

if(
pv.status === "PAID"
){

if(
pv.type === "ROYALTY"
){

royaltyPayable -=
Number(
pv.amount || 0
);

}

if(
pv.type === "ALLOWANCE"
){

allowancePayable -=
Number(
pv.amount || 0
);

}

if(
pv.type === "ADMIN"
){

adminPayable -=
Number(
pv.amount || 0
);

}

if(
pv.type === "SHAREHOLDER"
){

shareholderReserve -=
Number(
pv.amount || 0
);

}

}

});

      
        

      
      
      
        

        let html = `
<tr>
<td class="p-3">
Royalty
</td>

<td class="p-3">
<input
id="payee-ROYALTY"
class="border rounded-lg p-2 w-full"
placeholder="Enter payee">
</td>

<td class="p-3 text-right">
RM${royaltyPayable.toFixed(2)}
</td>

<td class="p-3 text-center">
<button
onclick="
generatePV(
'ROYALTY',
document.getElementById("payee-ROYALTY").value,
royaltyPayable
)
"
class="
bg-green-600
text-white
px-4
py-2
rounded-lg
">
Generate PV
</button>
</td>
</tr>


<tr>
<td class="p-3">Allowance</td>

<td class="p-3">
<input
id="payee-ALLOWANCE"
class="border rounded-lg p-2 w-full"
placeholder="Enter payee">
</td>

<td class="p-3 text-right">
RM${allowancePayable.toFixed(2)}
</td>
<td class="p-3 text-center">
<button
onclick="
generatePV(
'ALLOWANCE',
document.getElementById("payee-ALLOWANCE").value,
allowancePayable
)
"
class="
bg-green-600
text-white
px-4
py-2
rounded-lg
">
Generate PV
</button>
</td>
</tr>


<tr>
<td class="p-3">Admin</td>

<td class="p-3">
<input
id="payee-ADMIN"
class="border rounded-lg p-2 w-full"
placeholder="Enter payee">
</td>

<td class="p-3 text-right">
RM${adminPayable.toFixed(2)}
</td>
<td class="p-3 text-center">
<button
onclick="
generatePV(
'ADMIN',
document.getElementById("payee-ADMIN").value,
adminPayable
)
"
class="
bg-green-600
text-white
px-4
py-2
rounded-lg
">
Generate PV
</button>
</td>
</tr>



<tr>
<td class="p-3">Shareholder</td>

<td class="p-3">
<input
id="payee-SHAREHOLDER"
class="border rounded-lg p-2 w-full"
placeholder="Enter payee">
</td>

<td class="p-3 text-right">
RM${shareholderReserve.toFixed(2)}
</td>
<td class="p-3 text-center">
<button
onclick="
generatePV(
'SHAREHOLDER',
document.getElementById("payee-SHAREHOLDER").value,
shareholderReserve
)
"
class="
bg-green-600
text-white
px-4
py-2
rounded-lg
">
Generate PV
</button>
</td>
</tr>
`;

document.getElementById(
"payableTable"
).innerHTML =
html;
        // Fungsi PV yang dikemaskini
     window.generatePV = async (
type,
payee,
amount
) => {

try {

payee = payee.trim();

if(!payee){

alert("Please enter Payee");

return;

}
    
if(amount <= 0){

alert("No payable balance");

return;

}

const currentPeriod =
new Date().getFullYear()
+
"-" +
String(
new Date().getMonth()+1
).padStart(2,"0");
    
const existingPV =
await getDocs(
query(
collection(
db,
"paymentVouchers"
),
where(
"type",
"==",
type
),
where(
"period",
"==",
currentPeriod
)
)
);

if(!existingPV.empty){

alert(
type +
" untuk bulan ini telah dijana"
);

return;

}


    
const pvNo =
"PV-" +
Date.now();

let accountCode = "";
let accountName = "";

if(type==="ALLOWANCE"){
    accountCode="2200";
    accountName="Allowance Payable";
}

if(type==="ADMIN"){
    accountCode="2300";
    accountName="Admin Payable";
}

if(type==="ROYALTY"){
    accountCode="2400";
    accountName="Royalty Payable";
}

if(type==="SHAREHOLDER"){
    accountCode="3100";
    accountName="Shareholder Reserve";
}
    
await addDoc(
collection(
db,
"paymentVouchers"
),
{
pvNo,

type,

accountCode,
accountName,    

period:
currentPeriod,

description:
type +
" " +
currentPeriod,
    
consultantNo:
"-",

consultantName:
payee,

payee,

amount,

status:
"PENDING",

createdAt:
new Date()
}
);


// DR Expense (Allowance/Admin/Royalty)

if(type !== "SHAREHOLDER"){

let expenseCode="";
let expenseName="";

if(type==="ALLOWANCE"){
expenseCode="5200";
expenseName="Allowance Expense";
}

if(type==="ADMIN"){
expenseCode="5300";
expenseName="Admin Expense";
}

if(type==="ROYALTY"){
expenseCode="5400";
expenseName="Royalty Expense";
}

await addDoc(
collection(db,"ledger"),
{
date:new Date(),

accountCode:expenseCode,
account:expenseName,

category:"expense",

description:payee,

debit:amount,

credit:0
});

}


// CR Liability / Equity

await addDoc(
collection(db,"ledger"),
{
date:new Date(),

accountCode,
account:accountName,

category:
type==="SHAREHOLDER"
? "equity"
: "liability",

description:payee,

debit:0,

credit:amount
});
    
    
    
alert(
"Payment Voucher Created"
);

window.location.href =
"payment-voucher.html";

}
catch(err){

console.error(err);

alert(
err.message
);

}

};
            
        // Fungsi tutup custom alert dan muat semula halaman
        window.closeCustomAlert = () => {
            document.getElementById('customAlert').classList.add('hidden');
            location.reload();
        };

    </script>
</body>
</html>
