<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Customer Details
</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800&display=swap"
rel="stylesheet">

</head>

<body
class="bg-gray-100 min-h-screen"
style="font-family: Inter, sans-serif;">

<!-- HEADER -->
<div class="bg-[#153638] text-white p-5 shadow">

<h1 class="text-2xl font-bold">
Maklumat Pelanggan
</h1>

<p class="text-gray-200">
Consultant Client Center
</p>

</div>

<!-- CONTENT -->
<div class="p-5 max-w-5xl mx-auto">

<a
href="consultant-clients.html"
class="inline-block mb-5 bg-gray-200 hover:bg-gray-300 transition text-gray-700 px-5 py-3 rounded-xl font-semibold">

← Kembali ke My Clients
  
</a>
  
<div
id="customerInfo"
class="bg-white rounded-2xl shadow p-6">

<p class="text-gray-500">
Memuatkan data...
</p>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey:
"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:
"alqawthar-mywaris.firebaseapp.com",

projectId:
"alqawthar-mywaris",

storageBucket:
"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:
"3498810778",

appId:
"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);

onAuthStateChanged(auth, async(user)=>{

  if(!user){

    window.location.href =
    "login.html";

    return;

  }

  const userDoc =
  await getDoc(
    doc(
      db,
      "consultants",
      user.uid
    )
  );

  const userData =
  userDoc.data();

  if(userData.role !== "consultant"){

    alert(
      "Akses ditolak"
    );

    window.location.href =
    "index.html";

  }

});

// GET ID
const params =
new URLSearchParams(
window.location.search
);

const userId =
params.get("id");

// LOAD USER
const docSnap =
await getDoc(
doc(db,"consultants",userId)
);

if(docSnap.exists()){

const user =
docSnap.data();

// WASIAT STATUS
const wasiatSnap =
await getDoc(
doc(
db,
"users",
userId,
"wasiat",
"maklumat"
)
);

let wasiatStatus =
"BELUM DIISI";

let docRef = "-";
let approvedDate = "-";
let expiryDate = "-";
let bakiHari = 0;
if(wasiatSnap.exists()){

const wasiatData =
wasiatSnap.data();

wasiatStatus =
wasiatData.status ||
"DRAFT";

docRef =
wasiatData.docRef || "-";

approvedDate =
wasiatData.approvedAt
? new Date(
wasiatData.approvedAt
).toLocaleDateString("ms-MY")
: "-";

expiryDate =
wasiatData.expiryDate
? new Date(
wasiatData.expiryDate
).toLocaleDateString("ms-MY")
: "-";

bakiHari =
expiryDate !== "-"
? Math.ceil(
(
new Date(wasiatData.expiryDate)
- new Date()
)
/
(1000*60*60*24)
)
: 0;
  
}

// HIBAH STATUS
const hibahSnap =
await getDoc(
doc(
db,
"users",
userId,
"hibah",
"maklumat"
)
);

let hibahStatus =
"BELUM DIISI";

if(hibahSnap.exists()){

const hibahData =
hibahSnap.data();

hibahStatus =
hibahData.status ||
"DRAFT";

}

// PUSAKA STATUS
const pusakaSnap =
await getDoc(
doc(
db,
"users",
userId,
"pusaka",
"maklumat"
)
);

let pusakaStatus =
"BELUM DIISI";

if(pusakaSnap.exists()){

const pusakaData =
pusakaSnap.data();

pusakaStatus =
pusakaData.status ||
"DRAFT";

}

document.getElementById(
"customerInfo"
).innerHTML = `

<div class="space-y-6">

<div>

<h2 class="text-3xl font-bold text-[#153638]">
${user.nama || "-"}
</h2>

<p class="text-gray-500">
${user.email || "-"}
</p>

<div class="bg-gray-50 rounded-xl p-5 mt-5">

<h3 class="font-bold mb-3">
Maklumat Keahlian
</h3>

<div class="grid grid-cols-2 gap-4">

<div>
<p class="text-gray-500 text-sm">
No Ahli
</p>
<p id="memberNo"></p>
</div>

<div>
<p class="text-gray-500 text-sm">
Tarikh Daftar
</p>
<p id="memberSince"></p>
</div>

<div>
<p class="text-gray-500 text-sm">
Referral
</p>
<p id="referral"></p>
</div>

<div>
<p class="text-gray-500 text-sm">
Telefon
</p>
<p id="telefon"></p>
</div>

<div>
<p class="text-gray-500 text-sm">
Status
</p>
<p id="memberStatus"></p>
</div>

</div>

</div>

</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-5">


<!-- WASIAT -->
<div class="bg-green-50 border border-green-200 rounded-2xl p-5 shadow-sm">

<div class="flex items-center justify-between mb-4">

<h3 class="font-bold text-green-800 text-lg">
e-Wasiat
</h3>



</div>


<p class="text-sm text-gray-600">
No Dokumen
</p>

<p class="font-semibold mb-3">
${docRef}
</p>


<p class="text-sm text-gray-600">
Tarikh Lulus
</p>

<p class="mb-3">
${approvedDate}
</p>


<p class="text-sm text-gray-600">
Tamat Keahlian
</p>

<p class="mb-3">
${expiryDate}
</p>


<p class="text-sm text-gray-600">
Baki Hari
</p>

<p class="font-bold text-green-700 text-xl">
${bakiHari} Hari
</p>


<div class="mt-4">

<span
class="
bg-green-100 
text-green-700 
px-4 
py-2 
rounded-full 
text-xs 
font-bold
">

${
bakiHari <= 0
? "KEAHLIAN TAMAT"
: wasiatStatus
}

</span>

</div>

</div>



<!-- HIBAH -->
<div class="bg-blue-50 border border-blue-200 rounded-2xl p-5 shadow-sm">

<div class="flex items-center justify-between mb-4">

<h3 class="font-bold text-blue-800 text-lg">
Hibah
</h3>



</div>


<p class="text-sm text-gray-500">
Status Permohonan
</p>


<p class="font-bold text-blue-700 text-xl mt-2">
${hibahStatus}
</p>


<div class="mt-5 bg-white rounded-xl p-3">

<p class="text-xs text-gray-500">
Perancangan Harta
</p>

<p class="font-semibold">
Hibah Keluarga
</p>

</div>


</div>




<!-- HARTA SEPENCARIAN -->
<div class="bg-purple-50 border border-purple-200 rounded-2xl p-5 shadow-sm">


<div class="flex items-center justify-between mb-4">

<h3 class="font-bold text-purple-800 text-lg">
Harta Sepencarian
</h3>



</div>



<p class="text-sm text-gray-500">
Status Rekod
</p>


<p class="font-bold text-purple-700 text-xl mt-2">
${pusakaStatus}
</p>


<div class="mt-5 bg-white rounded-xl p-3">

<p class="text-xs text-gray-500">
Perlindungan Aset
</p>

<p class="font-semibold">
Dokumen Keluarga
</p>

</div>


</div>


</div>

`;

document.getElementById(
"memberNo"
).innerHTML =
user.memberNo || "-";

document.getElementById(
"memberSince"
).innerHTML =
user.memberSince
? new Date(
user.memberSince
).toLocaleDateString("ms-MY")
: "-";

document.getElementById(
"referral"
).innerHTML =
user.referral || "-";

document.getElementById(
"telefon"
).innerHTML =
user.telefon || "-";
  
document.getElementById(
"memberStatus"
).innerHTML =
user.paymentStatus === "paid"
? "AHLI AKTIF"
: "PROSPEK";  

}

</script>

</body>
</html>
