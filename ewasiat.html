<!DOCTYPE html>
<html lang="ms">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>e-Wasiat | MyWaris</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <!-- HEADER -->
  <div class="bg-[#153638] text-white p-5 shadow">

    <h1 class="text-2xl font-bold">
      e-Wasiat
    </h1>

    <p class="text-gray-200">
      Lengkapkan maklumat wasiat anda
    </p>

  </div>

  <!-- FORM -->
  <div class="max-w-3xl mx-auto p-5">

    <form
      id="wasiatForm"
      class="bg-white p-6 rounded-2xl shadow space-y-6">

      <!-- MAKLUMAT DIRI -->
      <div>

        <h2 class="font-bold text-xl mb-4">
          Maklumat Diri
        </h2>

        <div class="space-y-4">

          <input
            type="text"
            id="nama"
            placeholder="Nama Penuh"
            class="w-full border rounded-lg p-3">

          <input
            type="text"
            id="ic"
            placeholder="No Kad Pengenalan"
            class="w-full border rounded-lg p-3">

          <input
            type="text"
            id="telefon"
            placeholder="No Telefon"
            class="w-full border rounded-lg p-3">

        </div>

      </div>

      <!-- PASANGAN -->
      <div>

        <h2 class="font-bold text-xl mb-4">
          Maklumat Pasangan
        </h2>

        <input
          type="text"
          id="pasangan"
          placeholder="Nama Pasangan"
          class="w-full border rounded-lg p-3">

      </div>

      <!-- ANAK -->
      <div>

        <h2 class="font-bold text-xl mb-4">
          Maklumat Anak
        </h2>

        <textarea
          id="anak"
          rows="4"
          placeholder="Senaraikan nama anak"
          class="w-full border rounded-lg p-3"></textarea>

      </div>

      <!-- WASI -->
      <div>

        <h2 class="font-bold text-xl mb-4">
          Maklumat Wasi
        </h2>

        <input
          type="text"
          id="wasi"
          placeholder="Nama Wasi"
          class="w-full border rounded-lg p-3">

      </div>

      <!-- HARTA -->
      <div>

        <h2 class="font-bold text-xl mb-4">
          Senarai Harta
        </h2>

        <textarea
          id="harta"
          rows="5"
          placeholder="Senaraikan aset / harta"
          class="w-full border rounded-lg p-3"></textarea>

      </div>

<!-- LAMPIRAN -->
<div class="space-y-3">

  <h2 class="text-xl font-bold text-[#153638]">
    Lampiran Dokumen
  </h2>

  <input
    type="file"
    id="fileInput"
    class="w-full border rounded-lg p-3">

  <button
    type="button"
    id="uploadBtn"
    class="bg-[#153638] hover:bg-[#1d4a4d] transition text-white px-5 py-3 rounded-lg">

    Muat Naik Lampiran

  </button>

  <div
    id="fileList"
    class="space-y-2">
  </div>

</div>
      
      <!-- BUTTON -->
      <button
        type="submit"
        class="w-full bg-[#153638] hover:bg-[#1d4a4d] transition text-white py-3 rounded-lg font-semibold">

        Simpan Wasiat

      </button>

<a
  href="dashboard.html"
  class="block text-center bg-gray-200 hover:bg-gray-300 transition text-gray-700 py-3 rounded-lg font-semibold">

  ← Kembali ke Dashboard

</a>

 <a
  href="preview-wasiat.html"
  class="block text-center bg-[#153638] hover:bg-[#1d4a4d] transition text-white py-3 rounded-lg font-semibold">

  Preview Wasiat →

</a>     
      <!-- STATUS -->
      <p
        id="status"
        class="text-center text-green-600 font-medium">
      </p>

    </form>

  </div>

  <!-- FIREBASE -->
  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      onAuthStateChanged
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      getFirestore,
      doc,
      setDoc,
      getDoc,
      collection,
      addDoc
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const firebaseConfig = {

      apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

      authDomain: "alqawthar-mywaris.firebaseapp.com",

      projectId: "alqawthar-mywaris",

      storageBucket: "alqawthar-mywaris.firebasestorage.app",

      messagingSenderId: "3498810778",

      appId: "1:3498810778:web:ee36e0fe42f76698046e23"

    };

    const app =
      initializeApp(firebaseConfig);

    const auth =
      getAuth(app);

    const db =
      getFirestore(app);

    const storage =
getStorage(app);

    let currentUser = null;

    // CHECK LOGIN
    onAuthStateChanged(auth, async(user)=>{

      if(!user){

        window.location.href =
          "login.html";

        return;

      }

      currentUser = user;

const docSnap =
await getDoc(
  doc(
    db,
    "users",
    currentUser.uid,
    "wasiat",
    "maklumat"
  )
);

if(docSnap.exists()){

  const data = docSnap.data();

  document.getElementById("nama").value =
    data.nama || "";

  document.getElementById("ic").value =
    data.ic || "";

  document.getElementById("telefon").value =
    data.telefon || "";

  document.getElementById("pasangan").value =
    data.pasangan || "";

  document.getElementById("anak").value =
    data.anak || "";

  document.getElementById("wasi").value =
    data.wasi || "";

  document.getElementById("harta").value =
    data.harta || "";

}
      
    });

// UPLOAD FILE
document
.getElementById("uploadBtn")
.addEventListener("click", async()=>{

  const file =
  document.getElementById("fileInput")
  .files[0];

  if(!file){

    alert("Sila pilih fail.");
    return;

  }

  try{

    const storageRef =
    ref(
      storage,
      "wasiat/" +
      currentUser.uid +
      "/" +
      file.name
    );

    await uploadBytes(
      storageRef,
      file
    );

    const downloadURL =
    await getDownloadURL(
      storageRef
    );

// SAVE FILE INFO
await addDoc(

  collection(
    db,
    "users",
    currentUser.uid,
    "wasiatDocuments"
  ),

  {

    fileName:
    file.name,

    fileURL:
    downloadURL,

    createdAt:
    new Date()

  }

);
    
    const fileHTML = `
    
    <div class="bg-gray-100 p-3 rounded-lg flex justify-between items-center">

      <p class="text-sm text-gray-700">
        ${file.name}
      </p>

      <a
        href="${downloadURL}"
        target="_blank"
        class="text-[#153638] font-semibold">

        Lihat

      </a>

    </div>
    
    `;

    document.getElementById(
      "fileList"
    ).innerHTML += fileHTML;

  }

  catch(error){

    console.log(error);

  }

});
    
    // SUBMIT FORM
    document
      .getElementById("wasiatForm")
      .addEventListener("submit", async(e)=>{

        e.preventDefault();

        try{

          await setDoc(

            doc(
              db,
              "users",
              currentUser.uid,
              "wasiat",
              "maklumat"
            ),

            {

              nama:
              document.getElementById("nama").value,

              ic:
              document.getElementById("ic").value,

              telefon:
              document.getElementById("telefon").value,

              pasangan:
              document.getElementById("pasangan").value,

              anak:
              document.getElementById("anak").value,

              wasi:
              document.getElementById("wasi").value,

              harta:
              document.getElementById("harta").value,

              createdAt:
              new Date()

            }

          );

          document.getElementById(
            "status"
          ).innerHTML =

          "Wasiat berjaya disimpan.";

        }

        catch(error){

          document.getElementById(
            "status"
          ).innerHTML =

          error.message;

        }

      });

  </script>

</body>
</html>
