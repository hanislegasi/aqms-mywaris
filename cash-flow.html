<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cash Flow Statement</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
font-family: Inter, sans-serif;
}
</style>

</head>

<body class="bg-gray-100">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">
Cash Flow Statement
</h1>
</div>

<div class="max-w-5xl mx-auto p-5">

<a
href="accounts-dashboard.html"
class="inline-block bg-gray-200 px-5 py-3 rounded-xl mb-5">

← Akaun

</a>

<button
id="exportPdfBtn"
class="bg-red-600 text-white px-5 py-3 rounded-xl mb-5">

Export PDF

</button>

<div
id="cfCard"
class="bg-white rounded-xl shadow p-8">

Loading...

</div>

</div>

<script type="module">




import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
getDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:"alqawthar-mywaris.firebaseapp.com",

projectId:"alqawthar-mywaris",

storageBucket:"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:"3498810778",

appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const settingsSnap =
await getDoc(
doc(db,"settings","company")
);

const settings =
settingsSnap.data();

const companyName =
settings?.companyName || "";

const registrationNo =
settings?.registrationNo || "";

const financialYearEnd =
settings?.financialYearEnd || "";

const openingBank =
Number(
settings?.openingBankBalance || 0
);

const snap =
await getDocs(
collection(db,"ledger")
);



let cashReceived = 0;

let consultantPaid = 0;
let allowancePaid = 0;
let adminPaid = 0;
let royaltyPaid = 0;
let otherPaid = 0;

let bank = 0;

snap.forEach((d)=>{

const row = d.data();

if(row.accountCode === "1000"){

    bank += Number(row.debit || 0);
    bank -= Number(row.credit || 0);

    if(Number(row.debit || 0) > 0){

        cashReceived += Number(row.debit);

    }

}

if(row.accountCode === "2000" && row.debit>0){

    consultantPaid += Number(row.debit);

}

if(row.accountCode === "2200" && row.debit>0){

    allowancePaid += Number(row.debit);

}

if(row.accountCode === "2300" && row.debit>0){

    adminPaid += Number(row.debit);

}

if(row.accountCode === "2400" && row.debit>0){

    royaltyPaid += Number(row.debit);

}

if(
Number(row.accountCode) >= 5500 &&
Number(row.accountCode) <= 5999 &&
row.debit > 0
){

    otherPaid += Number(row.debit);

}
    
});
  


const operatingCashFlow =

cashReceived
-
consultantPaid
-
allowancePaid
-
adminPaid
-
royaltyPaid
-
otherPaid;


  

const closingBank =
bank;

document.getElementById(
"cfCard"
).innerHTML = `

<div class="text-center border-b pb-5 mb-6">

<h1 class="text-3xl font-bold">
${companyName}
</h1>

<p>
STATEMENT OF CASH FLOWS
</p>

<p class="text-gray-500">
For The Financial Period Ended
<br>
${financialYearEnd}
</p>

</div>

<table class="w-full">

<tr class="font-bold bg-gray-100">

<td colspan="2">

OPERATING ACTIVITIES

</td>

</tr>

<tr>

<td>
Cash Received From Customers
</td>

<td class="text-right">
RM${cashReceived.toFixed(2)}
</td>

</tr>

<tr>

<td>
Consultant Payment
</td>

<td class="text-right">
(RM${consultantPaid.toFixed(2)})
</td>

</tr>

<tr>

<td>
Allowance Payment
</td>

<td class="text-right">
(RM${allowancePaid.toFixed(2)})
</td>

</tr>

<tr>

<td>
Admin Payment
</td>

<td class="text-right">
(RM${adminPaid.toFixed(2)})
</td>

</tr>

<tr>

<td>
Royalty Payment
</td>

<td class="text-right">
(RM${royaltyPaid.toFixed(2)})
</td>

</tr>

<tr>

<td>
Other Operating Payment
</td>

<td class="text-right">
(RM${otherPaid.toFixed(2)})
</td>

</tr>

</tr>

<tr class="font-bold border-t">

<td>
Net Cash From Operating Activities
</td>

<td class="text-right">
RM${operatingCashFlow.toFixed(2)}
</td>

</tr>

<tr>
<td colspan="2" class="py-4"></td>
</tr>

<tr>

<td>
Opening Bank Balance
</td>

<td class="text-right">
RM${openingBank.toFixed(2)}
</td>

</tr>

<tr>

<td>
Closing Bank Balance
</td>

<td class="text-right">
RM${closingBank.toFixed(2)}
</td>

</tr>

</table>

<div class="mt-10 border-t pt-4 text-xs text-gray-500">

Generated :
${new Date().toLocaleString("ms-MY")}

</div>

`;

document
.getElementById("exportPdfBtn")
.addEventListener(
"click",
()=>{

html2pdf()
.set({

margin:0.3,

filename:"Cash-Flow.pdf",

html2canvas:{
scale:2
},

jsPDF:{
unit:"in",
format:"a4",
orientation:"portrait"
}

})
.from(
document.getElementById("cfCard")
)
.save();

});

</script>

</body>

</html>
