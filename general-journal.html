<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>General Journal</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
<style>
body{
font-family: Inter, sans-serif;
}
</style>
  
</head>

<body class="bg-gray-100">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">
General Journal
</h1>

</div>

<div class="max-w-7xl mx-auto p-5">

 
<a
href="accounts-dashboard.html"
class="inline-block bg-gray-200 px-5 py-3 rounded-xl mb-5">

← Akaun

</a>

<button
id="exportPdfBtn"
class="bg-red-600 text-white px-5 py-3 rounded-xl ml-2">

Export PDF

</button>
  
<div class="grid md:grid-cols-4 gap-3 mb-6">

<input
type="date"
id="dateFrom"
class="border rounded-xl p-3 h-12">

<input
type="date"
id="dateTo"
class="border rounded-xl p-3 h-12">

<input
type="text"
id="journalSearch"
placeholder="Cari account, kod atau description"
class="border rounded-xl p-3 h-12">

</div>

<div
id="journalContainer"
class="bg-white rounded-xl shadow overflow-hidden">

<table class="w-full text-sm">

<thead>

<tr class="bg-[#153638] text-white">

<th class="p-3 text-left">
Date
</th>

<th class="p-3 text-left">
Account
</th>

<th class="p-3 text-left">
Description
</th>

<th class="p-3 text-right">
Debit
</th>

<th class="p-3 text-right">
Credit
</th>

</tr>

</thead>

<tbody id="journalTable">

</tbody>

</table>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
authDomain:"alqawthar-mywaris.firebaseapp.com",
projectId:"alqawthar-mywaris",
storageBucket:"alqawthar-mywaris.firebasestorage.app",
messagingSenderId:"3498810778",
appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

function money(value){

    return Number(value || 0).toLocaleString(
        "en-US",
        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }
    );

}
  
const snap =
await getDocs(
collection(db,"ledger")
);

const rows = [];

snap.forEach((d)=>{

rows.push(d.data());

});

rows.sort((a,b)=>{

const dateA =
a.date?.toDate()
|| new Date(a.date);

const dateB =
b.date?.toDate()
|| new Date(b.date);

return dateA - dateB;

});

let html = "";

rows.forEach((row)=>{

html += `

<tr class="border-b hover:bg-gray-50">

<td class="p-3">
${
row.date?.toDate
?
row.date.toDate()
.toLocaleDateString("ms-MY")
:
"-"
}
</td>

<td class="p-3">
${row.account}
</td>

<td class="p-3">
${row.description || "-"}
</td>

<td class="p-3 text-right">
RM${money(row.debit)}
</td>

<td class="p-3 text-right">
RM${money(row.credit)}
</td>

</tr>

`;

});

document.getElementById(
"journalTable"
).innerHTML = html;

function filterJournal(){

const keyword =
document.getElementById("journalSearch")
.value.toLowerCase();

const from =
document.getElementById("dateFrom")
.value;

const to =
document.getElementById("dateTo")
.value;

const rows =
document.querySelectorAll(
"#journalTable tr"
);

rows.forEach((row)=>{

const text =
row.innerText.toLowerCase();

const dateText =
row.children[0]?.innerText || "";

let show = true;

if(
keyword &&
!text.includes(keyword)
){
show = false;
}

if(from){

const rowDate =
new Date(
dateText.split("/")
.reverse()
.join("-")
);

if(rowDate < new Date(from)){
show = false;
}

}

if(to){

const rowDate =
new Date(
dateText.split("/")
.reverse()
.join("-")
);

if(rowDate > new Date(to)){
show = false;
}

}

row.style.display =
show
? ""
: "none";

});

}

document
.getElementById("journalSearch")
.addEventListener(
"input",
filterJournal
);

document
.getElementById("dateFrom")
.addEventListener(
"change",
filterJournal
);

document
.getElementById("dateTo")
.addEventListener(
"change",
filterJournal
);

document
.getElementById("exportPdfBtn")
.addEventListener(
"click",
()=>{

html2pdf().set({

margin:0.3,

filename:"General-Journal.pdf",

image:{
type:"jpeg",
quality:1
},

html2canvas:{
scale:2
},

jsPDF:{
unit:"in",
format:"a4",
orientation:"portrait"
}

})
.from(
document.getElementById(
"journalContainer"
)
)
.save();

});
  
</script>

</body>
</html>
