<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <meta name="description" content="Perkhidmatan perancangan harta pusaka Islam meliputi Wasiat, Hibah, Faraid, Harta Sepencarian dan Pengurusan Pusaka di Mahkamah. Elakkan harta beku dan lindungi waris anda hari ini.">
  <meta name="keywords" content="wasiat, hibah, faraid, urus pusaka, pengurusan pusaka islam, harta pusaka, harta beku, perancang pusaka, perunding hibah, wasiat malaysia, hibah malaysia, pengurusan harta pusaka, surat kuasa mentadbir, pusaka kecil, mahkamah pusaka, harta sepencarian, pewarisan islam, perancangan harta, pewarisan harta islam">
  <meta name="author" content="Al-Qawthar Mawaris Synergy">
  
  <title>Perancang Harta Pusaka Islam | Wasiat, Hibah & Pengurusan Pusaka</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-inter { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex flex-col font-sans bg-gray-50 selection:bg-[#d8ae81] selection:text-[#153638]">

  <!-- HEADER -->
  <header class="sticky top-0 z-50 shadow-md font-inter bg-[#153638]">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20 sm:h-24">
        
        <!-- Logo Area -->
        <div class="flex items-center h-full py-2 cursor-pointer" onclick="window.location.reload()">
          <img src="https://i.postimg.cc/JhLc8szZ/Copy-of-A.png" alt="AQMS Logo" class="h-full max-h-16 sm:max-h-20 w-auto object-contain">
        </div>

        <!-- Login / Register Buttons -->
        <div class="flex items-center gap-2 sm:gap-3">
          <button onclick="window.location.href='login.html'"
            class="px-3 sm:px-4 py-1.5 sm:py-2 text-sm sm:text-base border border-[#d8ae81] text-[#d8ae81] rounded-lg hover:bg-[#d8ae81] hover:text-[#153638] transition font-medium">
            Login
          </button>

          <button onclick="window.location.href='register.html'"
            class="px-3 sm:px-4 py-1.5 sm:py-2 text-sm sm:text-base bg-[#d8ae81] text-[#153638] font-semibold rounded-lg hover:opacity-90 transition">
            Daftar Akaun
          </button>

          </div>
        
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT AREA -->
  <main class="relative flex-grow flex items-center justify-center w-full min-h-[calc(100vh-6rem)] overflow-hidden">
    
    <!-- Background Image (Gambar dari Lain-lain Servis) -->
    <div class="absolute inset-0 z-0 bg-cover bg-center bg-no-repeat" 
         style="background-image: url('https://i.postimg.cc/wv7WYcFk/Chat-GPT-Image-May-20-2026-12-36-18-PM.png');">
    </div>
    
    <!-- Dark overlay untuk memastikan logo lebih menyerlah (Optional tapi direkomendasikan) -->
    <div class="absolute inset-0 z-0 bg-black/40"></div>

    <!-- Logo di Tengah (Middle) -->
    <div class="relative z-10 px-4 transform hover:scale-105 transition-transform duration-700">
      <img src="logo-b.png" alt="AQMS Logo Tengah" class="w-64 sm:w-80 md:w-[400px] drop-shadow-[0_10px_35px_rgba(0,0,0,0.5)]">
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="py-16 font-inter bg-[#0f292a] text-[#f8f9fa]">
   
      <div class="mt-12 pt-8 border-t border-white/5 text-center text-xs text-gray-500 font-bold uppercase tracking-widest">
        &copy; <span id="current-year"></span> Al-Qawthar Mawaris Synergy. HCH @ Hak Cipta Terpelihara.
      </div>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Set current year in footer
      document.getElementById('current-year').innerText = new Date().getFullYear();
      
      // Initialize Lucide icons
      lucide.createIcons();
    });
  </script>
</body>
</html>
