<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ujian Wasiat Islam</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family: Inter, sans-serif;
}

</style>

</head>

<body class="bg-gray-100">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-3xl font-bold">
Ujian Wasiat Islam
</h1>

<p>
20 Soalan • Lulus 80%
</p>

</div>

<div class="max-w-4xl mx-auto p-5">

<a
href="wasiat-module.html"
class="inline-block bg-gray-200 hover:bg-gray-300 px-5 py-3 rounded-xl font-semibold mb-5">

← Kembali ke Modul

</a>

<form id="quizForm">

<div class="bg-white rounded-2xl border border-gray-200 p-6 mb-5">

<h2 class="font-bold mb-4">
1. Apakah maksud wasiat?
</h2>

<label class="block mb-2">
<input type="radio" name="q1" value="A">
 Hibah kepada waris
</label>

<label class="block mb-2">
<input type="radio" name="q1" value="B">
 Pengisytiharan yang berkuat kuasa selepas kematian
</label>

<label class="block mb-2">
<input type="radio" name="q1" value="C">
 Pembahagian faraid
</label>

<label class="block">
<input type="radio" name="q1" value="D">
 Wakaf harta
</label>

</div>

<button
type="submit"
class="bg-[#153638] text-white px-8 py-4 rounded-xl font-bold">

Hantar Jawapan

</button>

</form>

<div
id="result"
class="mt-5">
</div>

</div>

<script>

document
.getElementById("quizForm")
.addEventListener("submit",(e)=>{

e.preventDefault();

let score = 0;

if(
document.querySelector(
'input[name="q1"]:checked'
)?.value === "B"
){
score += 5;
}

const result =
document.getElementById("result");

if(score >= 80){

result.innerHTML = `

<div class="bg-green-100 text-green-700 p-5 rounded-xl">

LULUS ✅

<br>

Markah:
${score}%

</div>

`;

}
else{

result.innerHTML = `

<div class="bg-red-100 text-red-700 p-5 rounded-xl">

GAGAL ❌

<br>

Markah:
${score}%

</div>

`;

}

});

</script>

</body>
</html>
