<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ujian Wasiat Islam</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family: Inter, sans-serif;
}

</style>

</head>

<body class="bg-gray-100">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-3xl font-bold">
Ujian Wasiat Islam
</h1>

<p>
20 Soalan • Lulus 80%
</p>

</div>

<div class="max-w-4xl mx-auto p-5">

<a
href="wasiat-module.html"
class="inline-block bg-gray-200 hover:bg-gray-300 px-5 py-3 rounded-xl font-semibold mb-5">

← Kembali ke Modul

</a>

<form id="quizForm">

<div id="questionsContainer"></div>

<button
type="submit"
class="bg-[#153638] text-white px-8 py-4 rounded-xl font-bold mt-5">

Hantar Jawapan

</button>

</form>

<div id="result" class="mt-5"></div>
 
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:"alqawthar-mywaris.firebaseapp.com",

projectId:"alqawthar-mywaris",

storageBucket:"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:"3498810778",

appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

currentUser = user;

});


 


<script type="module">

const questions = [

{
question:"Apakah maksud wasiat?",
options:[
"Hibah kepada waris",
"Pengisytiharan yang berkuat kuasa selepas kematian",
"Pembahagian faraid",
"Wakaf harta"
],
answer:"B"
},

{
question:"Apakah hukum asal wasiat dalam Islam?",
options:[
"Wajib",
"Haram",
"Sunat",
"Makruh"
],
answer:"C"
},

{
question:"Wasiat berkuat kuasa apabila:",
options:[
"Ditandatangani",
"Selepas kematian pewasiat",
"Selepas pembayaran fi",
"Selepas disahkan waris"
],
answer:"B"
},

{
question:"Berapakah had maksimum harta yang boleh diwasiatkan?",
options:[
"1/2",
"1/4",
"1/3",
"Semua harta"
],
answer:"C"
},

{
question:"Siapakah wasi?",
options:[
"Penerima hibah",
"Pentadbir yang melaksanakan wasiat",
"Waris faraid",
"Pemegang amanah takaful"
],
answer:"B"
}

];

const container =
document.getElementById(
"questionsContainer"
);

questions.forEach((q,index)=>{

let html = `

<div class="bg-white rounded-2xl border border-gray-200 p-6 mb-5">

<h2 class="font-bold mb-4">

${index+1}. ${q.question}

</h2>

`;

q.options.forEach((option,optIndex)=>{

const letter =
["A","B","C","D"][optIndex];

html += `

<label class="block mb-2">

<input
type="radio"
name="q${index}"
value="${letter}">

${option}

</label>

`;

});

html += `</div>`;

container.innerHTML += html;

});

document
.getElementById("quizForm")
.addEventListener("submit", async(e)=>{

e.preventDefault();

let correct = 0;

questions.forEach((q,index)=>{

const selected =
document.querySelector(
`input[name="q${index}"]:checked`
)?.value;

if(selected === q.answer){

correct++;

}

});

const score =
Math.round(
(correct/questions.length)*100
);

const result =
document.getElementById(
"result"
);

if(score >= 80){

result.innerHTML = `

<div class="bg-green-100 text-green-700 p-5 rounded-xl">

<h2 class="font-bold text-xl">

LULUS ✅

</h2>

<p>

Markah:
${score}%

</p>

</div>

`;

}
else{

result.innerHTML = `

<div class="bg-red-100 text-red-700 p-5 rounded-xl">

<h2 class="font-bold text-xl">

GAGAL ❌

</h2>

<p>

Markah:
${score}%

</p>

<p>

Minimum lulus adalah 80%

</p>

</div>

`;

await updateDoc(
doc(
db,
"users",
currentUser.uid
),
{

"training.wasiat.status":
"passed",

"training.wasiat.score":
score,

"training.wasiat.completedAt":
new Date()

}
);
 
}

});

</script>

</body>
</html>
