<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Consultant Dashboard
</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body
class="bg-gray-100 min-h-screen"
style="font-family: Inter, sans-serif;">

<!-- HEADER -->

<div class="bg-[#153638] text-white p-5 shadow">

<div class="flex justify-between items-center">

<div>

<h1 class="text-2xl font-bold">
Dashboard Konsultan
</h1>

<p id="welcomeText">
Memuatkan...
</p>

</div>

 
<button
id="logoutBtn"
class="bg-red-500 px-4 py-2 rounded-xl">

Logout

</button>

</div>

</div>

<div class="p-5">

<div
id="renewalBanner"
class="hidden mb-5">
</div>
  
<!-- PROFIL -->

<div
id="profileCard"
class="bg-white p-5 rounded-2xl shadow mb-5">

Memuatkan profil...

</div>

<!-- KPI -->

<div
class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5">

<div class="bg-white p-5 rounded-xl shadow">

<p class="text-gray-500">
Client Aktif
</p>

<p
id="activeClients"
class="text-3xl font-bold">

0

</p>

</div>

<div class="bg-white p-5 rounded-xl shadow">

<p class="text-gray-500">
Jumlah Jualan
</p>

<p
id="totalSales"
class="text-3xl font-bold">

RM0

</p>

</div>

<div class="bg-white p-5 rounded-xl shadow">

<p class="text-gray-500">
Komisen
</p>

<p
id="totalCommission"
class="text-3xl font-bold">

RM0

</p>

</div>

<div class="bg-white p-5 rounded-xl shadow">

<p class="text-gray-500">
Overriding
</p>

<p
id="totalOverriding"
class="text-3xl font-bold">

RM0

</p>

</div>

</div>

<!-- MENU -->

<div class="grid md:grid-cols-4 gap-4">

<button
id="clientsBtn"
class="bg-[#153638] text-white p-5 rounded-xl">

My Clients

</button>

<button
id="careerBtn"
class="bg-[#153638] text-white p-5 rounded-xl">

Career Path

</button>

<button
id="trainingBtn"
class="bg-[#153638] text-white p-5 rounded-xl">

Continuous Professional Development 

</button>

<button
id="renewalBtn"
class="bg-[#153638] text-white p-5 rounded-xl">

Annual Consultant Renewal

</button>
  
<button
id="marketingBtn"
class="bg-[#153638] text-white p-5 rounded-xl">

Marketing Kit

</button>

</div>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
getDocs,
collection
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:"alqawthar-mywaris.firebaseapp.com",

projectId:"alqawthar-mywaris",

storageBucket:"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:"3498810778",

appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

const userSnap =
await getDoc(
doc(
db,
"users",
user.uid
)
);

const data =
userSnap.data();

const renewalDate =
new Date(data.renewalDate);

const today =
new Date();

const diffDays =
Math.ceil(
(renewalDate - today)
/
(1000 * 60 * 60 * 24)
);

if(diffDays <= 30){

document.getElementById(
"renewalBanner"
).classList.remove("hidden");

document.getElementById(
"renewalBanner"
).innerHTML = `

<div class="bg-yellow-50 border border-yellow-200 rounded-2xl p-5">

<h2 class="font-bold text-yellow-700 text-lg">

🔔 Renewal Reminder

</h2>

<p class="mt-2">

Membership anda akan tamat dalam
<b>${diffDays} hari</b>.

</p>

<a
href="consultant-renewal.html"
class="inline-block mt-4 bg-yellow-500 text-white px-5 py-3 rounded-xl">

Renew Now

</a>

</div>

`;

}
  
let activeClients = 0;

const usersSnap =
await getDocs(
collection(db,"users")
);

usersSnap.forEach((d)=>{

const u =
d.data();

if(
u.role === "customer" &&
u.paymentStatus === "paid" &&
(u.referral || "").trim() === data.consultantNo
){
activeClients++;
}

});  

document.getElementById(
"welcomeText"
).innerHTML =
data.nama;

document.getElementById(
"profileCard"
).innerHTML = `

<h2 class="text-2xl font-bold mb-3">

${data.nama}

</h2>

<p>No Konsultan: ${data.consultantNo}</p>

<p>Level: ${data.consultantLevel}</p>

<p>Upline: ${data.upline || "-"}</p>

<p>Telefon: ${data.telefon}</p>

<p>Negeri: ${data.state}</p>

<p>Tarikh Sertai:
${new Date(data.joinDate).toLocaleDateString("ms-MY")}
</p>

<p>Renewal:
${new Date(data.renewalDate).toLocaleDateString("ms-MY")}
</p>

`;

document.getElementById(
"activeClients"
).innerHTML =
activeClients;

document.getElementById(
"totalSales"
).innerHTML =
"RM" + (data.totalSales || 0);

document.getElementById(
"totalCommission"
).innerHTML =
"RM" + (data.totalCommission || 0);

document.getElementById(
"totalOverriding"
).innerHTML =
"RM" + (data.totalOverriding || 0);

});

document
.getElementById("clientsBtn")
.addEventListener("click", ()=>{

window.location.href =
"consultant-clients.html";

});

document
.getElementById("careerBtn")
.addEventListener("click", ()=>{

window.location.href =
"consultant-career.html";

});

document
.getElementById("trainingBtn")
.addEventListener("click", ()=>{

window.location.href =
"consultant-training.html";

});

document
.getElementById("renewalBtn")
.addEventListener("click",()=>{

window.location.href =
"consultant-renewal.html";

});  
  
document
.getElementById("logoutBtn")
.addEventListener("click", async()=>{

await signOut(auth);

window.location.href =
"index.html";

});

</script>



</body>

</html>
