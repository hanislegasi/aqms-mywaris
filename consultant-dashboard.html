<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Consultant Dashboard
</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body
class="bg-gray-100 min-h-screen"
style="font-family: Inter, sans-serif;">

<!-- HEADER -->

<div class="bg-[#153638] text-white p-5 shadow">

<div class="flex justify-between items-center">

<div>

<h1 class="text-2xl font-bold">
Dashboard Konsultan
</h1>

<p id="welcomeText">
Memuatkan...
</p>

</div>

 
<button
id="logoutBtn"
class="bg-red-500 px-4 py-2 rounded-xl">

Logout

</button>

</div>

</div>

<div class="p-5">

<div
id="renewalBanner"
class="hidden mb-5">
</div>
  
<!-- PROFIL -->

<div
id="profileCard"
class="bg-white p-5 rounded-2xl shadow mb-5">

Memuatkan profil...

</div>

<div
id="promotionCard"
class="bg-white p-5 rounded-2xl shadow mb-5">

Loading Career Progress...

</div>

 
<!-- KPI -->

<div
class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5">

<div class="bg-white p-5 rounded-xl shadow">

<p class="text-gray-500">
Client Aktif
</p>

<p
id="activeClients"
class="text-3xl font-bold">

0

</p>

</div>

<div class="bg-white p-5 rounded-xl shadow">

<p class="text-gray-500">
Jumlah Jualan
</p>

<p
id="totalSales"
class="text-3xl font-bold">

RM0

</p>

</div>

<div class="bg-white p-5 rounded-xl shadow">

<p class="text-gray-500">
Komisen
</p>

<p
id="totalCommission"
class="text-3xl font-bold">

RM0

</p>

</div>

<div class="bg-white p-5 rounded-xl shadow">

<p class="text-gray-500">
Overriding
</p>

<p
id="totalOverriding"
class="text-3xl font-bold">

RM0

</p>

</div>

</div>

<!-- MENU -->

<div class="grid md:grid-cols-4 gap-4">

<button
id="clientsBtn"
class="bg-[#153638] text-white p-5 rounded-xl">

My Clients

</button>

<button
id="careerBtn"
class="bg-[#153638] text-white p-5 rounded-xl">

Career Path

</button>

<button
id="trainingBtn"
class="bg-[#153638] text-white p-5 rounded-xl">

Continuous Professional Development 

</button>

<button
id="renewalBtn"
class="bg-[#153638] text-white p-5 rounded-xl">

Annual Consultant Renewal

</button>
  
<button
id="marketingBtn"
class="bg-[#153638] text-white p-5 rounded-xl">

Marketing Kit

</button>

</div>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
getDocs,
collection
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:"alqawthar-mywaris.firebaseapp.com",

projectId:"alqawthar-mywaris",

storageBucket:"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:"3498810778",

appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

const userSnap =
await getDoc(
doc(
db,
"users",
user.uid
)
);

const data =
userSnap.data();

const sales =
data.totalSales || 0;

let nextLevel = "";
let targetSales = 0;

if(data.consultantLevel === "AQC"){

nextLevel = "AQC-AS";
targetSales = 30000;

}

else if(data.consultantLevel === "AQC-AS"){

nextLevel = "AQC-UM";
targetSales = 60000;

}

else if(data.consultantLevel === "AQC-UM"){

nextLevel = "MGAM";
targetSales = 120000;

}

else{

nextLevel = "TOP LEVEL";
targetSales = sales;

}

const progress =
Math.min(
100,
(sales / targetSales) * 100
);

const remaining =
Math.max(
0,
targetSales - sales
); 

if(
sales >= targetSales &&
nextLevel !== "TOP LEVEL" &&
!data.promotionRequest
){

await updateDoc(
doc(db,"users",user.uid),
{
promotionRequest:true,
requestedLevel:nextLevel,
promotionRequestDate:new Date()
}
);

}
 
const renewalDate =
data.renewalDate?.toDate
? data.renewalDate.toDate()
: new Date(data.renewalDate);

const today =
new Date();

const diffDays =
Math.ceil(
(renewalDate - today)
/
(1000 * 60 * 60 * 24)
);

if(diffDays <= 30){

document.getElementById(
"renewalBanner"
).classList.remove("hidden");

document.getElementById(
"renewalBanner"
).innerHTML = `

<div class="bg-red-50 border border-red-200 rounded-2xl p-5">

<h2 class="font-bold text-red-700 text-lg">
🚨 Renewal Reminder
</h2>

<p class="mt-2">

Membership anda akan tamat dalam
<b>${diffDays} hari</b>.

</p>

<a
href="consultant-renewal.html"
class="inline-block mt-4 bg-red-500 text-white px-5 py-3 rounded-xl">

Renew Now

</a>

</div>

`;

}
  
let activeClients = 0;
let totalSales = 0;

const usersSnap =
await getDocs(
collection(db,"users")
);

usersSnap.forEach((d)=>{

const u =
d.data();

if(
u.role === "customer" &&
u.paymentStatus === "paid" &&
(u.referral || "").trim() === data.consultantNo
){

activeClients++;

totalSales += Number(
u.packageAmount || 100
);

}

});  

document.getElementById(
"welcomeText"
).innerHTML =
data.nama;

document.getElementById(
"promotionCard"
).innerHTML = `

<h2 class="text-xl font-bold mb-3">

Career Progression

</h2>

<p>

Current Level:
<b>${data.consultantLevel}</b>

</p>

<p>

Next Level:
<b>${nextLevel}</b>

</p>

<div class="w-full bg-gray-200 rounded-full h-4 mt-4">

<div
class="bg-green-500 h-4 rounded-full"
style="width:${progress}%">

</div>

</div>

<p class="mt-2">

RM${sales.toLocaleString()}
/
RM${targetSales.toLocaleString()}

</p>

<p class="mt-2 text-red-600 font-semibold">

${
data.promotionRequest
?

`<div class="mt-3 bg-yellow-100 text-yellow-700 p-3 rounded-xl">

🎉 Promotion Request Submitted

Menunggu kelulusan HQ.

</div>`

:

`<p class="mt-2 text-red-600 font-semibold">

RM${remaining.toLocaleString()}
lagi untuk naik ke ${nextLevel}

</p>`

}

</p>

`;
 
const joinDate =
data.joinDate?.toDate
? data.joinDate.toDate()
: new Date(data.joinDate);


document.getElementById(
"profileCard"
).innerHTML = `

<h2 class="text-2xl font-bold mb-3">
${data.nama}
</h2>

<p><b>No Konsultan:</b> ${data.consultantNo}</p>

<p><b>Level:</b> ${data.consultantLevel}</p>

<p><b>Upline:</b> ${data.upline || "-"}</p>

<p><b>Telefon:</b> ${data.telefon}</p>

<p><b>Email:</b> ${data.email || "-"}</p>

<p><b>IC:</b> ${data.ic || "-"}</p>

<p><b>Negeri:</b> ${data.state}</p>

<p><b>Bank:</b> ${data.bankName || "-"}</p>

<p><b>No Akaun:</b> ${data.bankAccount || "-"}</p>

<p><b>Status Bayaran:</b> ${data.consultantPaymentStatus || "-"}</p>

<p>
<b>Tarikh Sertai:</b>
${joinDate.toLocaleDateString("ms-MY")}
</p>

<p>
<b>Renewal:</b>
${renewalDate.toLocaleDateString("ms-MY")}
</p>

<div class="mt-4">

<button
id="editProfileBtn"
class="bg-blue-500 text-white px-5 py-2 rounded-xl">

Edit Profile

</button>

</div>

`;

document
.getElementById("editProfileBtn")
?.addEventListener("click",()=>{

window.location.href =
"consultant-profile-edit.html";

});
 
document.getElementById(
"activeClients"
).innerHTML =
activeClients;

document.getElementById(
"totalSales"
).innerHTML =
"RM" + (data.totalSales || 0);

document.getElementById(
"totalCommission"
).innerHTML =
"RM" + (data.totalCommission || 0);

document.getElementById(
"totalOverriding"
).innerHTML =
"RM" + (data.totalOverriding || 0);

});

document
.getElementById("clientsBtn")
.addEventListener("click", ()=>{

window.location.href =
"consultant-clients.html";

});

document
.getElementById("careerBtn")
.addEventListener("click", ()=>{

window.location.href =
"consultant-career.html";

});

document
.getElementById("trainingBtn")
.addEventListener("click", ()=>{

window.location.href =
"consultant-training.html";

});

document
.getElementById("renewalBtn")
.addEventListener("click",()=>{

window.location.href =
"consultant-renewal.html";

});  

 
document
.getElementById("logoutBtn")
.addEventListener("click", async()=>{

await signOut(auth);

window.location.href =
"index.html";

});

</script>



</body>

</html>
