<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Balance Sheet</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
font-family: Inter, sans-serif;
}
</style>

</head>

<body class="bg-gray-100">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">
Balance Sheet
</h1>

</div>

<div class="max-w-5xl mx-auto p-5">

<a
href="accounts-dashboard.html"
class="inline-block bg-gray-200 px-5 py-3 rounded-xl mb-5">

← Akaun

</a>

<button
id="exportPdfBtn"
class="bg-red-600 text-white px-5 py-3 rounded-xl mb-5">

Export PDF

</button>

<div
id="bsCard"
class="bg-white rounded-xl shadow p-8">

Loading...

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
getDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:"alqawthar-mywaris.firebaseapp.com",

projectId:"alqawthar-mywaris",

storageBucket:"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:"3498810778",

appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const settingsSnap =
await getDoc(
doc(db,"settings","company")
);

const settings =
settingsSnap.data();

const companyName =
settings?.companyName ||
"AL-QAWTHAR MAWARIS SDN. BHD.";

const reportPeriod =
settings?.reportPeriod ||
"01 January 2026 - 31 December 2026";
  
const financialYearEnd =
settings?.financialYearEnd ||
"31 December 2026";

const coaSnap = await getDocs(
    collection(db,"chartOfAccounts")
);

const coaMap = {};

coaSnap.forEach(doc=>{

    const a = doc.data();

    coaMap[a.code]=a;

});
  
const snap =
await getDocs(
collection(db,"ledger")
);

const assets={};
const liabilities={};
const equity={};

const income={};
const expenses={};
  

snap.forEach((d)=>{

const row = d.data();

const coa =
coaMap[String(row.accountCode)];

if(!coa) return;

const type =
coa.type?.toLowerCase();

const debit =
Number(row.debit||0);

const credit =
Number(row.credit||0);

if(type=="asset"){

    if(!assets[coa.code]){

        assets[coa.code]={

            code:coa.code,

            name:coa.name,

            amount:0

        };

    }

    assets[coa.code].amount +=
    debit-credit;

}

if(type=="contra asset"){

    if(!assets[coa.code]){

        assets[coa.code]={

            code:coa.code,

            name:coa.name,

            amount:0

        };

    }

    assets[coa.code].amount +=
(debit-credit);

}

if(type=="liability"){

    if(!liabilities[coa.code]){

        liabilities[coa.code]={

            code:coa.code,

            name:coa.name,

            amount:0

        };

    }

    liabilities[coa.code].amount +=
    credit-debit;

}


if(type=="equity"){

    if(!equity[coa.code]){

        equity[coa.code]={

            code:coa.code,

            name:coa.name,

            amount:0

        };

    }

    equity[coa.code].amount +=
    credit-debit;

}  
  


if(
type=="income" ||
type=="revenue"
){

    if(!income[coa.code]){

        income[coa.code]={

            code:coa.code,

            name:coa.name,

            amount:0

        };

    }

    income[coa.code].amount +=
    credit;

}
  
if(
type=="expense" ||
type=="expenses"
){

    if(!expenses[coa.code]){

        expenses[coa.code]={

            code:coa.code,

            name:coa.name,

            amount:0

        };

    }

    expenses[coa.code].amount +=
    debit;

}


  
  

  
});
  


  


const totalRevenue =
Object.values(income)
.reduce((a,b)=>a+b.amount,0);

const totalExpense =
Object.values(expenses)
.reduce((a,b)=>a+b.amount,0);

const netProfit =
totalRevenue-totalExpense;

const totalAssets =
Object.values(assets)
.reduce((a,b)=>a+b.amount,0);

const totalLiabilities =
Object.values(liabilities)
.reduce((a,b)=>a+b.amount,0);

const equityBalance =
Object.values(equity)
.reduce((a,b)=>a+b.amount,0);

const totalEquity =
equityBalance+netProfit;

const totalLE =
totalLiabilities+totalEquity;

const difference =
totalAssets-totalLE;


  
  
document.getElementById(
"bsCard"
).innerHTML = `

<div class="text-center border-b pb-5 mb-6">

<h1 class="text-3xl font-bold">
${companyName}
</h1>

<p>
STATEMENT OF FINANCIAL POSITION
</p>

<p class="text-gray-500">
As At ${financialYearEnd}
</p>

</div>

<table class="w-full">

<tr class="font-bold bg-gray-100">

<td colspan="2">
ASSETS
</td>

</tr>

${Object.values(assets)

.sort((a,b)=>a.code.localeCompare(b.code))

.map(item=>`

<tr>

<td class="pl-6 py-2">
${item.name}
</td>

<td class="text-right">
RM${item.amount.toFixed(2)}
</td>

</tr>

`).join("")}

<tr class="font-bold border-t">

<td>
TOTAL ASSETS
</td>

<td class="text-right">
RM${totalAssets.toFixed(2)}
</td>

</tr>

<tr>
<td colspan="2" class="py-4"></td>
</tr>

<tr class="font-bold bg-gray-100">

<td colspan="2">
LIABILITIES
</td>

</tr>

${Object.values(liabilities)

.sort((a,b)=>a.code.localeCompare(b.code))

.map(item=>`

<tr>

<td class="pl-6 py-2">
${item.name}
</td>

<td class="text-right">
RM${item.amount.toFixed(2)}
</td>

</tr>

`).join("")}

<tr class="font-bold border-t">

<td>
TOTAL LIABILITIES
</td>

<td class="text-right">
RM${totalLiabilities.toFixed(2)}
</td>

</tr>

<tr>
<td colspan="2" class="py-4"></td>
</tr>

<tr class="font-bold bg-gray-100">

<td colspan="2">
EQUITY
</td>

</tr>

${Object.values(equity)

.sort((a,b)=>a.code.localeCompare(b.code))

.map(item=>`

<tr>

<td class="pl-6 py-2">
${item.name}
</td>

<td class="text-right">
RM${item.amount.toFixed(2)}
</td>

</tr>

`).join("")}

<tr>

<td class="pl-6 py-2">
Current Year Profit
</td>

<td class="text-right">
RM${netProfit.toFixed(2)}
</td>

</tr>



<tr class="font-bold border-t">

<td>
TOTAL EQUITY
</td>

<td class="text-right">
RM${totalEquity.toFixed(2)}
</td>

</tr>

<tr class="bg-green-50 text-green-700 font-bold text-xl">

<td class="py-4">
TOTAL LIABILITIES & EQUITY
</td>

<td class="text-right">
RM${totalLE.toFixed(2)}
</td>

</tr>

<tr class="${
difference === 0
? 'bg-green-100'
: 'bg-red-100'
} font-bold">

<td>
BALANCE CHECK
</td>

<td class="text-right">

RM${difference.toFixed(2)}

</td>

</tr>


</table>

<div class="mt-10 border-t pt-4 text-xs text-gray-500">

Generated :
${new Date().toLocaleString("ms-MY")}

</div>

`;

document
.getElementById("exportPdfBtn")
.addEventListener(
"click",
()=>{

html2pdf()
.set({

margin:0.3,

filename:"Balance-Sheet.pdf",

html2canvas:{
scale:2
},

jsPDF:{
unit:"in",
format:"a4",
orientation:"portrait"
}

})
.from(
document.getElementById("bsCard")
)
.save();

});

</script>

</body>
</html>
