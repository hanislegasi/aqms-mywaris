<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trial Balance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar styling for a cleaner look on mobile */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- HEADER -->
    <div class="bg-[#153638] text-white p-5">
        <h1 class="text-2xl font-bold">Trial Balance</h1>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="max-w-7xl mx-auto p-5">

        <!-- Back Button -->
        <a href="accounts-dashboard.html" class="inline-block bg-gray-200 px-5 py-3 rounded-xl mb-5 text-gray-800">
            &larr; Akaun
        </a>

        <!-- Mobile Scroll Instruction (Only visible on small screens) -->
        <div class="flex items-center text-sm text-gray-500 mb-2 md:hidden">
            <svg class="w-4 h-4 mr-2 text-blue-500 animate-pulse flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
            </svg>
            <span>Tatal (scroll) ke kanan untuk melihat jadual penuh.</span>
        </div>

        <!-- TABLE CONTAINER WITH SCROLL SUPPORT -->
        <div class="bg-white rounded-xl shadow overflow-hidden">
            <div class="overflow-x-auto custom-scrollbar">
                <!-- min-w-[600px] forces the table to maintain at least 600px width on mobile, triggering the scrollbar -->
                <table class="w-full min-w-[600px]">
                    <thead class="bg-[#153638] text-white">
                        <tr>
                            <th class="p-3 text-left">Code</th>
                            <th class="p-3 text-left">Account</th>
                            <th class="p-3 text-right">Debit</th>
                            <th class="p-3 text-right">Credit</th>
                        </tr>
                    </thead>
                    <tbody id="tbTable">
                        <!-- Loading placeholder while fetching data -->
                        <tr>
                            <td colspan="4" class="p-5 text-center text-gray-500">
                                <div class="flex flex-col items-center justify-center space-y-2">
                                    <div class="w-6 h-6 border-2 border-[#153638] border-t-transparent rounded-full animate-spin"></div>
                                    <span>Memuatkan data imbangan...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
            authDomain: "alqawthar-mywaris.firebaseapp.com",
            projectId: "alqawthar-mywaris",
            storageBucket: "alqawthar-mywaris.firebasestorage.app",
            messagingSenderId: "3498810778",
            appId: "1:3498810778:web:ee36e0fe42f76698046e23"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

function money(value){

    return Number(value||0).toLocaleString(
        "en-US",
        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }
    );

}

        
        async function fetchTrialBalance() {
            try {
                const snap = await getDocs(collection(db, "ledger"));
                
                // Debug broken records in console
                snap.forEach((d) => {
                    const row = d.data();
                    if (!row.accountCode || !row.account) {
                        console.log("BROKEN RECORD", d.id, JSON.stringify(row));
                    }
                });

                const accounts = {};

                snap.forEach((d) => {
                    const row = d.data();
                    const code = row.accountCode || "0000";

                    if (!accounts[code]) {
                        accounts[code] = {
                            name: row.account || "Akaun Tidak Diketahui",
                            debit: 0,
                            credit: 0
                        };
                    }

                    accounts[code].debit += Number(row.debit || 0);
                    accounts[code].credit += Number(row.credit || 0);
                });

                let html = "";
                let totalDebit = 0;
                let totalCredit = 0;

                // Sort accounts by code and append to UI
               Object.keys(accounts)
.sort((a,b)=>Number(a)-Number(b))
                    .forEach((code) =>{

const a = accounts[code];

if(a.debit===0 && a.credit===0)
return;
                    }                        
                       
                        totalDebit += a.debit;
                        totalCredit += a.credit;

                        // Di sini kita kekalkan font standard dan padding (p-3) mengikut kod asal
                        html += `
                            <tr class="border-b">
                                <td class="p-3">${code}</td>
                                <td class="p-3">${a.name}</td>
                                <td class="p-3 text-right">RM${money(a.debit)}</td>
                                <td class="p-3 text-right">RM${money(a.credit)}</td>
                            </tr>
                        `;
                    });

                // Add totals row at the bottom
                html += `
                    <tr class="bg-gray-100 font-bold">
                        <td colspan="2" class="p-3">TOTAL</td>
                        <td class="p-3 text-right">RM${money(totalDebit)}</td>
                        <td class="p-3 text-right">RM${money(totalCredit)}</td>
                    </tr>
                `;

                document.getElementById("tbTable").innerHTML = html;

            } catch (error) {
                console.error("Ralat memuatkan data:", error);
                document.getElementById("tbTable").innerHTML = `
                    <tr>
                        <td colspan="4" class="p-8 text-center text-red-500 font-medium">
                            Gagal memuatkan data dari pangkalan data. Sila cuba sekali lagi.
                        </td>
                    </tr>
                `;
            }
        }

        // Run fetch on load
        fetchTrialBalance();
    </script>

</body>
</html>
