<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trial Balance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar styling for a cleaner look on mobile */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- HEADER -->
    <div class="bg-[#153638] text-white shadow-md">
        <div class="max-w-7xl mx-auto p-5">
            <h1 class="text-2xl font-bold">Trial Balance</h1>
            <p class="text-gray-300 text-sm mt-1">Imbangan Duga Syarikat</p>
        </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="max-w-7xl mx-auto p-5">

        <!-- Back Button -->
        <a href="accounts-dashboard.html" class="inline-flex items-center bg-white text-gray-700 hover:bg-gray-200 shadow-sm px-5 py-2.5 rounded-xl mb-6 font-medium transition-colors">
            &larr; <span class="ml-2">Akaun</span>
        </a>

        <!-- Mobile Scroll Instruction (Only visible on small screens) -->
        <div class="flex items-center text-xs text-gray-500 mb-2 md:hidden bg-blue-50 border border-blue-100 p-3 rounded-xl">
            <svg class="w-4 h-4 mr-2 text-blue-500 animate-pulse flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
            </svg>
            <span>Tatal (scroll) ke kanan untuk melihat jumlah penuh Debit & Kredit.</span>
        </div>

        <!-- TABLE CONTAINER WITH SCROLL SUPPORT -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto custom-scrollbar">
                <!-- min-w-[600px] forces the table to maintain at least 600px width on mobile, triggering the scrollbar -->
                <table class="w-full min-w-[600px] md:min-w-full divide-y divide-gray-200">
                    <thead class="bg-[#153638] text-white">
                        <tr>
                            <th class="p-4 text-left font-semibold text-sm w-1/6">Code</th>
                            <th class="p-4 text-left font-semibold text-sm w-1/2">Account</th>
                            <th class="p-4 text-right font-semibold text-sm w-1/6">Debit</th>
                            <th class="p-4 text-right font-semibold text-sm w-1/6">Credit</th>
                        </tr>
                    </thead>
                    <tbody id="tbTable" class="divide-y divide-gray-100 text-sm">
                        <!-- Loading placeholder while fetching data -->
                        <tr>
                            <td colspan="4" class="p-8 text-center text-gray-500">
                                <div class="flex flex-col items-center justify-center space-y-2">
                                    <div class="w-6 h-6 border-2 border-[#153638] border-t-transparent rounded-full animate-spin"></div>
                                    <span>Memuatkan data imbangan...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
            authDomain: "alqawthar-mywaris.firebaseapp.com",
            projectId: "alqawthar-mywaris",
            storageBucket: "alqawthar-mywaris.firebasestorage.app",
            messagingSenderId: "3498810778",
            appId: "1:3498810778:web:ee36e0fe42f76698046e23"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function fetchTrialBalance() {
            try {
                const snap = await getDocs(collection(db, "ledger"));
                
                // Debug broken records in console
                snap.forEach((d) => {
                    const row = d.data();
                    if (!row.accountCode || !row.account) {
                        console.log("BROKEN RECORD", d.id, JSON.stringify(row));
                    }
                });

                const accounts = {};

                snap.forEach((d) => {
                    const row = d.data();
                    const code = row.accountCode || "0000";

                    if (!accounts[code]) {
                        accounts[code] = {
                            name: row.account || "Akaun Tidak Diketahui",
                            debit: 0,
                            credit: 0
                        };
                    }

                    accounts[code].debit += Number(row.debit || 0);
                    accounts[code].credit += Number(row.credit || 0);
                });

                let html = "";
                let totalDebit = 0;
                let totalCredit = 0;

                // Sort accounts by code and append to UI
                Object.keys(accounts)
                    .sort()
                    .forEach((code) => {
                        const a = accounts[code];
                        totalDebit += a.debit;
                        totalCredit += a.credit;

                        html += `
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="p-4 font-mono text-xs font-semibold text-gray-600">${code}</td>
                                <td class="p-4 font-medium text-gray-800">${a.name}</td>
                                <td class="p-4 text-right text-gray-900 font-medium">RM${a.debit.toLocaleString("ms-MY", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                                <td class="p-4 text-right text-gray-900 font-medium">RM${a.credit.toLocaleString("ms-MY", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                            </tr>
                        `;
                    });

                // Add totals row at the bottom
                html += `
                    <tr class="bg-gray-50 font-bold border-t border-gray-200 text-gray-800">
                        <td colspan="2" class="p-4 text-left uppercase tracking-wider text-xs">Jumlah Keseluruhan (Total)</td>
                        <td class="p-4 text-right text-blue-700">RM${totalDebit.toLocaleString("ms-MY", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                        <td class="p-4 text-right text-blue-700">RM${totalCredit.toLocaleString("ms-MY", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                    </tr>
                `;

                document.getElementById("tbTable").innerHTML = html;

            } catch (error) {
                console.error("Ralat memuatkan data:", error);
                document.getElementById("tbTable").innerHTML = `
                    <tr>
                        <td colspan="4" class="p-8 text-center text-red-500 font-medium">
                            Gagal memuatkan data dari pangkalan data. Sila cuba sekali lagi.
                        </td>
                    </tr>
                `;
            }
        }

        // Run fetch on load
        fetchTrialBalance();
    </script>

</body>
</html>
