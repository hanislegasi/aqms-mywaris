<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultant Payable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: Inter, sans-serif;
        }
        /* Custom scrollbar styling for mobile */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="bg-gray-100">

    <div class="bg-[#153638] text-white p-5">
        <h1 class="text-2xl font-bold">
            Consultant Payable
        </h1>
    </div>

    <div class="max-w-7xl mx-auto p-5">

        <a href="accounts-dashboard.html" class="inline-block bg-gray-200 px-5 py-3 rounded-xl mb-5 text-gray-800">
            &larr; Akaun
        </a>

        <!-- Mobile Scroll Instruction (Only visible on small screens) -->
        <div class="flex items-center text-sm text-gray-500 mb-2 md:hidden">
            <svg class="w-4 h-4 mr-2 text-blue-500 animate-pulse flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
            </svg>
            <span>Tatal (scroll) ke kanan untuk melihat jadual penuh.</span>
        </div>

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full min-w-[600px]">
                    <thead class="bg-[#153638] text-white">
                        <tr>
                            <th class="p-3 text-left">Consultant</th>
                            <th class="p-3 text-left">Nama</th>
                            <th class="p-3 text-right">Amount</th>
                            <th class="p-3 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="payableTable">
                        <!-- Loading placeholder -->
                        <tr>
                            <td colspan="4" class="p-5 text-center text-gray-500">Memuatkan data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Custom Message Box -->
    <div id="customAlert" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4">
        <div class="bg-white p-6 rounded-xl shadow-xl max-w-sm w-full text-center">
            <!-- Icon Background & SVG dynamic update -->
            <div id="alertIconBg" class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 transition-colors">
                <span id="alertIcon">
                    <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </span>
            </div>
            <h3 id="alertTitle" class="text-xl font-bold text-gray-800 mb-2">Berjaya!</h3>
            <p id="alertMessage" class="text-gray-600 mb-6">Mesej di sini</p>
            <button onclick="closeCustomAlert()" class="bg-[#153638] text-white px-6 py-2 rounded-lg w-full font-medium hover:bg-[#0f2728] transition-colors">
                Tutup & Muat Semula
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
addDoc,
query,
orderBy,
limit,
where
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
            authDomain: "alqawthar-mywaris.firebaseapp.com",
            projectId: "alqawthar-mywaris",
            storageBucket: "alqawthar-mywaris.firebasestorage.app",
            messagingSenderId: "3498810778",
            appId: "1:3498810778:web:ee36e0fe42f76698046e23"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fetch data
       const snap =
await getDocs(
query(
collection(
db,
"ledger"
),
orderBy(
"date",
"desc"
),
limit(500)
)
);
        const payable = {};

        snap.forEach((d) => {
            const row = d.data();
            
           if(
!["2000","2100","2150"].includes(row.accountCode)
||
!row.description.startsWith("AQC")
){
return;
}
            const consultantNo =
row.consultantNo;

const consultantName =
row.consultantName;

const consultant =
consultantNo + " " + consultantName;

            if(!payable[consultant]){

payable[consultant]={

commission:0,
override:0,
usb:0,
total:0

};

}

if(row.accountCode==="2000"){

payable[consultant].commission +=
Number(row.credit||0);

payable[consultant].commission -=
Number(row.debit||0);

}

if(row.accountCode==="2100"){

payable[consultant].override +=
Number(row.credit||0);

payable[consultant].override -=
Number(row.debit||0);

}

if(row.accountCode==="2150"){

payable[consultant].usb +=
Number(row.credit||0);

payable[consultant].usb -=
Number(row.debit||0);

}

payable[consultant].total =
payable[consultant].commission +
payable[consultant].override +
payable[consultant].usb;

});
            
        let html = "";

        Object.keys(payable).forEach((consultant)=>{

    if(payable[consultant].total<=0){
        return;
    }
            html += `
                <tr class="border-b">
                    <td class="p-3">${consultant.split(" ")[0]}</td>
                    <td class="p-3">${consultant}</td>
                    <td class="p-3 text-right font-semibold">RM${payable[consultant].total.toFixed(2)}</td>
                    <td class="p-3 text-center space-x-2">

<button
onclick="toggleDetail('${consultant.split(" ")[0]}')"
class="bg-blue-600 text-white px-4 py-2 rounded-lg">

View

</button>

<button
onclick="generatePV(
'${consultant}',
this
)"

class="bg-green-600 text-white px-4 py-2 rounded-lg">

Generate PV

</button>

</td>
                </tr>

<tr
id="${consultant.split(" ")[0]}"
class="hidden bg-gray-50">

<td colspan="4" class="p-5">

<div class="grid grid-cols-3 gap-4">

<div>
<b>Commission</b><br>
RM${payable[consultant].commission.toFixed(2)}
</div>

<div>
<b>Override</b><br>
RM${payable[consultant].override.toFixed(2)}
</div>

<div>
<b>USB</b><br>
RM${payable[consultant].usb.toFixed(2)}
</div>

</div>

</td>

</tr>

`;
        });

        document.getElementById("payableTable").innerHTML = html || '<tr><td colspan="4" class="p-5 text-center text-gray-500">Tiada rekod setakat ini.</td></tr>';

window.generatePV = async (
consultant,
button
) => {

try{

button.disabled = true;

const consultantNo =
consultant.split(" ")[0];

const consultantName =
consultant.substring(
consultantNo.length + 1
);

const item =
payable[consultant];

const amount =
item.total;




const currentPeriod =
new Date().getFullYear()
+
"-" +
String(
new Date().getMonth()+1
).padStart(2,"0");
    
const pvNo =
"PV-" +
Date.now();

const existingPV =
await getDocs(
query(
collection(
db,
"paymentVouchers"
),
where(
"consultantNo",
"==",
consultantNo
),
where(
"period",
"==",
currentPeriod
)
)
);

if(!existingPV.empty){

alert(
consultantNo +
" telah mempunyai PV bagi bulan ini"
);

button.disabled = false;

return;

}

const coaSnap =
await getDocs(
collection(db,"chartOfAccounts")
);

const coaMap = {};

coaSnap.forEach((d)=>{

const coa =
d.data();

coaMap[coa.code] =
coa;

});

const payableAccounts = [];

function addPayable(code, amount){

if(amount<=0) return;

const coa =
coaMap[code];

if(!coa){

alert("COA "+code+" tidak dijumpai.");

return;

}
    
payableAccounts.push({

accountCode: coa.code,
accountName: coa.name,

category: coa.category,
cashFlowType: coa.cashFlowType,
normalBalance: coa.normalBalance,
reportGroup: coa.reportGroup,

amount:Number(amount)

});

}



addPayable(
"2000",
item.commission
);

addPayable(
"2100",
item.override
);

addPayable(
"2150",
item.usb
);

    
await addDoc(
collection(
db,
"paymentVouchers"
),
{
pvNo,

consultantNo,

consultantName,

type:
"CONSULTANT",

period:
currentPeriod,

description:
"Consultant Payable " +
currentPeriod,

amount,

accountCode:"MULTI",
accountName:"Consultant Payable",

category:"Liability",
cashFlowType:"Operating",
normalBalance:"Credit",
reportGroup:"Balance Sheet",
    
accounts:
payableAccounts,

status:
"PENDING",

createdAt:
new Date()
}
);

alert(
"Payment Voucher Created"
);
    
location.href =
"payment-voucher.html";

}
catch(err){

button.disabled=false;

console.error(err);

alert(err.message);

}

};

window.toggleDetail = function(id){

document
.getElementById(id)
.classList
.toggle("hidden");

};

</script>

</body>
</html>
