<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consultant Payable</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
font-family: Inter, sans-serif;
}

</style>
  
</head>

<body class="bg-gray-100">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">
Consultant Payable
</h1>

</div>

<div class="max-w-7xl mx-auto p-5">

<a
href="accounts-dashboard.html"
class="inline-block bg-gray-200 px-5 py-3 rounded-xl mb-5">

← Akaun

</a>

<div class="bg-white rounded-xl shadow overflow-hidden">

<table class="w-full">

<thead class="bg-[#153638] text-white">

<tr>

<th class="p-3 text-left">
Consultant
</th>

<th class="p-3 text-left">
Nama
</th>

<th class="p-3 text-right">
Amount
</th>

<th class="p-3 text-center">
Action
</th>

</tr>

</thead>

<tbody id="payableTable">

</tbody>

</table>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
authDomain:"alqawthar-mywaris.firebaseapp.com",
projectId:"alqawthar-mywaris",
storageBucket:"alqawthar-mywaris.firebasestorage.app",
messagingSenderId:"3498810778",
appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const snap =
await getDocs(
collection(db,"ledger")
);

const payable = {};

snap.forEach((d)=>{

const row = d.data();

if(
row.accountCode !== "2000"
||
!row.description.startsWith("AQC")
) return;

const consultant =
row.description;

if(!payable[consultant]){

payable[consultant] = 0;

}

payable[consultant] +=
Number(row.credit || 0);

});

let html = "";

Object.keys(payable)
.forEach((consultant)=>{

html += `

<tr class="border-b">

<td class="p-3">
${consultant.split(" ")[0]}
</td>

<td class="p-3">
${consultant}
</td>

<td class="p-3 text-right font-semibold">
RM${payable[consultant].toFixed(2)}
</td>

<td class="p-3 text-center">

<button
onclick="generatePV(
'${consultant.split(" ")[0]}',
'${consultant}',
${payable[consultant]}
)"
class="bg-green-600 text-white px-4 py-2 rounded-lg">

Generate PV

</button>

</td>

</tr>

`;

});


  
document.getElementById(
"payableTable"
).innerHTML =
html;

window.generatePV =
async(
consultantNo,
consultantName,
amount
)=>{

const pvNo =
"PV-" +
Date.now();

await addDoc(
collection(
db,
"paymentVouchers"
),
{

pvNo,

consultantNo,

consultantName,

amount,

status:
"PENDING",

createdAt:
new Date()

});

alert(
"PV berjaya dijana"
);

location.reload();

};
  
</script>
  
</div>

</body>
</html>
