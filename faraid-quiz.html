<body class="bg-gray-100">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-3xl font-bold">

<p>

<div class="max-w-4xl mx-auto p-5">

<a

class="inline-block bg-gray-200 hover:bg-gray-300 px-5 py-3 rounded-xl font-semibold mb-5">

</a>

<form id="quizForm">

<div id="questionsContainer"></div>

<button
type="submit"
class="bg-[#153638] text-white px-8 py-4 rounded-xl font-bold mt-5">

Hantar Jawapan

</button>

</form>

<div id="result" class="mt-5"></div>
 
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
updateDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:"alqawthar-mywaris.firebaseapp.com",

projectId:"alqawthar-mywaris",

storageBucket:"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:"3498810778",

appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

currentUser = user;

});


 




const questions = [

{
question:"Apakah maksud faraid?",
options:[
"Pembahagian harta pusaka menurut syarak",
"Pemberian hibah",
"Penamaan wasi",
"Wakaf harta"
],
answer:"A"
},

{

options:[
"Kematian pemilik harta",
"Hibah dibuat",
"Wasiat ditulis",
"Pembelian aset"
],
answer:"A"
},

{
question:"Sumber utama hukum faraid ialah:",
options:[
"Al-Quran",
"Akta Syarikat",
"Kanun Tanah",
"Perlembagaan"
],
answer:"A"
},

{
question:"Antara tujuan faraid ialah:",
options:[
"Menjamin keadilan waris",
"Menghapuskan waris",
"Menambah hutang",
"Mengurangkan aset"
],
answer:"A"
},

{
question:"Siapakah waris utama lelaki?",
options:[
"Anak lelaki",
"Jiran",
"Kawan",
"Peguam"
],
answer:"A"
},

{
question:"Anak perempuan termasuk dalam kategori:",
options:[
"Waris faraid",
"Bukan waris",
"Wasi",
"Pentadbir"
],
answer:"A"
},

{
question:"Faraid ditetapkan oleh:",
options:[
"Mahkamah sahaja",
"Individu",
"Allah SWT",
"Wasi"
],
answer:"C"
},

{
question:"Apakah maksud asabah?",
options:[
"Waris yang menerima baki pusaka",
"Wasi",
"Penerima hibah",
"Saksi"
],
answer:"A"
},

{
question:"Hijab dalam faraid bermaksud:",
options:[
"Penghalang waris menerima pusaka",
"Dokumen hibah",
"Pembahagian hibah",
"Wakaf"
],
answer:"A"
},

{
question:"Antara waris perempuan ialah:",
options:[

"Majikan"
],
answer:"A"
},

{
question:"Harta pusaka perlu diselesaikan selepas:",
options:[

],
answer:"A"
},

{
question:"Siapakah yang perlu didahulukan sebelum pembahagian pusaka?",
options:[
"Penyelesaian hutang si mati",
"Jiran",
"Majikan",

],
answer:"A"
},

{
question:"Faraid termasuk dalam bidang:",
options:[
"Muamalat Islam",
"Cukai",
"Perbankan",
"Pelaburan"
],
answer:"A"
},

{
question:"Tujuan latihan faraid untuk konsultan ialah:",
options:[
"Membantu pelanggan memahami pusaka",
"Menjadi hakim",
"Menjadi peguam",
"Menggantikan mahkamah"
],
answer:"A"
},

{
question:"Faraid tidak boleh diubah kerana:",
options:[
"Telah ditetapkan syarak",

"Ikut peguam"
],
answer:"A"
},

{
question:"Anak lelaki biasanya menerima:",
options:[

],
answer:"A"
},

{
question:"Isteri adalah:",
options:[

],
answer:"A"
},

{
question:"Pembekuan harta boleh berlaku jika:",
options:[
"Tiada pengurusan pusaka",

"Takaful dibayar"
],
answer:"A"
},

{
question:"Perancangan harta membantu:",
options:[
"Memudahkan pentadbiran pusaka",
"Menghapuskan waris",
"Menambah hutang",
"Mengurangkan hak waris"
],
answer:"A"
},

{
question:"Apakah objektif utama modul Faraid?",
options:[
"Memahami asas pembahagian pusaka Islam",
"Menjadi hakim syarie",
"Menjadi peguam",
"Menggantikan faraid"
],
answer:"A"
}
];
 
const container =
document.getElementById(
"questionsContainer"
);

questions.forEach((q,index)=>{

let html = `

<div class="bg-white rounded-2xl border border-gray-200 p-6 mb-5">

<h2 class="font-bold mb-4">

${index+1}. ${q.question}

</h2>

`;

q.options.forEach((option,optIndex)=>{

const letter =
["A","B","C","D"][optIndex];

html += `

<label class="block mb-2">

<input
type="radio"
name="q${index}"
value="${letter}">

${option}

</label>

`;

});

html += `</div>`;

container.innerHTML += html;

});

document
.getElementById("quizForm")
.addEventListener("submit", async(e)=>{

e.preventDefault();

let correct = 0;

questions.forEach((q,index)=>{

const selected =
document.querySelector(
`input[name="q${index}"]:checked`
)?.value;

if(selected === q.answer){

correct++;

}

});

let answered = 0;

questions.forEach((q,index)=>{

const selected =
document.querySelector(
`input[name="q${index}"]:checked`
);

if(selected){

answered++;

}

});

if(answered < questions.length){

alert(
"Sila jawab semua soalan terlebih dahulu."
);

return;

}
 
const score =
Math.round(
(correct/questions.length)*100
);

const result =
document.getElementById(
"result"
);

if(score >= 80){

result.innerHTML = `

<div class="bg-green-100 text-green-700 p-5 rounded-xl">

<h2 class="font-bold text-xl">

LULUS ✅

</h2>

<p>

Markah:
${score}%

</p>

</div>

`;

const userSnap =
await getDoc(
doc(
db,
"users",
currentUser.uid
)
);

const oldData =
userSnap.data();

const oldScore =
oldData?.training?.faraid?.bestScore || 0;

const oldAttempts =
oldData?.training?.faraid?.attempts || 0;

const bestScore =
Math.max(
oldScore,
score
);

console.log("FARAID UPDATE RUNNING");
console.log("Score:", score);
console.log("Best:", bestScore);
console.log("Attempts:", oldAttempts + 1);
 
await updateDoc(
doc(
db,
"users",
currentUser.uid
),
{
"training.faraid.status":"passed",

"training.faraid.bestScore":
bestScore,

"training.faraid.lastScore":
score,

"training.faraid.attempts":
oldAttempts + 1,

"training.faraid.completedAt":
new Date()
}
);
 
}
else{

result.innerHTML = `

<div class="bg-red-100 text-red-700 p-5 rounded-xl">

<h2 class="font-bold text-xl">

GAGAL ❌

</h2>

<p>

Markah:
${score}%

</p>

<p>

Minimum lulus adalah 80%

</p>

</div>

`;


 
}

});

</script>

</body>
</html>
