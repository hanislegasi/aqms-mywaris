<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>General Ledger</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
<style>
body{
font-family: Inter, sans-serif;
}
</style>
  
</head>

<body class="bg-gray-100">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">
General Ledger
</h1>


  
</div>

<div class="max-w-6xl mx-auto p-5">
  
<div class="flex items-center gap-3 mb-6">

<a
href="accounts-dashboard.html"
class="h-12 px-6 flex items-center justify-center bg-gray-200 hover:bg-gray-300 rounded-xl font-medium">

← Akaun

</a>

<button
id="exportPdfBtn"
class="h-12 px-6 flex items-center justify-center bg-red-600 hover:bg-red-700 text-white rounded-xl font-medium">

Export PDF

</button>

</div>
  
<div class="grid md:grid-cols-4 gap-3 mb-6">

<input
type="date"
id="dateFrom"
class="border rounded-xl p-3 h-12">
  
<input
type="date"
id="dateTo"
class="border rounded-xl p-3 h-12">

<input
type="text"
id="ledgerSearch"
placeholder="Cari kod, nama atau description..."
class="border rounded-xl p-3 h-12">
  
</div>

<div
id="plCard"
class="space-y-5">

Loading...

</div>
  

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
authDomain:"alqawthar-mywaris.firebaseapp.com",
projectId:"alqawthar-mywaris",
storageBucket:"alqawthar-mywaris.firebasestorage.app",
messagingSenderId:"3498810778",
appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

function money(value){

    return Number(value || 0).toLocaleString(
        "en-US",
        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }
    );

}
  
const snap =
await getDocs(
collection(db,"ledger")
);


  
const accounts = {};

snap.forEach((d)=>{

const row = d.data();

const code =
String(row.accountCode);

if(!accounts[code]){

accounts[code] = {

account:
row.account,

rows:[],

debit:0,

credit:0,

balance:0

};

}
accounts[code].rows.push(row);

accounts[code].debit +=
Number(row.debit || 0);

accounts[code].credit +=
Number(row.credit || 0);

});

let originalHtml = "";
  
let html = "";

Object.keys(accounts)
.sort()
.forEach((code)=>{

const acc =
accounts[code];

const dates =
acc.rows.map(r=>{

if(r.date?.toDate){

return r.date.toDate()
.toISOString()
.substring(0,10);

}

return "";

});

const latestDate =
dates.sort().reverse()[0] || "";

html += `

<div
class="ledger-card bg-white rounded-xl shadow-sm border p-4 mb-4"
data-date="${latestDate}">

<h2 class="text-xl font-bold mb-3">
${code} - ${acc.account}
</h2>

<table class="w-full text-sm">

<thead>

<tr class="bg-[#153638] text-white">

<th class="p-3 text-left">Date</th>
<th class="p-3 text-left">Description</th>
<th class="p-3 text-right">Debit</th>
<th class="p-3 text-right">Credit</th>
<th class="p-3 text-right">Balance</th>

</tr>

</thead>

<tbody>

`;

acc.rows.sort((a,b)=>{

const dateA =
a.date?.toDate
? a.date.toDate()
: new Date(a.date);

const dateB =
b.date?.toDate
? b.date.toDate()
: new Date(b.date);

return dateA - dateB;

});

let balance = 0;

acc.rows.forEach((row)=>{

const rowDate =
row.date?.toDate()
.toISOString()
.substring(0,10);

  
balance +=
Number(row.debit || 0);

balance -=
Number(row.credit || 0);

html += `

<tr
class="ledger-row border-b hover:bg-gray-50"
data-date="${rowDate}">

<td class="p-3">
${
row.date?.toDate
?
row.date.toDate().toLocaleDateString("ms-MY")
:
"-"
}
</td>

<td class="p-3">
${row.description || "-"}
</td>

<td class="p-3 text-right">
RM${money(row.debit)}
</td>

<td class="p-3 text-right">
RM${money(row.credit)}
</td>

<td class="p-3 text-right">
RM${money(balance)}
</td>

</tr>
`;

});

html += `

<tr class="font-bold bg-gray-100">

<td colspan="2" class="p-3">
TOTAL
</td>

<td class="p-3 text-right">
RM${money(acc.debit)}
</td>

<td class="p-3 text-right">
RM${money(acc.credit)}
</td>

<td class="p-3 text-right">
RM${money(balance)}
</td>

</tr>

</table>

</div>

`;

});

originalHtml = html;

document.getElementById(
"plCard"
).innerHTML =
html;

function filterLedger(){

const keyword =
document
.getElementById("ledgerSearch")
.value
.toLowerCase();

const from =
document
.getElementById("dateFrom")
.value;

const to =
document
.getElementById("dateTo")
.value;

document
.querySelectorAll(".ledger-card")
.forEach(card=>{

let visibleRows=0;

card
.querySelectorAll(".ledger-row")
.forEach(row=>{

const text =
row.innerText.toLowerCase();

const rowDate =
row.dataset.date;

let show=true;

if(keyword && !text.includes(keyword))
show=false;

if(from && rowDate<from)
show=false;

if(to && rowDate>to)
show=false;

row.style.display =
show
? ""
: "none";

if(show)
visibleRows++;

});

card.style.display =
visibleRows>0
? ""
: "none";

});
}

document
.getElementById("ledgerSearch")
.addEventListener(
"input",
filterLedger
);

document
.getElementById("dateFrom")
.addEventListener(
"change",
filterLedger
);

document
.getElementById("dateTo")
.addEventListener(
"change",
filterLedger
);

document
.getElementById("exportPdfBtn")
.addEventListener(
"click",
()=>{

html2pdf().set({

margin:0.3,

filename:"General-Ledger.pdf",

image:{
type:"jpeg",
quality:1
},

html2canvas:{
scale:2
},

jsPDF:{
unit:"in",
format:"a4",
orientation:"portrait"
}

})
.from(
document.getElementById("plCard")
)
.save();

});
  
</script>

</body>
</html>
