<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pembayaran</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:Inter,sans-serif;
}
</style>
  
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-5">

<div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl">

<h1 class="text-3xl font-bold text-[#153638] mb-2">
Wasiat
</h1>

<p class="text-gray-500 mb-8">
Bayaran Pendaftaran
</p>

<div class="bg-gray-100 rounded-2xl p-5 mb-8">

<div class="flex justify-between mb-3">

<span>
Produk
</span>

<span class="font-semibold">
Wasiat
</span>

</div>

<div class="flex justify-between">

<span>
Jumlah
</span>

<span class="text-2xl font-bold text-[#153638]">
RM350
</span>

</div>

</div>

<button
id="payBtn"
class="w-full bg-[#153638] hover:bg-[#1d4a4d] transition text-white py-4 rounded-2xl font-semibold">

Bayar Sekarang

</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
updateDoc,
getDoc,
increment,
collection,
getDocs,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const firebaseConfig = {

apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
authDomain: "alqawthar-mywaris.firebaseapp.com",
projectId: "alqawthar-mywaris",
storageBucket: "alqawthar-mywaris.firebasestorage.app",
messagingSenderId: "3498810778",
appId: "1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

currentUser = user;

});

document
.getElementById("payBtn")
.addEventListener("click", async()=>{

try{

// ambil counter
const counterRef =
doc(
db,
"system",
"counter"
);

const counterSnap =
await getDoc(counterRef);

const currentNo =
counterSnap.data().memberCounter || 0;

const newNo =
currentNo + 1;

// update counter
await updateDoc(
counterRef,
{
memberCounter:
increment(1)
}
);
  
// generate AQM number
const latestCounter =
await getDoc(counterRef);

const memberNo =
"AQM" +
String(
latestCounter.data().memberCounter
).padStart(4,"0");

  



// update user
await updateDoc(

doc(
db,
"users",
currentUser.uid
),

{

paymentStatus:"paid",

memberNo,

memberSince:
new Date().toISOString(),

expiryDate:(()=>{

const d=new Date();

d.setFullYear(
d.getFullYear()+1
);

return d.toISOString();

})()

}

);

const customerSnap =
await getDoc(
doc(
db,
"users",
currentUser.uid
)
);

const customer =
customerSnap.data();
  
await addDoc(
collection(db,"ledger"),
{

date:new Date(),

accountCode:"4000",
account:"Sales - eWasiat",

category:"income",

description:
memberNo + " " + customer.nama,

debit:0,

credit:350

}
);

await addDoc(
collection(db,"ledger"),
{
date:new Date(),

accountCode:"1000",
account:"Bank",

category:"asset",

description:
memberNo + " " + customer.nama,

debit:350,
credit:0,

paymentType:"CUSTOMER",
sourceAccount:"4000",
transactionGroup:memberNo
});
  
const compensationSnap =
await getDoc(
doc(
db,
"settings",
"compensation"
)
);

const comp =
compensationSnap.data();

const saleAmount = 350;

const shareholder =
saleAmount *
(comp.shareholderPool / 100);

const company =
saleAmount *
(comp.companyPool / 100);

const allowance =
saleAmount *
(comp.allowance / 100);

const adminOperation =
saleAmount *
(comp.adminOperation / 100);

const royalty =
saleAmount *
(comp.royalty / 100);

await addDoc(
collection(
db,
"companyAllocation"
),
{
createdAt:new Date(),

memberNo,
customerName:
customer.nama,

product:
"eWasiat",

sale:
saleAmount,

shareholder,
company,

allowance,
adminOperation,
royalty
}
);




const consultantSnap =
await getDocs(
collection(db,"consultants")
);

const allConsultants = [];

consultantSnap.forEach((d)=>{

allConsultants.push({
id:d.id,
...d.data()
});

});
  
function getOverrideRate(level){

if(level === "AQC") return 0;
if(level === "AQC-AS") return 3;
if(level === "AQC-UM") return 7;
if(level === "MGAM") return 12;

return 0;

}

function getCommissionRate(level){

if(level === "AQC") return 35;

if(level === "AQC-AS") return 38;

if(level === "AQC-UM") return 40;

if(level === "MGAM") return 45;

return 35;

}
  
  
function findConsultant(no){

return allConsultants.find(
u=>u.consultantNo===no
);

}

const directConsultant =
findConsultant(
customer.referral
);
  
let currentConsultant =
findConsultant(
customer.referral
);

if(directConsultant){

const commissionRate =
getCommissionRate(
directConsultant.consultantLevel
);

const commissionAmount =
350 *
commissionRate /
100;



  

await addDoc(
collection(db,"ledger"),
{

date:new Date(),

accountCode:"2000",
account:"Consultant Payable",

consultantNo:
directConsultant.consultantNo,

consultantName:
directConsultant.nama,
  
category:"liability",

description:
directConsultant.consultantNo +
" " +
directConsultant.nama,

debit:0,

credit:commissionAmount

}
);

await updateDoc(
doc(db,"consultants",directConsultant.id),
{
activeClients: increment(1),
totalSales: increment(350),
careerSales: increment(350),
totalCommission: increment(commissionAmount)
}
);
  
}
  
while(currentConsultant){

const upline =
findConsultant(
currentConsultant.upline
);

if(!upline) break;

const diffRate =
Math.max(
0,
getOverrideRate(
upline.consultantLevel
)
-
getOverrideRate(
currentConsultant.consultantLevel
)
);

const overrideAmount =
350 * diffRate / 100;



  

await addDoc(
collection(db,"ledger"),
{

date:new Date(),

accountCode:"2000",
account:"Consultant Payable",

consultantNo:
directConsultant.consultantNo,

consultantName:
directConsultant.nama,
  
category:"liability",

description:
upline.consultantNo +
" " +
upline.nama,

debit:0,

credit:overrideAmount

}
);
  
await updateDoc(
doc(
db,
"consultants",
upline.id
),
{
careerSales: increment(350),
totalOverriding: increment(overrideAmount)
}
);

await addDoc(
collection(
db,
"overrideHistory"
),
{

createdAt:
new Date(),

customerNo:
memberNo,

customerName:
customer.nama,

fromConsultant:
currentConsultant.consultantNo,

fromName:
currentConsultant.nama,

fromLevel:
currentConsultant.consultantLevel,

receiver:
upline.consultantNo,

receiverName:
upline.nama,

receiverLevel:
upline.consultantLevel,

sales:350,

diffRate:
diffRate,

override:
overrideAmount

}
);

currentConsultant =
upline;

}

// =====================
// CREATE PAYMENT RECEIPT
// =====================

await addDoc(
collection(db,"receipts"),
{

receiptNo:
"WST-" + Date.now(),

uid:currentUser.uid,

memberNo:memberNo,

payerName:customer.nama,

serviceCode:"WASIAT",

serviceName:"e-Wasiat Registration",

amount:350,

paymentMethod:"ToyyibPay",

status:"PAID",

paymentDate:new Date()

}
);
  
alert(
"Pembayaran berjaya"
);

window.location.href =
"dashboard.html";

}

catch(error){

console.log(error);

}

});

</script>

</body>
</html>
