<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profit & Loss</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
<style>
body{
font-family: Inter, sans-serif;
}
</style>
  
</head>

<body class="bg-gray-100">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">
Profit & Loss
</h1>

</div>

<div class="max-w-5xl mx-auto p-5">

<a
href="accounts-dashboard.html"
class="inline-block bg-gray-200 px-5 py-3 rounded-xl mb-5">

← Akaun

</a>

<button
id="exportPdfBtn"
class="bg-red-600 text-white px-5 py-3 rounded-xl mb-5">

Export PDF

</button>
  
<div id="plCard">

Loading...

</div>
  
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
getDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
authDomain:"alqawthar-mywaris.firebaseapp.com",
projectId:"alqawthar-mywaris",
storageBucket:"alqawthar-mywaris.firebasestorage.app",
messagingSenderId:"3498810778",
appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const settingsSnap =
await getDoc(
doc(db,"settings","company")
);

const settings =
settingsSnap.data();

const companyName =
settings.companyName || "";

const registrationNo =
settings.registrationNo || "";

const financialYearEnd =
settings.financialYearEnd || "";

function money(value){

    return Number(value||0).toLocaleString(
        "en-US",
        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }
    );

}

  
const snap =
await getDocs(
collection(db,"ledger")
);

const coaSnap = await getDocs(
    collection(db,"chartOfAccounts")
);

const coaMap = {};

coaSnap.forEach(doc=>{

    const a = doc.data();

    coaMap[a.code] = a;

});
  




  
const revenue = {};
const expenses = {};

snap.forEach((d)=>{


    const row = d.data();

    const coa =
coaMap[String(row.accountCode)];

    if(!coa) return;

   //==================
// REVENUE
//==================

const type =
coa.type?.toLowerCase();

if(
type=="income" ||
type=="revenue"
){
    if(!revenue[coa.code]){

        revenue[coa.code]={

            code:coa.code,

            name:coa.name,

            amount:0

        };

    }

    revenue[coa.code].amount +=
    Number(row.credit||0);

}



//==================
// EXPENSE
//==================



if(
type=="expense" ||
type=="expenses"
){

    if(!expenses[coa.code]){

        expenses[coa.code]={

            code:coa.code,

            name:coa.name,

            amount:0

        };

    }

    expenses[coa.code].amount +=
    Number(row.debit||0);

}

console.log(
row.accountCode,
coa?.name,
coa?.type,
row.debit
);  
  
});

  
const totalRevenue =
Object.values(revenue)
.reduce(

(total,item)=>

total+item.amount,

0

);

const totalExpense =
Object.values(expenses)
.reduce(

(total,item)=>

total+item.amount,

0

);

const netProfit =
totalRevenue -
totalExpense;
  



  
document.getElementById(
"plCard"
).innerHTML = `

<div class="text-center border-b pb-5 mb-6">

<h1 class="text-3xl font-bold">
${companyName}
</h1>

<p>
Registration No :
${registrationNo}
</p>

<h2 class="text-2xl font-bold mt-4">
STATEMENT OF PROFIT & LOSS
</h2>

<p>
For The Period Ended
${financialYearEnd}
</p>

</div>

<table class="w-full">

<tr class="font-bold border-b">

<td class="py-2">
REVENUE
</td>

<td class="text-right">
Amount
</td>

</tr>

${Object.values(revenue)

.sort((a,b)=>

a.code.localeCompare(b.code)

)

.map(item=>`

<tr>

<td class="pl-6 py-1">

${item.name}

</td>

<td class="text-right">

RM${money(item.amount)}

</td>

</tr>

`)

.join("")}

<tr class="font-bold border-t border-b">

<td class="py-2">
TOTAL REVENUE
</td>

<td class="text-right">
RM${money(totalRevenue)}
</td>

</tr>

<tr>
<td colspan="2" class="py-4"></td>
</tr>

<tr class="font-bold border-b">

<td class="py-2">
EXPENSES
</td>

<td></td>

</tr>

${Object.values(expenses)

.sort((a,b)=>

a.code.localeCompare(b.code)

)

.map(item=>`

<tr>

<td class="pl-6 py-1">

${item.name}

</td>

<td class="text-right">

RM${money(item.amount)}

</td>

</tr>

`)

.join("")}



<tr class="font-bold border-t border-b">

<td class="py-2">
TOTAL EXPENSES
</td>

<td class="text-right">
RM${money(totalExpense)}
</td>

</tr>

<tr>
<td colspan="2" class="py-4"></td>
</tr>

<tr class="bg-green-50 text-green-700 text-xl font-bold">

<td class="py-4 px-2">
NET PROFIT
</td>

<td class="text-right px-2">
RM${money(netProfit)}
</td>

</tr>

</table>

<div class="mt-10 border-t pt-4 text-xs text-gray-500">

Generated :
${new Date().toLocaleString("ms-MY")}

</div>

`; 

document
.getElementById("exportPdfBtn")
.addEventListener("click",()=>{

html2pdf().set({

margin:0.3,

filename:"Profit-Loss.pdf",

image:{
type:"jpeg",
quality:1
},

html2canvas:{
scale:2
},

jsPDF:{
unit:"in",
format:"a4",
orientation:"portrait"
}

})
.from(
document.getElementById("plCard")
)
.save();

});




  
</script>

</body>
</html>
