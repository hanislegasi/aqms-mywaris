<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Mawaris</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen" style="font-family: 'Inter', sans-serif;">

<div class="bg-[#153638] text-white px-5 py-6 shadow">

<h1 class="text-2xl font-bold">
Mawaris
</h1>

<p id="namaUser">
Memuatkan...
</p>

</div>

<div class="p-5">

<h2 class="font-bold text-xl mb-4">
Perkhidmatan
</h2>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">

<a
href="ewasiat.html"
class="bg-white p-6 rounded-2xl shadow hover:shadow-xl transition border border-gray-100 min-h-[120px]">
<div class="flex items-center gap-4">

  <!-- ICON -->
  <div class="bg-[#153638]/10 p-3 rounded-xl">

    <svg xmlns="http://www.w3.org/2000/svg"
      class="w-7 h-7 text-[#153638]"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor">

      <path
         stroke-linecap="round"
  stroke-linejoin="round"
  stroke-width="1.8"
  d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>

    </svg>

  </div>

  <div>

    <p class="text-base md:text-lg font-semibold">
      e-Wasiat
    </p>

    <p
      id="wasiatStatus"
      class="text-xs md:text-sm text-gray-500 mt-1">

      Memuatkan status...

    </p>

  </div>

</div>

</a>

<a
href="hibah.html"
class="bg-white p-6 rounded-2xl shadow hover:shadow-xl transition border border-gray-100 min-h-[120px]">

<div class="flex items-center gap-4">

  <!-- ICON -->
  <div class="bg-[#153638]/10 p-3 rounded-xl">

    <svg xmlns="http://www.w3.org/2000/svg"
      class="w-7 h-7 text-[#153638]"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor">

      <path
        stroke-linecap="round"
  stroke-linejoin="round"
  stroke-width="1.8"
  d="M12 11c0-3-1.5-5-4-5S4 8 4 11c0 3 2 5 4 5s4-2 4-5zm0 0c0-3 1.5-5 4-5s4 2 4 5c0 3-2 5-4 5s-4-2-4-5z"/>

    </svg>

  </div>  
  
<div>

  <p class="text-base md:text-lg font-semibold">
    Hibah
  </p>

  <p
    id="hibahStatus"
    class="text-xs md:text-sm text-gray-500 mt-1">

    Memuatkan status...

  </p>

</div>

</div>

</a>

<a
href="pusaka.html"
class="bg-white p-6 rounded-2xl shadow hover:shadow-xl transition border border-gray-100 min-h-[120px]">

<div class="flex items-center gap-4">

  <!-- ICON -->
  <div class="bg-[#153638]/10 p-3 rounded-xl">

    <svg xmlns="http://www.w3.org/2000/svg"
      class="w-7 h-7 text-[#153638]"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor">

      <path
        stroke-linecap="round"
  stroke-linejoin="round"
  stroke-width="1.8"
  d="M3 10l9-7 9 7v9a2 2 0 01-2 2h-4v-6H9v6H5a2 2 0 01-2-2v-9z"/>

    </svg>

  </div>  
  
<div>

  <p class="text-base md:text-lg font-semibold">
    Pengurusan Pusaka
  </p>

  <p
    id="pusakaStatus"
    class="text-xs md:text-sm text-gray-500 mt-1">

    Memuatkan status...

  </p>

</div>

</div>

</a>

<a
href="dokumen.html"
class="bg-white p-6 rounded-2xl shadow hover:shadow-xl transition border border-gray-100 min-h-[120px]">

<div class="flex items-center gap-4">

  <!-- ICON -->
  <div class="bg-[#153638]/10 p-3 rounded-xl">

    <svg xmlns="http://www.w3.org/2000/svg"
      class="w-7 h-7 text-[#153638]"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor">

      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="1.8"
        d="M9 12h6m-6 4h6M7 4h10a2 2 0 012 2v12a2 2 0 01-2 2H7a2 2 0 01-2-2V6a2 2 0 012-2z"/>

    </svg>

  </div>
  
<div>

  <p class="text-base md:text-lg font-semibold">
    Dokumen Saya
  </p>

  <p class="text-xs md:text-sm text-gray-500 mt-1">
    Muat naik dokumen penting
  </p>

</div>

</div>

</a>
  
</div>

<div class="mt-10 border-t pt-6 flex justify-end">
  
<button
id="logoutBtn"
class="bg-red-600 hover:bg-red-700 transition text-white px-6 py-3 rounded-xl shadow-md">

Logout

</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
authDomain: "alqawthar-mywaris.firebaseapp.com",
projectId: "alqawthar-mywaris",
storageBucket: "alqawthar-mywaris.firebasestorage.app",
messagingSenderId: "3498810778",
appId: "1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.replace("index.html");
return;

}

const docSnap =
await getDoc(
doc(db,"users",user.uid)
);

if(docSnap.exists()){

document.getElementById(
"namaUser"
).innerHTML =
"Selamat datang, "
+ docSnap.data().nama;

// GET WASIAT STATUS
const wasiatSnap =
await getDoc(
  doc(
    db,
    "users",
    user.uid,
    "wasiat",
    "maklumat"
  )
);

if(wasiatSnap.exists()){

  const wasiatData =
  wasiatSnap.data();

  if(wasiatData.status){

    document.getElementById(
      "wasiatStatus"
    ).innerHTML =

    wasiatData.status;

  }

  else{

    document.getElementById(
      "wasiatStatus"
    ).innerHTML =

    "DRAFT";

  }

}

else{

  document.getElementById(
    "wasiatStatus"
  ).innerHTML =

  "Belum Diisi";

}

// GET HIBAH STATUS
const hibahSnap =
await getDoc(
  doc(
    db,
    "users",
    user.uid,
    "hibah",
    "maklumat"
  )
);

if(hibahSnap.exists()){

  const hibahData =
  hibahSnap.data();

  if(hibahData.status){

    document.getElementById(
      "hibahStatus"
    ).innerHTML =

    hibahData.status;

  }

  else{

    document.getElementById(
      "hibahStatus"
    ).innerHTML =

    "DRAFT";

  }

}

else{

  document.getElementById(
    "hibahStatus"
  ).innerHTML =

  "Belum Diisi";

}

// GET PUSAKA STATUS
const pusakaSnap =
await getDoc(
  doc(
    db,
    "users",
    user.uid,
    "pusaka",
    "maklumat"
  )
);

if(pusakaSnap.exists()){

  const pusakaData =
  pusakaSnap.data();

  if(pusakaData.status){

    document.getElementById(
      "pusakaStatus"
    ).innerHTML =

    pusakaData.status;

  }

  else{

    document.getElementById(
      "pusakaStatus"
    ).innerHTML =

    "DRAFT";

  }

}

else{

  document.getElementById(
    "pusakaStatus"
  ).innerHTML =

    "Belum Diisi";

}
  
}

});

document
.getElementById("logoutBtn")
.addEventListener("click", async()=>{

  try{

    await signOut(auth);

    localStorage.clear();

    sessionStorage.clear();

    window.location.replace(
      "index.html"
    );

  }

  catch(error){

    console.log(error);

  }

});

</script>
  
</body>
</html>
