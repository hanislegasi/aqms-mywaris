<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
authDomain: "alqawthar-mywaris.firebaseapp.com",
projectId: "alqawthar-mywaris",
storageBucket: "alqawthar-mywaris.firebasestorage.app",
messagingSenderId: "3498810778",
appId: "1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

onAuthStateChanged(auth, async(user)=>{

if(!user){
window.location.href="login.html";
return;
}

currentUser = user;

const docSnap =
await getDoc(
doc(db,"users",user.uid)
);

if(docSnap.exists()){

const userData =
docSnap.data();
  
document.getElementById(
"namaUser"
).innerHTML =
"Selamat datang, "
+ userData.nama;

document.getElementById("profileCard").innerHTML = `
<div class="grid md:grid-cols-2 gap-5">

<div>
<p class="text-sm text-gray-500">Nama</p>
<p class="font-semibold">${userData.nama}</p>
</div>

<div>
<p class="text-sm text-gray-500">No. Kad Pengenalan</p>
<p class="font-semibold">${userData.ic || "-"}</p>
</div>

<div>
<p class="text-sm text-gray-500">Telefon</p>
<p class="font-semibold">${userData.phone || "-"}</p>
</div>

<div>
<p class="text-sm text-gray-500">Email</p>
<p class="font-semibold">${user.email}</p>
</div>

</div>
`;

document
.getElementById("logoutBtn")
.addEventListener("click", async()=>{

  try{

    await signOut(auth);

    localStorage.clear();

    sessionStorage.clear();

    window.location.replace(
      "index.html"
    );

  }

  catch(error){

    console.log(error);

  }

});

}
});
  
</script>
