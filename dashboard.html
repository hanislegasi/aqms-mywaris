<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Dashboard MyWaris</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">
MyWaris
</h1>

<p id="namaUser">
Memuatkan...
</p>

</div>

<div class="p-5">

<h2 class="font-bold text-xl mb-4">
Perkhidmatan
</h2>

<div class="grid grid-cols-1 gap-4">

<a
href="ewasiat.html"
class="bg-white p-5 rounded-xl shadow">

📜 e-Wasiat

</a>

<a
href="hibah.html"
class="bg-white p-5 rounded-xl shadow">

🎁 Hibah

</a>

<a
href="pusaka.html"
class="bg-white p-5 rounded-xl shadow">

🏠 Pengurusan Pusaka

</a>

</div>

<button
id="logoutBtn"
class="mt-8 bg-red-600 text-white px-5 py-3 rounded-lg">

Logout

</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
authDomain: "alqawthar-mywaris.firebaseapp.com",
projectId: "alqawthar-mywaris",
storageBucket: "alqawthar-mywaris.firebasestorage.app",
messagingSenderId: "3498810778",
appId: "1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href="login.html";
return;

}

const docSnap =
await getDoc(
doc(db,"users",user.uid)
);

if(docSnap.exists()){

document.getElementById(
"namaUser"
).innerHTML =
"Selamat datang, "
+ docSnap.data().nama;

}

});

document
.getElementById("logoutBtn")
.addEventListener("click",()=>{

signOut(auth);

});

</script>
  
</body>
</html>
