<!DOCTYPE html>

<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Voucher</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:Inter,sans-serif;
}
</style>

</head>

<body class="bg-gray-100">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">
Payment Voucher Details
</h1>

</div>

<div class="max-w-3xl mx-auto p-5">

<a
href="payment-voucher.html"
class="inline-block bg-gray-200 px-5 py-3 rounded-xl mb-5">
← Payment Voucher
</a>

<div class="bg-white rounded-xl shadow p-6">

<h2 class="text-xl font-bold mb-5">
Create Payment Voucher
</h2>

<div class="space-y-4">

<div>
<label>PV Type</label>

<select
id="type"
class="w-full border rounded-lg p-3">

<option value="TRAVEL">
Travel Claim
</option>

<option value="MARKETING">
Marketing
</option>

<option value="OFFICE">
Office Expense
</option>

<option value="UTILITY">
Utility
</option>

<option value="RENTAL">
Rental
</option>

<option value="OTHERS">
Others
</option>

</select>
</div>

<div>
<label>Payee</label>

<input
id="payee"
class="w-full border rounded-lg p-3">
</div>

<div>
<label>Description</label>

<textarea
id="description"
class="w-full border rounded-lg p-3">
</textarea>
</div>

<div>
<label>Amount</label>

<input
id="amount"
type="number"
class="w-full border rounded-lg p-3">
</div>

<button
onclick="createPV()"
class="
bg-green-600
text-white
px-6
py-3
rounded-lg
">
Create PV
</button>

</div>

</div>

</div>

<script type="module">
 
import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.createPV = async()=>{

try{

const amount =
Number(
document.getElementById(
"amount"
).value
);

if(amount <= 0){

alert(
"Invalid Amount"
);

return;

}

const pvNo =
"PV-" +
Date.now();

await addDoc(
collection(
db,
"paymentVouchers"
),
{
pvNo,

type:
document.getElementById(
"type"
).value,

payee:
document.getElementById(
"payee"
).value,

description:
document.getElementById(
"description"
).value,

amount,

status:
"PENDING",

manual:
true,

createdAt:
new Date()
}
);

alert(
"Payment Voucher Created"
);

window.location.href =
"payment-voucher.html";

}
catch(err){

alert(
err.message
);

}

};

 </script>
</body>
</html>
