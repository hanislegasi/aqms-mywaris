<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Clients</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body
class="bg-gray-100 min-h-screen"
style="font-family: Inter, sans-serif;">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">
My Clients
</h1>

</div>

<div class="p-5">

<a
href="consultant-dashboard.html"
class="inline-block bg-gray-200 hover:bg-gray-300 px-5 py-3 rounded-xl font-semibold mb-5">

← Kembali ke Dashboard

</a>

<div
class="grid md:grid-cols-3 gap-4 mb-5">

<div class="bg-white p-5 rounded-xl shadow">

<p class="text-gray-500">
Jumlah Client
</p>

<p
id="totalClients"
class="text-3xl font-bold">

0

</p>

</div>

<div class="bg-white p-5 rounded-xl shadow">

<p class="text-gray-500">
Jumlah Sales
</p>

<p
id="totalClientSales"
class="text-3xl font-bold text-green-600">

RM0

</p>

</div>

<div class="bg-white p-5 rounded-xl shadow">

<p class="text-gray-500">
Jumlah Komisen
</p>

<p
id="totalCommission"
class="text-3xl font-bold text-blue-600">

RM0

</p>

</div>

  
</div>
  
<div
id="clientList"
class="overflow-x-auto">

<table class="w-full bg-white rounded-xl overflow-hidden shadow">

<thead class="bg-[#153638] text-white">

<tr>
<th class="p-3 text-left">Bil</th>
<th class="p-3 text-left">Tarikh Daftar</th>
<th class="p-3 text-left">No Ahli</th>
<th class="p-3 text-left">Nama</th>
<th class="p-3 text-left">Telefon</th>
<th class="p-3 text-left">Referral</th>
<th class="p-3 text-left">Sales</th>
<th class="p-3 text-left">Komisen</th>
<th class="p-3 text-left">Tarikh Tamat</th>
<th class="p-3 text-left">Status</th>
<th class="p-3 text-left">Tindakan</th>
</tr>

</thead>

<tbody id="tableBody">

<tr>
<td colspan="8" class="p-5 text-center">
Memuatkan...
</td>
</tr>

</tbody>

</table>

</div>

</div>
  

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
authDomain:"alqawthar-mywaris.firebaseapp.com",
projectId:"alqawthar-mywaris",
storageBucket:"alqawthar-mywaris.firebasestorage.app",
messagingSenderId:"3498810778",
appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);  

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

const consultantSnap =
await getDoc(
doc(
db,
"consultants",
user.uid
)
);

const consultantData =
consultantSnap.data();

console.log(consultantSnap.exists());
console.log(consultantSnap.data());
console.log(consultantData);
  
const consultantNo =
consultantData.consultantNo;

const snap =
await getDocs(
collection(db,"users")
);

let commissionRate = 0;

switch(consultantData.consultantLevel){


    case "AQC":
        commissionRate = 35;
        break;

    case "AQC-AS":
        commissionRate = 38;
        break;

    case "AQC-UM":
        commissionRate = 40;
        break;

    case "MGAM":
        commissionRate = 45;
        break;

    default:
        commissionRate = 0;
}
  
let html = "";
let bil = 1;

let totalClients = 0;
let totalClientSales = 0;
let totalCommission = 0;

snap.forEach((docSnap)=>{

const client =
docSnap.data();

console.log({
nama: client.nama,
role: client.role,
memberNo: client.memberNo,
referral: client.referral,
consultantNo: consultantNo
});
  
if(
client.role !== "customer" ||
!client.memberNo ||
client.referral !== consultantNo
){
return;
}

console.log(
"MASUK",
client.nama
);

let clientSales = 0;
let commission = 0;

if(client.wasiatPaymentStatus === "paid"){

    const sales = 350;

    clientSales += sales;
    commission += sales * (commissionRate / 100);

}

if(client.hibahPaymentStatus === "paid"){

    const sales = 2500;

    clientSales += sales;
    commission += sales * (commissionRate / 100);

}

if(client.sepencarianPaymentStatus === "paid"){

    const sales = 800;

    clientSales += sales;
    commission += sales * (commissionRate / 100);

}

if(client.mawarisPaymentStatus === "paid"){

    const sales = 3000;

    clientSales += sales;
    commission += sales * (commissionRate / 100);

}
  
totalClients++;
totalClientSales += clientSales;
totalCommission += commission;  
  
const expiryDate =
client.expiryDate
? new Date(client.expiryDate)
.toLocaleDateString("ms-MY")
: "-";

const registerDate =
client.createdAt
? client.createdAt.toDate().toLocaleDateString("ms-MY")
: "-";


  
html += `

<tr class="border-b hover:bg-gray-50">

<td class="p-3">
${bil++}
</td>

<td class="p-3">
${registerDate}
</td>

<td class="p-3">
${client.memberNo || "-"}
</td>

<td class="p-3 font-semibold">
${client.nama || "-"}
</td>

<td class="p-3">
${client.telefon || "-"}
</td>

<td class="p-3">
${client.referral || "-"}
</td>

<td class="p-3 text-right font-semibold text-green-600">
RM${clientSales.toLocaleString("en-US",{
    minimumFractionDigits:2,
    maximumFractionDigits:2
})}
</td>

<td class="p-3 text-right font-semibold text-blue-600">
RM${commission.toLocaleString("en-US",{
    minimumFractionDigits:2,
    maximumFractionDigits:2
})}
</td>

<td class="p-3">
${expiryDate}
</td>

<td class="p-3 text-center">

<span class="
px-3 py-1 rounded-full text-xs
client.wasiatPaymentStatus==="paid" ||
client.hibahPaymentStatus==="paid" ||
client.sepencarianPaymentStatus==="paid" ||
client.mawarisPaymentStatus==="paid"
? "bg-green-100 text-green-700"
: "bg-yellow-100 text-yellow-700"}">

${
client.wasiatPaymentStatus==="paid" ||
client.hibahPaymentStatus==="paid" ||
client.sepencarianPaymentStatus==="paid" ||
client.mawarisPaymentStatus==="paid"
? "AHLI AKTIF"
: "PROSPEK"
}
</span>

</td>

<td class="p-3 text-center">

<a
href="consultant-customer-details.html?id=${docSnap.id}"
class="bg-[#153638] text-white px-3 py-2 rounded-lg text-sm">

View

</a>

</td>

</tr>

`;
  
});

document.getElementById(
"totalClients"
).innerHTML =
totalClients;

document.getElementById("totalClientSales").innerHTML =
"RM " +
totalClientSales.toLocaleString("en-US",{
minimumFractionDigits:2,
maximumFractionDigits:2
});

document.getElementById("totalCommission").innerHTML =
"RM " +
totalCommission.toLocaleString("en-US",{
minimumFractionDigits:2,
maximumFractionDigits:2
});

  
document.getElementById(
"tableBody"
).innerHTML =
html || `
<tr>
<td colspan="9" class="p-5 text-center">
Tiada client.
</td>
</tr>
`;

});


</script>

</body>
</html>
