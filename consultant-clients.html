<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Clients</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">
My Clients
</h1>

</div>

<div class="p-5">

<a
href="consultant-dashboard.html"
class="inline-block bg-gray-200 hover:bg-gray-300 px-5 py-3 rounded-xl font-semibold mb-5">

← Kembali ke Dashboard

</a>

<div
id="clientList"
class="space-y-3">

Memuatkan...

</div>

</div>
  

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
authDomain:"alqawthar-mywaris.firebaseapp.com",
projectId:"alqawthar-mywaris",
storageBucket:"alqawthar-mywaris.firebasestorage.app",
messagingSenderId:"3498810778",
appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);  

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

const consultantSnap =
await getDoc(
doc(
db,
"users",
user.uid
)
);

const consultantData =
consultantSnap.data();

const consultantNo =
consultantData.consultantNo;

const snap =
await getDocs(
collection(db,"users")
);

let html = "";

snap.forEach((docSnap)=>{

const client =
docSnap.data();

console.log({
nama: client.nama,
role: client.role,
memberNo: client.memberNo,
referral: client.referral,
consultantNo: consultantNo
});
  
if(
client.role !== "customer" ||
!client.memberNo ||
client.referral !== consultantNo
){
return;
}

console.log(
"MASUK",
client.nama
);
  
html += `

<div class="bg-white p-4 rounded-xl shadow">

<h3 class="font-bold">
${client.nama || "-"}
</h3>

<p>
${client.memberNo || "-"}
</p>

<p>
${client.telefon || "-"}
</p>

<p>
${client.paymentStatus === "paid"
? "AHLI AKTIF"
: "PROSPEK"}
</p>

</div>

`;

});

document.getElementById(
"clientList"
).innerHTML =
html || "Tiada client.";

});


</script>

</body>
</html>
