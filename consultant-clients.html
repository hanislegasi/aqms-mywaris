<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Clients</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">
My Clients
</h1>

</div>

<div class="p-5">

<a
href="consultant-dashboard.html"
class="inline-block bg-gray-200 hover:bg-gray-300 px-5 py-3 rounded-xl font-semibold mb-5">

← Kembali ke Dashboard

</a>

<div
id="clientList"
class="space-y-3">

Memuatkan...

</div>

</div>
  

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
authDomain:"alqawthar-mywaris.firebaseapp.com",
projectId:"alqawthar-mywaris",
storageBucket:"alqawthar-mywaris.firebasestorage.app",
messagingSenderId:"3498810778",
appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);  

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

const consultantSnap =
await getDoc(
doc(
db,
"users",
user.uid
)
);

const consultantData =
consultantSnap.data();

const consultantNo =
consultantData.consultantNo;

const snap =
await getDocs(
collection(db,"users")
);

let html = "";

snap.forEach((docSnap)=>{

const client =
docSnap.data();

console.log({
nama: client.nama,
role: client.role,
memberNo: client.memberNo,
referral: client.referral,
consultantNo: consultantNo
});
  
if(
client.role !== "customer" ||
!client.memberNo ||
client.referral !== consultantNo
){
return;
}

console.log(
"MASUK",
client.nama
);
  
const expiryDate =
client.expiryDate
? new Date(client.expiryDate)
.toLocaleDateString("ms-MY")
: "-";

html += `

<div class="bg-white p-5 rounded-xl shadow">

<div class="flex justify-between">

<div>

<h3 class="font-bold text-lg">
${client.nama || "-"}
</h3>

<p class="text-gray-500">
${client.memberNo || "-"}
</p>

<p>
${client.telefon || "-"}
</p>

</div>

<div>

<span class="
px-3 py-1 rounded-full text-sm
${client.paymentStatus === "paid"
? "bg-green-100 text-green-700"
: "bg-yellow-100 text-yellow-700"}">

${client.paymentStatus === "paid"
? "AHLI AKTIF"
: "PROSPEK"}

</span>

</div>

</div>

<div class="mt-4 text-sm">

<p>
Tarikh Tamat:
<strong>${expiryDate}</strong>
</p>

<p>
Referral:
<strong>${client.referral || "-"}</strong>
</p>

</div>

<a
href="consultant-customer-details.html?id=${docSnap.id}"
class="inline-block mt-4 bg-[#153638] text-white px-4 py-2 rounded-lg">

View Customer

</a>

</div>

`;

});

document.getElementById(
"clientList"
).innerHTML =
html || "Tiada client.";

});


</script>

</body>
</html>
