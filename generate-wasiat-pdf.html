<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Generate Wasiat PDF
</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body class="bg-gray-300 py-10">

<div class="w-[210mm] min-h-[297mm] mx-auto">

<button
id="downloadBtn"
class="mb-5 bg-[#153638] hover:bg-[#1d4a4d] transition text-white px-6 py-3 rounded-xl font-semibold">

Download PDF

</button>

<!-- TEMPLATE -->
<div
id="pdfContent"
class="bg-white w-full min-h-[297mm] shadow-2xl">

<!-- COVER PAGE -->
<div class="min-h-[297mm] flex flex-col justify-between p-20">

<!-- TOP -->
<div>

<div class="flex justify-between items-start">

<div>

<h1 class="text-5xl font-bold text-[#153638] leading-tight">
AL-QAWTHAR
<br>
MAWARIS SYNERGY
</h1>

<p class="mt-4 text-gray-500 text-lg">
Pakar Pengurusan Wasiat Islam
</p>

</div>

<div class="w-36 h-36 border-4 border-[#153638] rounded-full flex items-center justify-center">

<span class="text-[#153638] font-bold text-2xl">
AQMS
</span>

</div>

</div>

</div>

<!-- CENTER -->
<div class="text-center py-24">

<h2 class="text-7xl font-bold text-[#153638] leading-tight mb-8">
DOKUMEN
<br>
e-WASIAT
</h2>

<div class="w-52 h-1 bg-[#153638] mx-auto mb-10">
</div>

<p class="text-2xl text-gray-600">
Dokumen Pengurusan Wasiat Islam
</p>

</div>

<!-- BOTTOM -->
<div class="space-y-8">

<div class="border-t-2 border-[#153638] pt-8">

<div class="grid grid-cols-3 gap-10">

<div>

<p class="text-sm text-gray-500 mb-2">
NAMA
</p>

<p
id="nama"
class="font-bold text-xl">
-
</p>

</div>

<div>

<p class="text-sm text-gray-500 mb-2">
NO IC
</p>

<p
id="ic"
class="font-bold text-xl">
-
</p>

</div>

<div>

<p class="text-sm text-gray-500 mb-2">
TELEFON
</p>

<p
id="telefon"
class="font-bold text-xl">
-
</p>

</div>

</div>

</div>

<div class="flex justify-between text-sm text-gray-500">

<p>
Al-Qawthar Mawaris Synergy
</p>

<p id="tarikhHariIni">
-
</p>

</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey:
"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:
"alqawthar-mywaris.firebaseapp.com",

projectId:
"alqawthar-mywaris",

storageBucket:
"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:
"3498810778",

appId:
"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);

const today =
new Date();

const tarikh =
today.toLocaleDateString(
"ms-MY",
{
day: "numeric",
month: "long",
year: "numeric"
}
);

document.getElementById(
"tarikhHariIni"
).innerHTML =

tarikh;

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

const docSnap =
await getDoc(
doc(
db,
"users",
user.uid
)
);

if(docSnap.exists()){

const data =
docSnap.data();

document.getElementById(
"nama"
).innerText =
data.nama || "-";

document.getElementById(
"ic"
).innerText =
data.ic || "-";

document.getElementById(
"alamat"
).innerText =
data.alamat || "-";

document.getElementById(
"telefon"
).innerText =
data.telefon || "-";

document.getElementById(
"nama2"
).innerText =
data.nama || "-";

document.getElementById(
"ic2"
).innerText =
data.ic || "-";

document.getElementById(
"alamat2"
).innerText =
data.alamat || "-";

document.getElementById(
"telefon2"
).innerText =
data.telefon || "-";

}

});

// DOWNLOAD PDF
document
.getElementById("downloadBtn")
.addEventListener("click", ()=>{

const element =
document.getElementById(
"pdfContent"
);

html2pdf()
.set({

margin: 0,

filename:
"dokumen-wasiat.pdf",

image: {
type: "jpeg",
quality: 1
},

html2canvas: {
scale: 2
},

jsPDF: {
unit: "mm",
format: "a4",
orientation: "portrait"
}

})
.from(element)
.save();

});

</script>

</body>
</html>
