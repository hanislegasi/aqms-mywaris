<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve Payable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: Inter, sans-serif;
        }
        /* Custom scrollbar styling for mobile */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="bg-gray-100">

    <div class="bg-[#153638] text-white p-5">
        <h1 class="text-2xl font-bold">
            Internal Allocation & Reserve
        </h1>
    </div>

    <div class="max-w-7xl mx-auto p-5">

        <a href="accounts-dashboard.html" class="inline-block bg-gray-200 px-5 py-3 rounded-xl mb-5 text-gray-800">
            &larr; Akaun
        </a>

        <!-- Mobile Scroll Instruction (Only visible on small screens) -->
        <div class="flex items-center text-sm text-gray-500 mb-2 md:hidden">
            <svg class="w-4 h-4 mr-2 text-blue-500 animate-pulse flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
            </svg>
            <span>Tatal (scroll) ke kanan untuk melihat jadual penuh.</span>
        </div>

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full min-w-[600px]">
                    <thead class="bg-[#153638] text-white">
                        <tr>
                            <th class="p-3 text-left">Type</th>
                            <th class="p-3 text-left">Payee</th>
                            <th class="p-3 text-right">Amount</th>
                            <th class="p-3 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="payableTable">
                        <!-- Loading placeholder -->
                        <tr>
                            <td colspan="4" class="p-5 text-center text-gray-500">Memuatkan data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Custom Message Box -->
    <div id="customAlert" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4">
        <div class="bg-white p-6 rounded-xl shadow-xl max-w-sm w-full text-center">
            <!-- Icon Background & SVG dynamic update -->
            <div id="alertIconBg" class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 transition-colors">
                <span id="alertIcon">
                    <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </span>
            </div>
            <h3 id="alertTitle" class="text-xl font-bold text-gray-800 mb-2">Berjaya!</h3>
            <p id="alertMessage" class="text-gray-600 mb-6">Mesej di sini</p>
            <button onclick="closeCustomAlert()" class="bg-[#153638] text-white px-6 py-2 rounded-lg w-full font-medium hover:bg-[#0f2728] transition-colors">
                Tutup & Muat Semula
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, query, orderBy, limit, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
            authDomain: "alqawthar-mywaris.firebaseapp.com",
            projectId: "alqawthar-mywaris",
            storageBucket: "alqawthar-mywaris.firebasestorage.app",
            messagingSenderId: "3498810778",
            appId: "1:3498810778:web:ee36e0fe42f76698046e23"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

const distSnap =
await getDoc(
doc(db,"settings","company")
);

console.log(distSnap.exists());

const distribution =
distSnap.data();

console.log(distribution);

const allowancePeople =
distribution.allowance || [];

const royaltyPeople =
distribution.royalty || [];
        
const coaSnap = await getDocs(
collection(
db,
"chartOfAccounts"
)
);

const coaMap = {};

coaSnap.forEach((d)=>{

    const coa = d.data();

    coaMap[coa.code] = coa;

});
        
        // Fetch data

let royaltyPayable = 0;
let allowancePayable = 0;

      
       const snap =
await getDocs(
collection(
db,
"companyAllocation"
)
);
        const payable = {};

       snap.forEach((d)=>{

const row =
d.data();

royaltyPayable +=
Number(
row.royalty || 0
);

allowancePayable +=
Number(
row.allowance || 0
);



});

const pvSnap =
await getDocs(
collection(
db,
"paymentVouchers"
)
);


pvSnap.forEach((d)=>{

const pv = d.data();

if(
pv.status === "PENDING" ||
pv.status === "PAID"
){

if(pv.type==="ROYALTY"){
    royaltyPayable -= Number(pv.amount||0);
}

if(pv.type==="ALLOWANCE"){
    allowancePayable -= Number(pv.amount||0);
}


}

});
      
      
        

let html = `
<tr>

<td class="p-3">
Royalty
</td>

<td class="p-3">
${royaltyPeople.join("<br>")}
</td>

<td class="p-3 text-right">
RM${royaltyPayable.toFixed(2)}
</td>

<td class="p-3 text-center">

<button
onclick="generatePV('ROYALTY')"
class="bg-green-600 text-white px-4 py-2 rounded-lg">

Generate PV

</button>

</td>

</tr>


<tr>
<td class="p-3">Allowance</td>

<td class="p-3">
${allowancePeople.join("<br>")}
</td>

<td class="p-3 text-right">
RM${allowancePayable.toFixed(2)}
</td>
<td class="p-3 text-center">
<button
onclick="
generatePV('ALLOWANCE')
"
class="
bg-green-600
text-white
px-4
py-2
rounded-lg
">
Generate PV
</button>
</td>
</tr>

`;

document.getElementById(
"payableTable"
).innerHTML =
html;
        // Fungsi PV yang dikemaskini
     window.generatePV = async (
type
) => {

try {


let amount = 0;

if(type==="ALLOWANCE"){
    amount = allowancePayable;
}

if(type==="ROYALTY"){
    amount = royaltyPayable;
}

let expense = null;

if(type=="ALLOWANCE"){
    expense = coaMap["5200"];
}

if(type=="ROYALTY"){
    expense = coaMap["5300"];
}
    
const payable =
coaMap[
expense.payableCode
];
    
    

if(!payable){

    alert("Payable Account not found");
    return;

}

    


const currentPeriod =
new Date().getFullYear()
+
"-" +
String(
new Date().getMonth()+1
).padStart(2,"0");
    
const existingPV =
await getDocs(
query(
collection(db,"paymentVouchers"),
where("type","==",type),
where("status","==","PENDING")
)
);

if(!existingPV.empty){

alert(
type + " masih mempunyai Payment Voucher yang belum dibayar."
);

return;

}


    
const pvNo =
"PV-" +
Date.now();

    
let beneficiaries = [];

if(type==="ALLOWANCE"){

const count =
allowancePeople.length;

const share =
Math.floor((amount/count)*100)/100;

let balance =
amount;

allowancePeople.forEach((name,index)=>{

const value =
index===count-1
?
balance
:
share;

beneficiaries.push({
    name,
    consultantNo:"",
    amount:value
});

balance -= value;

});

}

if(type==="ROYALTY"){

beneficiaries.push({

name:royaltyPeople[0],
amount

});

}    

    
await addDoc(
collection(db,"paymentVouchers"),
{
    pvNo,

    type,

    period: currentPeriod,

 

expenseCode:expense.code,
expenseName:expense.name,
expenseCategory:expense.category,
expenseCashFlowType:expense.cashFlowType,
expenseNormalBalance:expense.normalBalance,
expenseReportGroup:expense.reportGroup,

description: type + " " + currentPeriod,

    
consultantNo:"-",

consultantName:
type,

payee:
type,

amount,

beneficiaries,

accountCode:"MULTI",
accountName:type + " Payable",

accounts:[
{
accountCode:payable.code,
accountName:payable.name,

category:payable.category,
cashFlowType:payable.cashFlowType,
normalBalance:payable.normalBalance,
reportGroup:payable.reportGroup,

amount

}
],

status:"PENDING",

createdAt:new Date()

}
);

// DR Expense (Allowance/Admin/Royalty) 

    
await addDoc( collection(db,"ledger"), 
{ date:new Date(), 
 
accountCode:expense.code, 
account:expense.name, 
category:expense.category, 
cashFlowType:expense.cashFlowType, 
normalBalance:expense.normalBalance, 
reportGroup:expense.reportGroup, 

description:type,
 
debit:amount, 
 
credit:0 }); 
    

// CR Liability / Equity

await addDoc(
collection(db,"ledger"),
{

date:new Date(),

accountCode:payable.code,
account:payable.name,

category:payable.category,
cashFlowType:payable.cashFlowType,
normalBalance:payable.normalBalance,
reportGroup:payable.reportGroup,

description:type,

debit:0,
credit:amount

});


    
    
    
alert(
"Payment Voucher Created"
);

window.location.href =
"payment-voucher.html";

}
catch(err){

console.error(err);

alert(
err.message
);

}

};
            
        // Fungsi tutup custom alert dan muat semula halaman
        window.closeCustomAlert = () => {
            document.getElementById('customAlert').classList.add('hidden');
            location.reload();
        };

    </script>
</body>
</html>
