<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Akaun</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-[#f5f7f9] flex items-center justify-center p-5">

<div class="bg-white w-full max-w-sm p-8 rounded-3xl shadow-2xl border border-gray-100">
  
<h2 class="text-3xl font-bold mb-2 text-center text-[#153638]">
Login Akaun
</h2>

<form id="loginForm" class="space-y-4">

<input
id="email"
type="email"
placeholder="Email"
class="w-full border border-gray-200 bg-gray-50 p-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#153638]"
required>

<input
id="password"
type="password"
placeholder="Password"
class="w-full border border-gray-200 bg-gray-50 p-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#153638]"
required>

<button
type="submit"
class="w-full bg-[#153638] hover:bg-[#1d4a4d] transition text-white py-4 rounded-xl font-semibold shadow-lg">
Login
</button>

</form>

<div class="text-center mt-4">
<a href="register.html" class="text-blue-600">
Belum ada akaun?
</a>
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  
const firebaseConfig = {
  apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
  authDomain: "alqawthar-mywaris.firebaseapp.com",
  projectId: "alqawthar-mywaris",
  storageBucket: "alqawthar-mywaris.firebasestorage.app",
  messagingSenderId: "3498810778",
  appId: "1:3498810778:web:ee36e0fe42f76698046e23"
};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

document
.getElementById("loginForm")
.addEventListener("submit", async(e)=>{

e.preventDefault();

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value;

console.log("EMAIL:", email);
console.log("PASSWORD:", password);

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Login berjaya");

const db =
getFirestore(app);

const userDoc =
await getDoc(
  doc(
    db,
    "users",
    auth.currentUser.uid
  )
);

const userData =
userDoc.data();

if(userData.role === "admin"){

window.location.href =
"admin-dashboard.html";

}
else if(
userData.role === "consultant"
){

window.location.href =
"consultant-dashboard.html";

}
else{

window.location.href =
"dashboard.html";

}
}
catch(error){

console.error(error);

alert(
"Code: " + error.code +
"\nMessage: " + error.message
);

}

});

</script>

</body>
</html>
