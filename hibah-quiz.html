<body class="bg-gray-100">

<form id="quizForm">

<div id="questionsContainer"></div>

<button

class="bg-[#153638] text-white px-8 py-4 rounded-xl font-bold mt-5">

</form>

<div id="result" class="mt-5"></div>
 
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
updateDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:"alqawthar-mywaris.firebaseapp.com",

projectId:"alqawthar-mywaris",

storageBucket:"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:"3498810778",

appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

currentUser = user;

});


 




const questions = [

{
question:"Apakah maksud hibah?",
options:[
"Pemberian harta secara sukarela semasa hidup",
"Pembahagian faraid",
"Wasiat selepas kematian",
"Wakaf tanah"
],
answer:"A"
},

{

options:[
"Selepas kematian",
"Semasa hidup",
"Selepas faraid",
"Selepas mahkamah"
],
answer:"B"
},

{
question:"Hibah memerlukan balasan?",
options:[
"Ya",
"Tidak",
"Mengikut waris",
"Mengikut mahkamah"
],
answer:"B"
},

{
question:"Antara berikut merupakan rukun hibah:",
options:[
"Pemberi hibah",
"Penerima hibah",
"Harta hibah",
"Semua di atas"
],
answer:"D"
},

{
question:"Pemberi hibah mestilah:",
options:[
"Pemilik sah harta",
"Baligh",
"Berakal",
"Semua di atas"
],
answer:"D"
},

{
question:"Hibah boleh diberikan kepada:",
options:[
"Waris sahaja",
"Bukan waris sahaja",
"Waris dan bukan waris",
"Hanya organisasi"
],
answer:"C"
},

{
question:"Hibah berlaku ketika:",
options:[
"Semasa hidup",
"Selepas mati",
"Selepas faraid",
"Selepas probate"
],
answer:"A"
},

{
question:"Hibah kepada waris adalah:",
options:[
"Tidak dibenarkan",
"Dibenarkan",
"Haram",
"Makruh"
],
answer:"B"
},

{
question:"Apakah tujuan hibah?",
options:[
"Mempercepat pemindahan harta",
"Menghapuskan faraid",
"Menghapuskan hutang",
"Menggantikan mahkamah"
],
answer:"A"
},

{
question:"Hibah merupakan instrumen:",
options:[
"Perancangan harta Islam",
"Cukai",
"Pelaburan",

],
answer:"A"
},

{
question:"Adakah hibah tertakluk kepada had 1/3?",
options:[
"Ya",

],
answer:"B"
},

{

options:[
"Semasa hidup",
"Selepas kematian",
"Sebelum mati",
"Selepas hibah"
],
answer:"B"
},

{
question:"Hibah Ruqba adalah salah satu bentuk:",
options:[
"Hibah",
"Faraid",
"Wasiat",
"Wakaf"
],
answer:"A"
},

{
question:"Hibah Umra adalah:",
options:[
"Bentuk hibah",
"Bentuk faraid",
"Bentuk wasiat",
"Bentuk takaful"
],
answer:"A"
},

{
question:"Penerima hibah mestilah:",
options:[
"Wujud dan layak memiliki",

"Hanya Islam"
],
answer:"A"
},

{

],

},

{
question:"Pemilikan hibah berpindah apabila:",
options:[

"Mahkamah bersidang",

],
answer:"A"
},

{
question:"Hibah dibuat secara:",
options:[
"Paksaan",

"Paksa rela"
],
answer:"B"
},

{
question:"Konsultan perlu memahami hibah untuk:",
options:[
"Membantu pelanggan merancang harta",
"Menjadi hakim",
"Menjadi peguam",
"Menggantikan faraid"
],
answer:"A"
},

{
question:"Apakah perbezaan utama hibah dan wasiat?",
options:[
"Hibah semasa hidup, wasiat selepas kematian",
"Hibah selepas kematian",
"Wasiat semasa hidup",
"Tiada perbezaan"
],
answer:"A"
}

];
 
const container =
document.getElementById(
"questionsContainer"
);

questions.forEach((q,index)=>{

let html = `

<div class="bg-white rounded-2xl border border-gray-200 p-6 mb-5">

<h2 class="font-bold mb-4">

${index+1}. ${q.question}

</h2>

`;

q.options.forEach((option,optIndex)=>{

const letter =
["A","B","C","D"][optIndex];

html += `

<label class="block mb-2">

<input
type="radio"
name="q${index}"
value="${letter}">

${option}

</label>

`;

});

html += `</div>`;

container.innerHTML += html;

});

document
.getElementById("quizForm")
.addEventListener("submit", async(e)=>{

e.preventDefault();

let correct = 0;

questions.forEach((q,index)=>{

const selected =
document.querySelector(
`input[name="q${index}"]:checked`
)?.value;

if(selected === q.answer){

correct++;

}

});

let answered = 0;

questions.forEach((q,index)=>{

const selected =
document.querySelector(
`input[name="q${index}"]:checked`
);

if(selected){

answered++;

}

});

if(answered < questions.length){

alert(
"Sila jawab semua soalan terlebih dahulu."
);

return;

}
 
const score =
Math.round(
(correct/questions.length)*100
);

const result =
document.getElementById(
"result"
);

if(score >= 80){

result.innerHTML = `

<div class="bg-green-100 text-green-700 p-5 rounded-xl">

<h2 class="font-bold text-xl">

LULUS ✅

</h2>

<p>

Markah:
${score}%

</p>

</div>

`;

const consultantSnap =
await getDoc(
doc(db,"consultants",currentUser.uid)
);

const oldData =
consultantSnap.data() || {};

const oldScore =
oldData?.training?.hibah?.bestScore || 0;

const oldAttempts =
oldData?.training?.hibah?.attempts || 0;

const bestScore =
Math.max(
oldScore,
score
);

console.log("HIBAH UPDATE RUNNING");
console.log("Score:", score);
console.log("Best:", bestScore);
console.log("Attempts:", oldAttempts + 1);
 
await updateDoc(
doc(db,"consultants",currentUser.uid),
{

 
"training.hibah.status":"passed",

"training.hibah.bestScore":
bestScore,

"training.hibah.lastScore":
score,

"training.hibah.attempts":
oldAttempts + 1,

"training.hibah.completedAt":
new Date()
}
);
 
}
else{

result.innerHTML = `

<div class="bg-red-100 text-red-700 p-5 rounded-xl">

<h2 class="font-bold text-xl">

GAGAL ❌

</h2>

<p>

Markah:
${score}%

</p>

<p>

Minimum lulus adalah 80%

</p>

</div>

`;


 
}

});

</script>

</body>
</html>
