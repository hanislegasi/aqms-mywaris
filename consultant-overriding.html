<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
My Overriding
</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:Inter,sans-serif;
}
</style>
  
</head>

<body class="bg-gray-100">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">
My Team
</h1>

<p>
Overriding Performance
</p>

</div>

<div class="max-w-7xl mx-auto p-5">

<a
href="consultant-dashboard.html"
class="inline-block bg-gray-200 px-5 py-3 rounded-xl mb-5">

← Dashboard

</a>


<div
id="summaryCard"
class="grid md:grid-cols-2 gap-5 mb-5">

</div>

<div class="bg-white rounded-2xl shadow overflow-x-auto">

<table class="w-full">

<thead class="bg-[#153638] text-white">

<tr>
<th class="p-3 text-left">Tarikh</th>
<th class="p-3 text-left">Dari AQC</th>
<th class="p-3 text-left">Nama</th>
<th class="p-3 text-left">Level Saya</th>
<th class="p-3 text-left">Sales</th>
<th class="p-3 text-left">Rate</th>
<th class="p-3 text-left">Override</th>
</tr>

</thead>

<tbody id="overrideTable">

</tbody>

</table>

</div></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
getDocs,
collection,
query,
where  
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
authDomain:"alqawthar-mywaris.firebaseapp.com",
projectId:"alqawthar-mywaris",
storageBucket:"alqawthar-mywaris.firebasestorage.app",
messagingSenderId:"3498810778",
appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);



onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

const userSnap =
await getDoc(
doc(db,"consultants",user.uid)
);

const data =
userSnap.data();

const historySnap =
await getDocs(
query(
collection(db,"overrideHistory"),
where(
"receiver",
"==",
data.consultantNo
)
)
);

let html = "";
let lifetimeTotal = 0;
let totalSales = 0;

historySnap.forEach((d)=>{

const h = d.data();

lifetimeTotal +=
Number(h.override || 0);

totalSales +=
Number(h.sales || 0);

html += `

<tr class="border-b">

<td class="p-4">
${
h.createdAt?.toDate
?
h.createdAt.toDate().toLocaleDateString("ms-MY")
:
"-"
}
</td>

<td class="p-4">
${h.fromConsultant}
</td>

<td class="p-4">
${h.fromName}
</td>

<td class="p-4">
${h.receiverLevel}
</td>

<td class="p-4">
RM${Number(h.sales || 0).toLocaleString()}
</td>

<td class="p-4">
${h.diffRate}%
</td>

<td class="p-4 font-bold text-green-600">
RM${Number(h.override || 0).toFixed(2)}
</td>

</tr>

`;

});
  

document.getElementById(
"overrideTable"
).innerHTML =
html;

document.getElementById(
"summaryCard"
).innerHTML = `

<div class="bg-white rounded-2xl p-6 shadow">

<h2 class="text-lg font-semibold text-gray-500">
Total Team Sales
</h2>

<p class="text-4xl font-bold text-[#153638] mt-2">

RM${totalSales.toLocaleString()}

</p>

</div>

<div class="bg-white rounded-2xl p-6 shadow">

<h2 class="text-lg font-semibold text-gray-500">
Lifetime Override
</h2>

<p class="text-4xl font-bold text-green-600 mt-2">

RM${lifetimeTotal.toFixed(2)}

</p>

</div>

`;

});

</script>

</body>
</html>
