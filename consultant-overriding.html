<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
My Overriding
</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:Inter,sans-serif;
}
</style>
  
</head>

<body class="bg-gray-100">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">
My Team
</h1>

<p>
Overriding Performance
</p>

</div>

<div class="max-w-7xl mx-auto p-5">

<a
href="consultant-dashboard.html"
class="inline-block bg-gray-200 px-5 py-3 rounded-xl mb-5">

← Dashboard

</a>


<div class="bg-white rounded-2xl p-6 shadow mb-5">

<h2 class="text-xl font-bold">
Lifetime Override
</h2>

<div class="text-5xl font-bold text-green-600 mt-3">

RM${totalOverride.toFixed(2)}

</div>

</div>

  
<div class="bg-white rounded-2xl shadow overflow-hidden">

<table class="w-full">

<thead class="bg-[#153638] text-white">

<tr>

<th class="p-3 text-left">
Tarikh
</th>

<th class="p-3 text-left">
Dari AQC
</th>

<th class="p-3 text-left">
Nama
</th>

<th class="p-3 text-left">
Level Saya
</th>

<th class="p-3 text-left">
Sales
</th>

<th class="p-3 text-left">
Rate
</th>

<th class="p-3 text-left">
Override
</th>

</tr>

</thead>

<tbody>

${rows}

</tbody>

</table>

</div>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
getDocs,
collection,
getDocs,
query,
where  
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
authDomain:"alqawthar-mywaris.firebaseapp.com",
projectId:"alqawthar-mywaris",
storageBucket:"alqawthar-mywaris.firebasestorage.app",
messagingSenderId:"3498810778",
appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

function getCumulativeOverride(level){

if(level === "AQC") return 0;
if(level === "AQC-AS") return 3;
if(level === "AQC-UM") return 7;
if(level === "MGAM") return 12;

return 0;

}

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

const userSnap =
await getDoc(
doc(db,"users",user.uid)
);

const data =
userSnap.data();

const usersSnap =
await getDocs(
collection(db,"users")
);

let html = "";
let lifetimeTotal = 0;

usersSnap.forEach((d)=>{

const u = d.data();

if(
u.consultantNo &&
u.upline === data.consultantNo
){

const historySnap =
await getDocs(
query(
collection(db,"overrideHistory"),
where(
"receiver",
"==",
consultantNo
)
)
);

let totalOverride = 0;
let rows = "";


historySnap.forEach((doc)=>{

const h = doc.data();

totalOverride +=
Number(
h.override || 0
);

rows += `

<tr class="border-b">

<td class="p-3">
${
h.createdAt?.toDate
?
h.createdAt
.toDate()
.toLocaleDateString("ms-MY")
:
"-"
}
</td>

<td class="p-3">
${h.fromConsultant}
</td>

<td class="p-3">
${h.fromName}
</td>

<td class="p-3">
${h.receiverLevel}
</td>

<td class="p-3">
RM${Number(h.sales || 0).toLocaleString()}
</td>

<td class="p-3">
${h.diffRate}%
</td>

<td class="p-3 font-semibold text-green-600">
RM${Number(h.override || 0).toFixed(2)}
</td>

</tr>

`;

}); 
  
const teamSales =
Number(u.totalSales || 0);

const diffRate =
Math.max(
0,
getCumulativeOverride(
data.consultantLevel
)
-
getCumulativeOverride(
u.consultantLevel
)
);

const override =
(teamSales * diffRate) / 100;

lifetimeTotal += override;

html += `

<tr class="border-b">

<td class="p-4">
${u.consultantNo}
</td>

<td class="p-4">
${u.nama}
</td>

<td class="p-4">
${u.consultantLevel}
</td>

<td class="p-4">
RM${teamSales.toLocaleString()}
</td>

<td class="p-4 font-bold text-green-600">
RM${override.toLocaleString()}
</td>

</tr>

`;

}

});

document.getElementById(
"overrideTable"
).innerHTML =
html;

document.getElementById(
"summaryCard"
).innerHTML = `

<h2 class="text-xl font-bold">
Lifetime Override
</h2>

<p class="text-4xl font-bold text-green-600 mt-3">

RM${lifetimeTotal.toLocaleString()}

</p>

`;

});

</script>

</body>
</html>
