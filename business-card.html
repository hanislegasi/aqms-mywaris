<!DOCTYPE html>

<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
AQMS Business Card
</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

body{
font-family:Inter,sans-serif;
}

</style>

</head>

<body class="bg-gray-100 p-5">

<div class="max-w-5xl mx-auto">

<div
id="businessCard"
class="relative max-w-5xl mx-auto bg-white">

<img
src="https://hanislegasi.github.io/aqms-mywaris/images/business-card-template.png"
class="w-full">

<div
id="cardContent"
class="absolute inset-0">

<div
class="absolute left-[60px] top-[240px]">

<h2
id="cardName"
class="text-5xl font-bold text-[#153638]">
Loading...
</h2>

</div>

<div
class="absolute left-[60px] top-[340px] text-[#153638]">

<p
id="cardAqc"
class="text-2xl font-semibold mb-3">
AQC0001
</p>

<p
id="cardPhone"
class="text-xl mb-2">
0123456789
</p>

<p
id="cardEmail"
class="text-xl mb-2">
email@gmail.com
</p>

<p
class="text-xl font-semibold">
www.alqawthar.my
</p>

</div>

</div>

<div class="grid grid-cols-2 gap-3 mt-5">

<button
id="downloadBtn"
class="bg-blue-600 text-white py-3 rounded-xl">

Download

</button>

<button
id="shareBtn"
class="bg-green-600 text-white py-3 rounded-xl">

Share

</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:"alqawthar-mywaris.firebaseapp.com",

projectId:"alqawthar-mywaris",

storageBucket:"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:"3498810778",

appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

const snap =
await getDoc(
doc(db,"users",user.uid)
);

const data =
snap.data();

document.getElementById("cardName").innerText =
data.nama || "";

document.getElementById("cardAqc").innerText =
data.consultantNo || "";

document.getElementById("cardPhone").innerText =
data.telefon || "";

document.getElementById("cardEmail").innerText =
data.email || "";
  

document
.getElementById("shareBtn")
.addEventListener("click", async()=>{

if(navigator.share){

await navigator.share({

title:"AQMS Consultant",

text:`
${data.nama}
${data.consultantNo}
${data.telefon}
`

});

}

});

document
.getElementById("downloadBtn")
.addEventListener("click",()=>{

window.print();

});

});

</script>

</body>

</html>
