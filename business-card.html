<!DOCTYPE html>

<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
AQMS Business Card
</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

body{
font-family:Inter,sans-serif;
}

</style>

</head>

<body class="bg-gray-100 p-5">

<div class="max-w-md mx-auto">

<div
id="businessCard"
class="bg-gradient-to-r from-[#153638] to-[#21585b]
text-white rounded-3xl p-8 shadow-xl">

Loading...

</div>

<div class="grid grid-cols-2 gap-3 mt-5">

<button
id="downloadBtn"
class="bg-blue-600 text-white py-3 rounded-xl">

Download

</button>

<button
id="shareBtn"
class="bg-green-600 text-white py-3 rounded-xl">

Share

</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:"alqawthar-mywaris.firebaseapp.com",

projectId:"alqawthar-mywaris",

storageBucket:"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:"3498810778",

appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

const snap =
await getDoc(
doc(db,"users",user.uid)
);

const data =
snap.data();

document.getElementById(
"businessCard"
).innerHTML = `

<p class="text-xs opacity-80">
AL QAWTHAR MAWARIS SYNERGY
</p>

<h1 class="text-3xl font-bold mt-4">
${data.nama}
</h1>

<p class="mt-2">
${data.consultantNo}
</p>

<p>
${data.telefon || "-"}
</p>

<p class="mt-6 text-sm opacity-80">

Professional Estate Planning Consultant

</p>

`;

document
.getElementById("shareBtn")
.addEventListener("click", async()=>{

if(navigator.share){

await navigator.share({

title:"AQMS Consultant",

text:`
${data.nama}
${data.consultantNo}
${data.telefon}
`

});

}

});

document
.getElementById("downloadBtn")
.addEventListener("click",()=>{

window.print();

});

});

</script>

</body>

</html>
