<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Admin Preview Hibah
</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body class="bg-gray-100 min-h-screen">

<!-- HEADER -->
<div class="bg-[#153638] text-white p-5 shadow">

<h1 class="text-2xl font-bold">
Admin Preview Hibah
</h1>

<p class="text-gray-200">
Semakan Dokumen Customer
</p>

</div>

<!-- DOCUMENT -->
<div
id="pdfContent"
class="max-w-4xl mx-auto p-5">

<div class="bg-white rounded-2xl shadow p-8 space-y-8">

<!-- BACK -->
<a
id="backBtn"
href="#"
class="inline-block bg-gray-200 hover:bg-gray-300 transition text-gray-700 px-5 py-3 rounded-xl font-semibold">

← Kembali Customer Details

</a>

<!-- TITLE -->
<div class="text-center border-b pb-6">

<h1 class="text-3xl font-bold text-[#153638]">
DOKUMEN HIBAH
</h1>

<p class="text-gray-500 mt-2">
Al-Qawthar Mawaris Synergy
</p>

</div>

<!-- PEMBERI -->
<div>

<h2 class="text-2xl font-bold text-[#153638] mb-4">
Maklumat Pemberi Hibah
</h2>

<div class="space-y-3 text-gray-700">

<p>
<strong>Nama:</strong>
<span id="pemberiNama"></span>
</p>

<p>
<strong>No IC:</strong>
<span id="pemberiIc"></span>
</p>

<p>
<strong>No Telefon:</strong>
<span id="pemberiTelefon"></span>
</p>

</div>

</div>

<!-- PENERIMA -->
<div>

<h2 class="text-2xl font-bold text-[#153638] mb-4">
Maklumat Penerima Hibah
</h2>

<div class="space-y-3 text-gray-700">

<p>
<strong>Nama:</strong>
<span id="penerimaNama"></span>
</p>

<p>
<strong>Hubungan:</strong>
<span id="hubungan"></span>
</p>

</div>

</div>

<!-- ASET -->
<div>

<h2 class="text-2xl font-bold text-[#153638] mb-4">
Maklumat Aset
</h2>

<p
id="aset"
class="text-gray-700 whitespace-pre-line">
</p>

</div>

<!-- NILAI -->
<div>

<h2 class="text-2xl font-bold text-[#153638] mb-4">
Nilai Aset
</h2>

<p
id="nilaiAset"
class="text-gray-700">
</p>

</div>

<!-- CATATAN -->
<div>

<h2 class="text-2xl font-bold text-[#153638] mb-4">
Catatan Tambahan
</h2>

<p
id="catatan"
class="text-gray-700 whitespace-pre-line">
</p>

</div>

<!-- LAMPIRAN -->
<div>

<h2 class="text-2xl font-bold text-[#153638] mb-4">
Lampiran Dokumen
</h2>

<div
id="lampiranList"
class="space-y-3">
</div>

</div>

<!-- ACTION -->
<div class="pt-6 border-t space-y-4">

<button
id="downloadBtn"
class="w-full bg-black hover:bg-gray-800 transition text-white py-3 rounded-lg font-semibold">

Download PDF

</button>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">

<button
id="approveBtn"
class="bg-green-600 hover:bg-green-700 transition text-white py-3 rounded-xl font-semibold">

Approve Permohonan

</button>

<button
id="rejectBtn"
class="bg-red-600 hover:bg-red-700 transition text-white py-3 rounded-xl font-semibold">

Reject Permohonan

</button>

</div>

</div>

<!-- STATUS -->
<p
id="status"
class="text-center text-green-600 font-medium">
</p>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain: "alqawthar-mywaris.firebaseapp.com",

projectId: "alqawthar-mywaris",

storageBucket: "alqawthar-mywaris.firebasestorage.app",

messagingSenderId: "3498810778",

appId: "1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

// GET URL PARAM
const params =
new URLSearchParams(
window.location.search
);

const userId =
params.get("id");

// BACK BUTTON
document
.getElementById("backBtn")
.href =

`customer-details.html?id=${userId}`;

// CHECK LOGIN
onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

// CHECK ADMIN ROLE
const adminDoc =
await getDoc(
doc(
db,
"users",
user.uid
)
);

const adminData =
adminDoc.data();

if(adminData.role !== "admin"){

alert("Akses ditolak");

window.location.href =
"dashboard.html";

return;

}

// LOAD CUSTOMER DATA
const docRef =
doc(
db,
"users",
userId,
"hibah",
"maklumat"
);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

const data =
docSnap.data();

document.getElementById("pemberiNama").innerHTML =
data.pemberiNama || "";

document.getElementById("pemberiIc").innerHTML =
data.pemberiIc || "";

document.getElementById("pemberiTelefon").innerHTML =
data.pemberiTelefon || "";

document.getElementById("penerimaNama").innerHTML =
data.penerimaNama || "";

document.getElementById("hubungan").innerHTML =
data.hubungan || "";

document.getElementById("aset").innerHTML =
data.aset || "";

document.getElementById("nilaiAset").innerHTML =
data.nilaiAset || "";

document.getElementById("catatan").innerHTML =
data.catatan || "";

// LOAD LAMPIRAN
const snapshot =
await getDocs(

collection(
db,
"users",
userId,
"hibahDocuments"
)

);

let lampiranHTML = "";

snapshot.forEach((doc)=>{

const file =
doc.data();

lampiranHTML += `

<div class="bg-gray-100 p-4 rounded-xl space-y-3">

<div class="flex justify-between items-center">

<p class="text-sm font-medium text-gray-700">
${file.fileName}
</p>

<a
href="${file.fileURL}"
target="_blank"
class="text-[#153638] font-semibold">

Buka

</a>

</div>

${
file.fileName.endsWith(".pdf")

?

`

<iframe
src="${file.fileURL}"
class="w-full h-96 rounded-lg border">
</iframe>

`

:

`

<img
src="${file.fileURL}"
class="w-full rounded-lg border">

`
}

</div>

`;

});

document.getElementById(
"lampiranList"
).innerHTML = lampiranHTML;

}

});

// DOWNLOAD PDF
document
.getElementById("downloadBtn")
.addEventListener("click", ()=>{

const element =
document.getElementById(
"pdfContent"
);

const options = {

margin: 0.5,

filename:
"Hibah.pdf",

image: {
type: "jpeg",
quality: 1
},

html2canvas: {
scale: 2
},

jsPDF: {
unit: "in",
format: "a4",
orientation: "portrait"
}

};

html2pdf()
.set(options)
.from(element)
.save();

});

// APPROVE
document
.getElementById("approveBtn")
.addEventListener("click", async()=>{

try{

await updateDoc(

doc(
db,
"users",
userId,
"hibah",
"maklumat"
),

{

status:
"APPROVED"

}

);

document.getElementById(
"status"
).innerHTML =

"Permohonan hibah berjaya diluluskan.";

}

catch(error){

console.log(error);

}

});

// REJECT
document
.getElementById("rejectBtn")
.addEventListener("click", async()=>{

try{

await updateDoc(

doc(
db,
"users",
userId,
"hibah",
"maklumat"
),

{

status:
"REJECTED"

}

);

document.getElementById(
"status"
).innerHTML =

"Permohonan hibah berjaya ditolak.";

}

catch(error){

console.log(error);

}

});

</script>

</body>
</html>
