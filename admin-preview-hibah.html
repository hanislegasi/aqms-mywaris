        // Konfigurasi Responsif untuk Viewport Desktop & Mobile
        function updateScale() {
            const wrapper = document.getElementById('scale-wrapper');
            const pdfContent = document.getElementById('pdfContent');
            const containerWidth = window.innerWidth;
            const targetWidth = 794; // Lebar A4 (~210mm dalam piksel pada resolusi piawai)
            const padding = 32;

            if (containerWidth < targetWidth + padding) {
                // Kecilkan paparan untuk skrin mobile
                const scale = (containerWidth - padding) / targetWidth;
                wrapper.style.transform = `scale(${scale})`;
                
                // Baiki ketinggian bekas supaya tiada ruang kosong di bawah elemen
                const actualHeight = pdfContent.offsetHeight;
                const scaledHeight = actualHeight * scale;
                wrapper.style.marginBottom = `-${actualHeight - scaledHeight}px`;
            } else {
                // Paparan desktop normal
                wrapper.style.transform = 'scale(1)';
                wrapper.style.marginBottom = '0px';
            }
        }

        // Kemaskini skala ketika resize
        window.addEventListener('resize', updateScale);
        window.addEventListener('DOMContentLoaded', () => {
            // Berikan masa rendering sejenak sebelum skala
            setTimeout(updateScale, 100);
        });

async function imageToBase64(url){

    const response = await fetch(url);

if(!response.ok){
    throw new Error("Image gagal dimuatkan");
}
    
    const blob = await response.blob();

    return new Promise((resolve)=>{

        const reader = new FileReader();

        reader.onloadend = ()=>{

            resolve(reader.result);

        };

        reader.readAsDataURL(blob);

    });

}

function generateAlihTable(list){

    if(!list.length){

    if(!dateStr) return "-";

    return new Date(dateStr)
        .toLocaleDateString("ms-MY");

}
