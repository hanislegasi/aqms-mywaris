<!DOCTYPE html>

<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Voucher</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
<style>
body{
font-family:Inter,sans-serif;
}
</style>

</head>

<body class="bg-gray-100">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">
Payment Voucher Details
</h1>

</div>

<div class="max-w-4xl mx-auto p-5">

<a
href="payment-voucher.html"
class="inline-block bg-gray-200 px-5 py-3 rounded-xl mb-5">

← Payment Voucher

</a>

<div
id="voucherArea"
class="bg-white rounded-xl shadow p-6">

<div class="text-center mb-8">

<h1 class="text-3xl font-bold">
AL-QAWTHAR MAWARIS SYNERGY SDN. BHD.
</h1>

<p class="text-lg font-semibold mt-2">
PAYMENT VOUCHER
</p>

<p class="text-gray-500 text-sm">
Financial Management Centre
</p>

</div>
  
<div class="grid md:grid-cols-2 gap-4 mb-6">

<div>

<label class="font-semibold">
PV No
</label>

<p id="pvNo">
-
</p>

</div>

<div>

<label class="font-semibold">
Status
</label>

<p id="status">
-
</p>

</div>

<div>

<label class="font-semibold">
Payee
</label>

<p id="consultant">
-
</p>

</div>

<div>

<label class="font-semibold">
Amount
</label>

<p id="amount">
RM0.00
</p>

</div>

</div>

<div id="beneficiarySection" class="hidden">

<hr class="my-6">

<h2 class="font-bold text-lg mb-4">
Beneficiaries
</h2>

<table class="w-full border mb-6">

<thead class="bg-gray-100">

<tr>

<th class="border p-3 text-left">
Name
</th>

<th class="border p-3 text-right">
Amount
</th>

</tr>

</thead>

<tbody id="beneficiaryTable">

</tbody>

</table>

</div>
  
<hr class="my-6">

<h2 class="font-bold text-lg mb-4">
Payment Breakdown
</h2>

<table class="w-full border mb-6">

<thead class="bg-gray-100">

<tr>

<th class="border p-3 text-left">

Account

</th>

<th class="border p-3 text-right">

Amount

</th>

</tr>

</thead>

<tbody id="accountTable">

</tbody>

</table>
  
<hr class="my-6">

<h2 class="font-bold text-lg mb-4">
Payment Information
</h2>

<div class="space-y-4">

<div>

<label>
Payment Method
</label>

<select
id="paymentMethod"
class="w-full border rounded-lg p-3">

<option value="">
Pilih
</option>

<option>
Maybank Transfer
</option>

<option>
Cheque
</option>

<option>
DuitNow
</option>

<option>
IBG
</option>

</select>

</div>

<div>

<label>
Reference No
</label>

<input
id="referenceNo"
type="text"
class="w-full border rounded-lg p-3">

</div>

<div>

<label>
Payment Date
</label>

<input
id="paymentDate"
type="date"
class="w-full border rounded-lg p-3">

</div>

<div>

<label>
Remarks
</label>

<textarea
id="remarks"
class="w-full border rounded-lg p-3"></textarea>

</div>

</div>

<div
id="actionButtons"
class="mt-6 flex gap-3">

<button
id="saveBtn"
class="bg-blue-600 text-white px-5 py-3 rounded-xl">

Save

</button>

<button
id="pdfBtn"
class="bg-red-600 text-white px-5 py-3 rounded-xl">

Export PDF

</button>

</div>
  
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
authDomain:"alqawthar-mywaris.firebaseapp.com",
projectId:"alqawthar-mywaris",
storageBucket:"alqawthar-mywaris.firebasestorage.app",
messagingSenderId:"3498810778",
appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const params =
new URLSearchParams(
window.location.search
);

const pvId =
params.get("id");

const pvRef =
doc(
db,
"paymentVouchers",
pvId
);

const pvSnap =
await getDoc(
pvRef
);

const pv =
pvSnap.data();

document.getElementById("pvNo").innerHTML =
pv.pvNo;

document.getElementById("status").innerHTML =
pv.status;

document.getElementById("consultant").innerHTML =
pv.payee || pv.consultantName;

document.getElementById("amount").innerHTML =
"RM" + Number(pv.amount).toFixed(2);

if((pv.beneficiaries || []).length){

document.getElementById("beneficiarySection")
.classList.remove("hidden");

let benHTML="";

pv.beneficiaries.forEach(item=>{

benHTML += `

<tr>

<td class="border p-2">
${item.name}
</td>

<td class="border p-2 text-right">
RM${Number(item.amount).toFixed(2)}
</td>

</tr>

`;

});

document.getElementById("beneficiaryTable").innerHTML =
benHTML;

}
  
let accountHTML="";

(pv.accounts||[]).forEach(item=>{

accountHTML+=`

<tr>

<td class="border p-2">

${item.accountName}

</td>

<td class="border p-2 text-right">

RM${Number(item.amount).toFixed(2)}

</td>

</tr>

`;

});

document.getElementById("accountTable").innerHTML=
accountHTML;
  
document.getElementById("paymentMethod").value =
pv.paymentMethod || "";

document.getElementById("referenceNo").value =
pv.referenceNo || "";

document.getElementById("remarks").value =
pv.remarks || "";

document.getElementById("paymentDate").value =
pv.paymentDate || "";
  
document.getElementById("saveBtn")
.addEventListener(
"click",
async()=>{

await updateDoc(
pvRef,
{

paymentMethod:
document.getElementById("paymentMethod").value,

referenceNo:
document.getElementById("referenceNo").value,

paymentDate:
document.getElementById("paymentDate").value,

remarks:
document.getElementById("remarks").value

}
);

alert(
"Saved"
);

}
);

document
.getElementById("pdfBtn")
.addEventListener("click",()=>{

const buttons =
document.getElementById("actionButtons");

buttons.style.display="none";

const element =
document.getElementById("voucherArea");

const opt={

margin:0.3,

filename:
pv.pvNo+".pdf",

image:{
type:"jpeg",
quality:1
},

html2canvas:{
scale:2
},

jsPDF:{
unit:"in",
format:"a4",
orientation:"portrait"
}

};

html2pdf()
.set(opt)
.from(element)
.save()
.then(()=>{

buttons.style.display="flex";

});

});
  
</script>

</body>
</html>
