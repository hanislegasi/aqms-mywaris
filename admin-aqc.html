<!DOCTYPE html>

<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AQC Management</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>
body{
font-family: Inter, sans-serif;
}
</style>  
  
</head>

 
<body class="bg-gray-100">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">
AQC Management
</h1>

<p>
Consultant Management Centre
</p>

</div>

<div class="max-w-7xl mx-auto p-5">

<a
href="admin-dashboard.html"
class="inline-block bg-gray-200 px-5 py-3 rounded-xl mb-5">

← Dashboard

</a>

<input
id="searchInput"
type="text"
placeholder="Cari nama, telefon, email, no AQC atau level..."
class="w-full p-4 rounded-xl border border-gray-300 mb-5">
  
<div class="bg-white rounded-2xl shadow overflow-x-auto">

<table class="w-full">

<thead class="bg-[#153638] text-white">

<tr>
<th class="p-3 text-left">Bil</th>
<th class="p-3 text-left">Tarikh Daftar</th>
<th class="p-3 text-left">No AQC</th>
<th class="p-3 text-left">Nama</th>
<th class="p-3 text-left">Level</th>
<th class="p-3 text-left">Telefon</th>
<th class="p-3 text-left">Career Sales</th>
<th class="p-3 text-left">Status</th>
</tr>

</thead>

<tbody id="consultantList">

<tr>
<td colspan="8" class="p-4">
Loading...
</td>
</tr>

</tbody>

</table>

</div>

</div>

<script type="module">  

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
getDoc,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:"alqawthar-mywaris.firebaseapp.com",

projectId:"alqawthar-mywaris",

storageBucket:"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:"3498810778",

appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);
  
import {
query,
orderBy
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const snapshot =
await getDocs(
query(
collection(db,"users"),
orderBy("joinDate","desc")
)
);

let html = "";
let bil = 1;

snapshot.forEach((d)=>{

const u = d.data();

if(
!u.consultantNo
){
return;
}

html += `

<tr class="border-b hover:bg-gray-50">

<td class="p-3">
${bil++}
</td>

<td class="p-3">
${u.joinDate
? new Date(u.joinDate).toLocaleDateString("ms-MY")
: "-"}
</td>

<td class="p-3">
${u.consultantNo}
</td>

<td class="p-3 font-semibold">

<a
href="admin-consultant-details.html?id=${d.id}"
class="text-[#153638] hover:underline hover:text-green-700">

${u.nama}

</a>

</td>

<td class="p-3">
${u.consultantLevel || "-"}
</td>

<td class="p-3">
${u.telefon || "-"}
</td>

<td class="p-3">
RM${(u.careerSales || 0).toLocaleString()}
</td>

<td class="p-3">

<span class="
px-3 py-1 rounded-full text-xs
${u.consultantPaymentStatus === "paid"
? "bg-green-100 text-green-700"
: "bg-red-100 text-red-700"}
">

${u.consultantPaymentStatus || "unpaid"}

</span>

</td>

</tr>

`;
 }); 

document.getElementById(
"consultantList"
).innerHTML =
html;  

const searchInput =
document.getElementById("searchInput");

searchInput.addEventListener("keyup",()=>{

const keyword =
searchInput.value.toLowerCase();

const rows =
document.querySelectorAll("#consultantList tr");

rows.forEach(row=>{

const text =
row.innerText.toLowerCase();

row.style.display =
text.includes(keyword)
? ""
: "none";

});

});
  
document
.querySelectorAll(".approveBtn")
.forEach((btn)=>{

btn.addEventListener("click", async()=>{

const id =
btn.dataset.id;

const snap =
await getDoc(
doc(db,"consultants",id)
);

const data =
snap.data();

await updateDoc(
doc(db,"consultants",id),
{
consultantLevel:
data.requestedLevel,

promotionRequest:false,

requestedLevel:"",

promotionApprovedAt:
new Date()
}
);

alert(
"Promotion Approved"
);

location.reload();

});

});
  

  
</script>

  
  
</body>
</html>
