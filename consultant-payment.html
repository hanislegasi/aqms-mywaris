<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pendaftaran Konsultan</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-5">

<div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl">

<h1 class="text-3xl font-bold text-[#153638] mb-2">
Al-Qawthar Consultant
</h1>

<p class="text-gray-500 mb-8">
Bayaran Pendaftaran
</p>

<div class="bg-gray-100 rounded-2xl p-5 mb-8">

<div class="flex justify-between mb-3">

<span>
Jawatan
</span>

<span class="font-semibold">
Al-Qawthar Consultant
</span>

</div>

<div class="flex justify-between">

<span>
Jumlah
</span>

<span class="text-2xl font-bold text-[#153638]">
RM200
</span>

</div>

</div>

<button
id="payBtn"
class="w-full bg-[#153638] hover:bg-[#1d4a4d] transition text-white py-4 rounded-2xl font-semibold">

Bayar Sekarang

</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
updateDoc,
getDoc,
increment
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const firebaseConfig = {

apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
authDomain: "alqawthar-mywaris.firebaseapp.com",
projectId: "alqawthar-mywaris",
storageBucket: "alqawthar-mywaris.firebasestorage.app",
messagingSenderId: "3498810778",
appId: "1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

currentUser = user;

});

document
.getElementById("payBtn")
.addEventListener("click", async()=>{

document.getElementById(
"payBtn"
).disabled = true;


try{

const counterRef =
doc(
db,
"system",
"counter"
);

const counterSnap =
await getDoc(counterRef);

const currentNo =
counterSnap.data().consultantCounter || 0;

const newNo =
currentNo + 1;

// update counter
await updateDoc(
counterRef,
{
consultantCounter:
increment(1)
}
);

// generate consultant no
const consultantNo =
"AQC" +
String(newNo).padStart(4,"0");

// renewal date
const renewalDate =
new Date();

renewalDate.setFullYear(
renewalDate.getFullYear() + 1
);

// update user
await updateDoc(

doc(
db,
"users",
currentUser.uid
),

{

role:
"consultant",

consultantNo,

consultantLevel:
"AQC",

consultantPaymentStatus:
"paid",

joinDate:
new Date().toISOString(),

renewalDate:
renewalDate.toISOString(),

downlineCount:0,

activeClients:0,

totalSales:0,

totalCommission:0,

totalOverriding:0

}

);

alert(
"Pendaftaran Konsultan Berjaya. No Konsultan: " +
consultantNo
);

window.location.href =
"consultant-dashboard.html";

}

catch(error){

document.getElementById(
"payBtn"
).disabled = false;
    
console.log(error);

alert(
"Ralat: " +
error.message
);

}
});

</script>

</body>
</html>
