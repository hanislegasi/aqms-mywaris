<!DOCTYPE html>
<html lang="ms">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Preview Hibah | MyWaris</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <!-- HEADER -->
  <div class="bg-[#153638] text-white p-5 shadow">

    <h1 class="text-2xl font-bold">
      Preview Hibah
    </h1>

    <p class="text-gray-200">
      Sila semak maklumat sebelum menghantar permohonan
    </p>

  </div>

  <!-- DOCUMENT -->
  <div class="max-w-4xl mx-auto p-5">

    <div class="bg-white rounded-2xl shadow p-8 space-y-8">

      <!-- TITLE -->
      <div class="text-center border-b pb-6">

        <h1 class="text-3xl font-bold text-[#153638]">
          DOKUMEN HIBAH
        </h1>

        <p class="text-gray-500 mt-2">
          Al-Qawthar Mawaris Synergy
        </p>

      </div>

      <!-- PEMBERI -->
      <div>

        <h2 class="text-2xl font-bold text-[#153638] mb-4">
          Maklumat Pemberi Hibah
        </h2>

        <div class="space-y-3 text-gray-700">

          <p>
            <strong>Nama:</strong>
            <span id="pemberiNama"></span>
          </p>

          <p>
            <strong>No IC:</strong>
            <span id="pemberiIc"></span>
          </p>

          <p>
            <strong>No Telefon:</strong>
            <span id="pemberiTelefon"></span>
          </p>

        </div>

      </div>

      <!-- PENERIMA -->
      <div>

        <h2 class="text-2xl font-bold text-[#153638] mb-4">
          Maklumat Penerima Hibah
        </h2>

        <div class="space-y-3 text-gray-700">

          <p>
            <strong>Nama:</strong>
            <span id="penerimaNama"></span>
          </p>

          <p>
            <strong>Hubungan:</strong>
            <span id="hubungan"></span>
          </p>

        </div>

      </div>

      <!-- ASET -->
      <div>

        <h2 class="text-2xl font-bold text-[#153638] mb-4">
          Maklumat Aset
        </h2>

        <p
          id="aset"
          class="text-gray-700 whitespace-pre-line">
        </p>

      </div>

      <!-- NILAI -->
      <div>

        <h2 class="text-2xl font-bold text-[#153638] mb-4">
          Nilai Aset
        </h2>

        <p
          id="nilaiAset"
          class="text-gray-700">
        </p>

      </div>

      <!-- CATATAN -->
      <div>

        <h2 class="text-2xl font-bold text-[#153638] mb-4">
          Catatan Tambahan
        </h2>

        <p
          id="catatan"
          class="text-gray-700 whitespace-pre-line">
        </p>

      </div>

<!-- LAMPIRAN -->
<div>

  <h2 class="text-2xl font-bold text-[#153638] mb-4">
    Lampiran Dokumen
  </h2>

  <div
    id="lampiranList"
    class="space-y-3">
  </div>

</div>
      
      <!-- ACTION -->
      <div class="pt-6 border-t space-y-3">

        <button
          id="submitBtn"
          class="w-full bg-[#153638] hover:bg-[#1d4a4d] transition text-white py-3 rounded-lg font-semibold">

          Hantar Permohonan

        </button>

        <a
          href="hibah.html"
          class="block text-center bg-gray-200 hover:bg-gray-300 transition text-gray-700 py-3 rounded-lg font-semibold">

          ← Kembali Edit Borang

        </a>

      </div>

      <!-- STATUS -->
      <p
        id="status"
        class="text-center text-green-600 font-medium">
      </p>

    </div>

  </div>

  <!-- FIREBASE -->
  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      onAuthStateChanged
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      getFirestore,
      doc,
      getDoc,
      updateDoc,
      collection,
      getDocs
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {

      apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

      authDomain: "alqawthar-mywaris.firebaseapp.com",

      projectId: "alqawthar-mywaris",

      storageBucket: "alqawthar-mywaris.firebasestorage.app",

      messagingSenderId: "3498810778",

      appId: "1:3498810778:web:ee36e0fe42f76698046e23"

    };

    const app =
      initializeApp(firebaseConfig);

    const auth =
      getAuth(app);

    const db =
      getFirestore(app);

    let currentUser = null;

    // CHECK LOGIN
    onAuthStateChanged(auth, async(user)=>{

      if(!user){

        window.location.href =
          "login.html";

        return;

      }

      currentUser = user;

      // GET DATA
      const docRef =
      doc(
        db,
        "users",
        currentUser.uid,
        "hibah",
        "maklumat"
      );

      const docSnap =
      await getDoc(docRef);

      if(docSnap.exists()){

        const data =
        docSnap.data();

        document.getElementById("pemberiNama").innerHTML =
        data.pemberiNama || "";

        document.getElementById("pemberiIc").innerHTML =
        data.pemberiIc || "";

        document.getElementById("pemberiTelefon").innerHTML =
        data.pemberiTelefon || "";

        document.getElementById("penerimaNama").innerHTML =
        data.penerimaNama || "";

        document.getElementById("hubungan").innerHTML =
        data.hubungan || "";

        document.getElementById("aset").innerHTML =
        data.aset || "";

        document.getElementById("nilaiAset").innerHTML =
        data.nilaiAset || "";

        document.getElementById("catatan").innerHTML =
        data.catatan || "";

// LOAD LAMPIRAN
const snapshot =
await getDocs(

  collection(
    db,
    "users",
    currentUser.uid,
    "hibahDocuments"
  )

);

let lampiranHTML = "";

snapshot.forEach((doc)=>{

  const file =
  doc.data();

  lampiranHTML += `

  <div class="bg-gray-100 p-3 rounded-lg flex justify-between items-center">

    <p class="text-sm text-gray-700">
      ${file.fileName}
    </p>

    <a
      href="${file.fileURL}"
      target="_blank"
      class="text-[#153638] font-semibold">

      Lihat

    </a>

  </div>

  `;

});

document.getElementById(
  "lampiranList"
).innerHTML = lampiranHTML;
        
      }

      // SUBMIT
      document
      .getElementById("submitBtn")
      .addEventListener("click", async()=>{

        try{

          await updateDoc(

            doc(
              db,
              "users",
              currentUser.uid,
              "hibah",
              "maklumat"
            ),

            {

              status:
              "SUBMITTED"

            }

          );

          document.getElementById(
            "status"
          ).innerHTML =

          "Permohonan hibah berjaya dihantar.";

        }

        catch(error){

          document.getElementById(
            "status"
          ).innerHTML =

          error.message;

        }

      });

    });

  </script>

</body>
</html>
