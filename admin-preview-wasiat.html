<!DOCTYPE html>
<html lang="ms">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Preview Wasiat</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link
href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

@page{
size:A4;
margin:0;
}

html,
body{
margin:0;
padding:0;
background:#f3f4f6;
}

#pdfContent{
background:white;
width:210mm;
}

</style>
  
</head>

<body class="bg-gray-100 min-h-screen">

<!-- HEADER -->
<div class="bg-[#153638] text-white p-5 shadow">

<h1 class="text-2xl font-bold">
Admin Preview Wasiat
</h1>

<p class="text-gray-200">
Semakan Dokumen Customer
</p>

</div>

<!-- DOCUMENT -->
<div
id="pdfContent"
class="bg-white"
style="
width:210mm;
margin:0;
padding:0;
">

<!-- PAGE 1 -->
<div
class="relative"
style="
width:210mm;
height:297mm;
overflow:hidden;
margin:0;
padding:0;
">

<img
src="images/wasiat-cover.png"
class="absolute top-0 left-0"
style="
width:210mm;
height:297mm;
object-fit:cover;
">

<!-- DOC REF -->
<p
id="docRef"
class="absolute top-[5%] left-[8%] text-[#d8c08f] text-xl"
style="
font-family:'Cinzel', serif;
letter-spacing:1px;
">

AQMS-WST-2026-001

</p>

<!-- YEAR -->
<p
id="tahun"
class="absolute top-[5%] right-[8%] text-white text-4xl font-bold"
style="
font-family:'Cinzel', serif;
letter-spacing:1px;
">

2026

</p>
  
<!--nama-->
<p
id="namaCover"
class="absolute top-[56%] left-[11%] text-white text-1xl font-bold uppercase"
style="
font-family:'Cinzel', serif;
letter-spacing:1px;
">

ALI BIN ABU

</p>

<!-- IC -->
<p
id="icCover"
class="absolute top-[62%] left-[11%] text-white text-1xl font-bold"
style="
font-family:'Cinzel', serif;
letter-spacing:1px;
">

000000-00-0000

</p>

<!-- APPROVED DATE -->
<p
id="approvedDate"
class="absolute bottom-[3%] right-[4%] text-white text-sm"
style="
font-family:'Cinzel', serif;
letter-spacing:1px;
">

24 MEI 2026

</p>

</div>

<!-- PAGE 2 -->
<div
class="bg-white"
style="
width:210mm;
min-height:297mm;
padding:18mm;
overflow:hidden;
font-family:'Cinzel', serif;
">

<div class="border-b-2 border-[#153638] pb-4 mb-10">

<p
id="docRef2"
class="text-[#153638] text-xl font-bold"
style="
font-family:'Cinzel', serif;
letter-spacing:1px;
">

DOC REF: AQMS-WST-2026-001

</p>

</div>

<table
class="w-full border border-gray-300 text-lg"
style="
font-family:'Cinzel', serif;
">

<tr>

<td class="border p-5 font-semibold w-1/3">
NAMA
</td>

<td
id="namaTable"
class="border p-5">
-
</td>

</tr>

<tr>

<td class="border p-5 font-semibold">
NO. KAD PENGENALAN
</td>

<td
id="icTable"
class="border p-5">
-
</td>

</tr>

<tr>

<td class="border p-5 font-semibold">
NO. TELEFON
</td>

<td
id="telefonTable"
class="border p-5">
-
</td>

</tr>

<tr>

<td class="border p-5 font-semibold">
ALAMAT
</td>

<td
id="alamatTable"
class="border p-5">
-
</td>

</tr>

<tr>

<td class="border p-5 font-semibold">
NO. KOD PERUNDING
</td>

<td
id="kodTable"
class="border p-5">
-
</td>

</tr>

</table>

</div>

</div>

<!-- ACTION -->
<div
class="max-w-5xl mx-auto p-5 space-y-4">

<button
id="downloadBtn"
class="w-full bg-black hover:bg-gray-800 transition text-white py-4 rounded-xl font-semibold">

Download PDF

</button>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">

<button
id="approveBtn"
class="bg-green-600 hover:bg-green-700 transition text-white py-4 rounded-xl font-semibold">

Approve Permohonan

</button>

<button
id="rejectBtn"
class="bg-red-600 hover:bg-red-700 transition text-white py-4 rounded-xl font-semibold">

Reject Permohonan

</button>

</div>

</div>
  
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
collection,
getDocs,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain: "alqawthar-mywaris.firebaseapp.com",

projectId: "alqawthar-mywaris",

storageBucket: "alqawthar-mywaris.firebasestorage.app",

messagingSenderId: "3498810778",

appId: "1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

// GET URL PARAM
const params =
new URLSearchParams(
window.location.search
);

const userId =
params.get("id");

// CHECK LOGIN
onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

// CHECK ADMIN ROLE
const adminDoc =
await getDoc(
doc(
db,
"users",
user.uid
)
);

const adminData =
adminDoc.data();

if(adminData.role !== "admin"){

alert("Akses ditolak");

window.location.href =
"dashboard.html";

return;

}

// LOAD CUSTOMER DATA
const docRef =
doc(
db,
"users",
userId,
"wasiat",
"maklumat"
);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

const data =
docSnap.data();

// DOC REF
document.getElementById(
"docRef"
).innerHTML =

data.docRef || "-";

document.getElementById(
"docRef2"
).innerHTML =

`DOC REF: ${data.docRef || "-"}`;

// YEAR
const approvedDate =
data.approvedAt
? new Date(data.approvedAt)
: new Date();

document.getElementById(
"tahun"
).innerHTML =

approvedDate.getFullYear();

// COVER
document.getElementById(
"namaCover"
).innerHTML =

(data.nama || "-").toUpperCase();

document.getElementById(
"icCover"
).innerHTML =

data.ic || "-";

// DATE
document.getElementById(
"approvedDate"
).innerHTML =

approvedDate.toLocaleDateString(
"ms-MY",
{
day: "numeric",
month: "long",
year: "numeric"
}
);

// TABLE
document.getElementById(
"namaTable"
).innerHTML =
data.nama || "-";

document.getElementById(
"icTable"
).innerHTML =
data.ic || "-";

document.getElementById(
"telefonTable"
).innerHTML =
data.telefon || "-";

document.getElementById(
"alamatTable"
).innerHTML =
data.alamat || "-";

document.getElementById(
"kodTable"
).innerHTML =
data.referral || "-";

}
  
// DOWNLOAD PDF
document
.getElementById("downloadBtn")
.addEventListener("click", ()=>{

const element =
document.getElementById(
"pdfContent"
);

const options = {

margin: 0,

filename:
"Wasiat.pdf",

image: {
type: "jpeg",
quality: 1
},

html2canvas: {
scale: 1,
useCORS: true,
scrollY: 0
},

pagebreak: {
mode: ['css']
},
  
jsPDF: {
unit: "mm",
format: "a4",
orientation: "portrait"
}

};

html2pdf()
.set(options)
.from(element)
.save();

});

// APPROVE
document
.getElementById("approveBtn")
.addEventListener("click", async()=>{

try{

const today =
new Date();

const year =
today.getFullYear();

// GET CURRENT DOC NUMBER
const counterRef =
doc(
db,
"system",
"counter"
);

const counterSnap =
await getDoc(counterRef);

let currentNumber = 1;

if(counterSnap.exists()){

currentNumber =
(counterSnap.data().wasiatCounter || 0) + 1;

}

// GENERATE DOC REF
const docRefNo =
`AQMS-WST-${year}-${String(currentNumber).padStart(3,"0")}`;

// UPDATE USER
await updateDoc(

doc(
db,
"users",
userId,
"wasiat",
"maklumat"
),

{

status:
"APPROVED",

approvedAt:
today.toISOString(),

docRef:
docRefNo,

docNumber:
currentNumber

}

);

// UPDATE COUNTER
await setDoc(

counterRef,

{

wasiatCounter:
currentNumber

},

{

merge: true

}

);

alert(
"Dokumen berjaya diluluskan"
);

location.reload();

}

catch(error){

console.log(error);

}

});
  
// REJECT
document
.getElementById("rejectBtn")
.addEventListener("click", async()=>{

try{

await updateDoc(

doc(
db,
"users",
userId,
"wasiat",
"maklumat"
),

{

status:
"REJECTED"

}

);

document.getElementById(
"status"
).innerHTML =

"Permohonan berjaya ditolak.";

}

catch(error){

console.log(error);

}

});

});

</script>

</body>
</html>
