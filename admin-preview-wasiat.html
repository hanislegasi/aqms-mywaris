<!DOCTYPE html>
<html lang="ms">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Preview Wasiat</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body class="bg-gray-100 min-h-screen">

<!-- HEADER -->
<div class="bg-[#153638] text-white p-5 shadow">

<h1 class="text-2xl font-bold">
Admin Preview Wasiat
</h1>

<p class="text-gray-200">
Semakan Dokumen Customer
</p>

</div>

<!-- DOCUMENT -->
<!-- DOCUMENT -->
<div
id="pdfContent"
class="w-[210mm] mx-auto bg-white">

<!-- PAGE 1 -->
<div class="relative w-[210mm] h-[297mm]">

<img
src="images/wasiat-cover.png"
class="absolute inset-0 w-full h-full object-cover">

<!-- DOC REF -->
<p
id="docRef"
class="absolute top-[60px] left-[60px] text-[#d8c08f] text-xl font-semibold">

AQMS-WST-2026-001

</p>

<!-- YEAR -->
<p
id="tahun"
class="absolute top-[50px] right-[70px] text-white text-6xl font-bold">

2026

</p>

<!-- NAMA -->
<p
id="namaCover"
class="absolute top-[820px] left-[80px] text-white text-2xl font-bold uppercase">

ALI BIN ABU

</p>

<!-- IC -->
<p
id="icCover"
class="absolute top-[955px] left-[80px] text-white text-2xl font-bold">

000000-00-0000

</p>

<!-- DATE -->
<p
id="approvedDate"
class="absolute bottom-[70px] right-[60px] text-white text-lg">

24 MEI 2026

</p>

</div>

<!-- PAGE 2 -->
<div class="w-[210mm] min-h-[297mm] bg-white p-16">

<div class="border-b-2 border-[#153638] pb-5 mb-10">

<p
id="docRef2"
class="text-[#153638] text-xl font-bold">

DOC REF: AQMS-WST-2026-001

</p>

</div>

<table class="w-full border border-gray-300">

<tr>

<td class="border p-5 font-semibold w-1/3">
NAMA
</td>

<td
id="namaTable"
class="border p-5">
-
</td>

</tr>

<tr>

<td class="border p-5 font-semibold">
NO. KAD PENGENALAN
</td>

<td
id="icTable"
class="border p-5">
-
</td>

</tr>

<tr>

<td class="border p-5 font-semibold">
NO. TELEFON
</td>

<td
id="telefonTable"
class="border p-5">
-
</td>

</tr>

<tr>

<td class="border p-5 font-semibold">
ALAMAT
</td>

<td
id="alamatTable"
class="border p-5">
-
</td>

</tr>

<tr>

<td class="border p-5 font-semibold">
NO. KOD PERUNDING
</td>

<td
id="kodTable"
class="border p-5">
-
</td>

</tr>

</table>

</div>

</div>
  
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
collection,
getDocs,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain: "alqawthar-mywaris.firebaseapp.com",

projectId: "alqawthar-mywaris",

storageBucket: "alqawthar-mywaris.firebasestorage.app",

messagingSenderId: "3498810778",

appId: "1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

// GET URL PARAM
const params =
new URLSearchParams(
window.location.search
);

const userId =
params.get("id");

// BACK BUTTON
document
.getElementById("backBtn")
.href =

`customer-details.html?id=${userId}`;

// CHECK LOGIN
onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

// CHECK ADMIN ROLE
const adminDoc =
await getDoc(
doc(
db,
"users",
user.uid
)
);

const adminData =
adminDoc.data();

if(adminData.role !== "admin"){

alert("Akses ditolak");

window.location.href =
"dashboard.html";

return;

}

// LOAD CUSTOMER DATA
const docRef =
doc(
db,
"users",
userId,
"wasiat",
"maklumat"
);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

const data =
docSnap.data();

document.getElementById("nama").innerHTML =
data.nama || "";

document.getElementById("ic").innerHTML =
data.ic || "";

document.getElementById("telefon").innerHTML =
data.telefon || "";

document.getElementById("pasangan").innerHTML =
data.pasangan || "";

document.getElementById("anak").innerHTML =
data.anak || "";

document.getElementById("wasi").innerHTML =
data.wasi || "";

document.getElementById("harta").innerHTML =
data.harta || "";

// LOAD LAMPIRAN
const snapshot =
await getDocs(

collection(
db,
"users",
userId,
"wasiatDocuments"
)

);

let lampiranHTML = "";

snapshot.forEach((doc)=>{

const file =
doc.data();

lampiranHTML += `

<div class="bg-gray-100 p-4 rounded-xl space-y-3">

<div class="flex justify-between items-center">

<p class="text-sm font-medium text-gray-700">
${file.fileName}
</p>

<a
href="${file.fileURL}"
target="_blank"
class="text-[#153638] font-semibold">

Buka

</a>

</div>

${
file.fileName.endsWith(".pdf")

?

`

<iframe
src="${file.fileURL}"
class="w-full h-96 rounded-lg border">
</iframe>

`

:

`

<img
src="${file.fileURL}"
class="w-full rounded-lg border">

`
}

</div>

`;

});

document.getElementById(
"lampiranList"
).innerHTML = lampiranHTML;

}

});

// DOWNLOAD PDF
document
.getElementById("downloadBtn")
.addEventListener("click", ()=>{

const element =
document.getElementById(
"pdfContent"
);

const options = {

margin: 0.5,

filename:
"Wasiat.pdf",

image: {
type: "jpeg",
quality: 1
},

html2canvas: {
scale: 2
},

jsPDF: {
unit: "in",
format: "a4",
orientation: "portrait"
}

};

html2pdf()
.set(options)
.from(element)
.save();

});

// APPROVE
document
.getElementById("approveBtn")
.addEventListener("click", async()=>{

try{

const today =
new Date();

const year =
today.getFullYear();

// GET CURRENT DOC NUMBER
const counterRef =
doc(
db,
"system",
"counter"
);

const counterSnap =
await getDoc(counterRef);

let currentNumber = 1;

if(counterSnap.exists()){

currentNumber =
(counterSnap.data().wasiatCounter || 0) + 1;

}

// GENERATE DOC REF
const docRefNo =
`AQMS-WST-${year}-${String(currentNumber).padStart(3,"0")}`;

// UPDATE USER
await updateDoc(

doc(
db,
"users",
userId,
"wasiat",
"maklumat"
),

{

status:
"APPROVED",

approvedAt:
today.toISOString(),

docRef:
docRefNo,

docNumber:
currentNumber

}

);

// UPDATE COUNTER
await setDoc(

counterRef,

{

wasiatCounter:
currentNumber

},

{

merge: true

}

);

alert(
"Dokumen berjaya diluluskan"
);

location.reload();

}

catch(error){

console.log(error);

}

});
  
// REJECT
document
.getElementById("rejectBtn")
.addEventListener("click", async()=>{

try{

await updateDoc(

doc(
db,
"users",
userId,
"wasiat",
"maklumat"
),

{

status:
"REJECTED"

}

);

document.getElementById(
"status"
).innerHTML =

"Permohonan berjaya ditolak.";

}

catch(error){

console.log(error);

}

});

</script>

</body>
</html>
