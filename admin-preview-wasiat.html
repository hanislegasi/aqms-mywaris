        // Konfigurasi Responsif untuk Viewport Desktop & Mobile
        function updateScale() {
            const wrapper = document.getElementById('scale-wrapper');
            const pdfContent = document.getElementById('pdfContent');
            const containerWidth = window.innerWidth;
            const targetWidth = 794; // Lebar A4 (~210mm dalam piksel pada resolusi piawai)
            const padding = 32;

            if (containerWidth < targetWidth + padding) {
                // Kecilkan paparan untuk skrin mobile
                const scale = (containerWidth - padding) / targetWidth;
                wrapper.style.transform = `scale(${scale})`;
                
                // Baiki ketinggian bekas supaya tiada ruang kosong di bawah elemen
                const actualHeight = pdfContent.offsetHeight;
                const scaledHeight = actualHeight * scale;
                wrapper.style.marginBottom = `-${actualHeight - scaledHeight}px`;
            } else {
                // Paparan desktop normal
                wrapper.style.transform = 'scale(1)';
                wrapper.style.marginBottom = '0px';
            }
        }

        // Kemaskini skala ketika resize
        window.addEventListener('resize', updateScale);
        window.addEventListener('DOMContentLoaded', () => {
            // Berikan masa rendering sejenak sebelum skala
            setTimeout(updateScale, 100);
        });

        // Download Logik PDF
        document.getElementById("downloadBtn").addEventListener("click", async () => {
            const wrapper = document.getElementById('scale-wrapper');
            const element = document.getElementById("pdfContent");

            // 1. Simpan tetapan skala dan margin asal
            const originalTransform = wrapper.style.transform;
            const originalMarginBottom = wrapper.style.marginBottom;
            const originalMargin = element.style.margin;

            // 2. Buang skala sementara & paksa kedudukan paksi kiri (PUNCA ruang kosong)
            wrapper.style.transform = 'scale(1)';
            wrapper.style.marginBottom = '0px';
            wrapper.style.transformOrigin = 'top left'; 
            element.style.margin = '0'; // Buang margin auto sementara

            // 3. Beri masa kepada browser untuk kemaskini DOM
            await new Promise(r => setTimeout(r, 150));

            const options = {
                margin: 0,
                filename: "Wasiat.pdf",
                image: { type: "jpeg", quality: 1 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true, 
                    scrollY: 0,
                    scrollX: 0, // Set koordinat X ke 0
                    windowWidth: document.documentElement.offsetWidth
                },
                pagebreak: { mode: ['css'] }, // Pastikan html2pdf__page-break berfungsi
                jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
            };

            // 4. Proses render PDF
            html2pdf().set(options).from(element).save().then(() => {
                // 5. Kembalikan semua tetapan asal
                wrapper.style.transform = originalTransform;
                wrapper.style.marginBottom = originalMarginBottom;
                wrapper.style.transformOrigin = 'top center';
                element.style.margin = originalMargin || '0 auto';
            });
        });

        // --------------------------------------------------------
        // FIREBASE LOGIC
        // --------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
            authDomain: "alqawthar-mywaris.firebaseapp.com",
            projectId: "alqawthar-mywaris",
            storageBucket: "alqawthar-mywaris.firebasestorage.app",
            messagingSenderId: "3498810778",
            appId: "1:3498810778:web:ee36e0fe42f76698046e23"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const userId = params.get("id");

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                // Boleh diselaraskan jika perlukan login aktif
                console.log("No user logged in. Redirecting...");
                // window.location.href = "login.html";
                return;
            }

            try {
                // CHECK ADMIN ROLE
                const adminDoc = await getDoc(doc(db, "users", user.uid));
                const adminData = adminDoc.data();

                if (adminData?.role !== "admin") {
                    alert("Akses ditolak");
                    window.location.href = "dashboard.html";
                    return;
                }

                // LOAD CUSTOMER DATA
                if (userId) {
                    const docRef = doc(db, "users", userId, "wasiat", "maklumat");
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {

                        // UPDATE UI
                        document.getElementById("docRef").innerHTML = data.docRef || "-";
                        document.getElementById("docRef2").innerHTML = `DOC REF: ${data.docRef || "-"}`;
                        
                        const approvedDate = data.approvedAt ? new Date(data.approvedAt) : new Date();
                        document.getElementById("tahun").innerHTML = approvedDate.getFullYear();
                        
                        document.getElementById("namaCover").innerHTML = (data.nama || "-").toUpperCase();
                        document.getElementById("icCover").innerHTML = data.ic || "-";
                        document.getElementById("approvedDate").innerHTML = approvedDate.toLocaleDateString("ms-MY", { day: "numeric", month: "long", year: "numeric" });
                        
                        document.getElementById("namaTable").innerHTML = data.nama || "-";
                        document.getElementById("icTable").innerHTML = data.ic || "-";
                        document.getElementById("telefonTable").innerHTML = data.telefon || "-";
                        document.getElementById("alamatTable").innerHTML = data.alamat || "-";
                        document.getElementById("kodTable").innerHTML = data.referral || "-";

            try {
                const today = new Date();
                const year = today.getFullYear();
                
                const counterRef = doc(db, "system", "counter");
                const counterSnap = await getDoc(counterRef);
                let currentNumber = 1;

                if (counterSnap.exists()) {
                    currentNumber = (counterSnap.data().wasiatCounter || 0) + 1;
                }

                const docRefNo = `AQMS-WST-${year}-${String(currentNumber).padStart(3,"0")}`;

                await updateDoc(doc(db, "users", userId, "wasiat", "maklumat"), {
                    status: "APPROVED",
                    approvedAt: today.toISOString(),
                    docRef: docRefNo,
                    docNumber: currentNumber
                });

                await setDoc(counterRef, { wasiatCounter: currentNumber }, { merge: true });

                alert("Dokumen berjaya diluluskan");
                location.reload();
            } catch (error) {
                console.log(error);
                alert("Ralat semasa meluluskan: " + error.message);

        });
