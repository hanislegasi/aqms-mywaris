<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Promotion Approval
</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family: Inter, sans-serif;
}

</style>

</head>

<body class="bg-gray-100 min-h-screen">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">
Promotion Approval
</h1>

<p>
HQ Promotion Management
</p>

</div>

<div class="max-w-6xl mx-auto p-5">

<a
href="admin-dashboard.html"
class="inline-block bg-gray-200 hover:bg-gray-300 px-5 py-3 rounded-xl font-semibold mb-5">

← Kembali ke Dashboard

</a>

<div
id="promotionList">

Loading...

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:"alqawthar-mywaris.firebaseapp.com",

projectId:"alqawthar-mywaris",

storageBucket:"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:"3498810778",

appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const usersSnap =
await getDocs(
collection(db,"users")
);

let html = "";

usersSnap.forEach((d)=>{

const u =
d.data();

if(u.promotionRequest){

html += `

<div class="bg-white p-5 rounded-2xl border border-gray-200 mb-4">

<h2 class="text-xl font-bold">

${u.nama}

</h2>

<p class="mt-2">
No Konsultan:
<b>${u.consultantNo}</b>
</p>

<p>
Current Level:
<b>${u.consultantLevel}</b>
</p>

<p>
Requested Level:
<b>${u.requestedLevel}</b>
</p>

<p>
Career Sales:
<b>RM${(u.careerSales || 0).toLocaleString()}</b>
</p>

<div class="flex gap-3 mt-4">

<button
data-id="${d.id}"
class="approveBtn bg-green-600 text-white px-5 py-2 rounded-xl">

Approve

</button>

<button
data-id="${d.id}"
class="rejectBtn bg-red-600 text-white px-5 py-2 rounded-xl">

Reject

</button>

</div>

</div>

`;

}

});

if(html === ""){

html = `

<div class="bg-white rounded-2xl border border-gray-200 p-8 text-center">

<h2 class="text-xl font-bold text-gray-500">

Tiada Promotion Request

</h2>

</div>

`;

}

document.getElementById(
"promotionList"
).innerHTML =
html;

document
.querySelectorAll(".approveBtn")
.forEach((btn)=>{

btn.addEventListener("click", async()=>{

const id =
btn.dataset.id;

const snap =
await getDoc(
doc(db,"users",id)
);

const data =
snap.data();

await updateDoc(
doc(db,"users",id),
{
consultantLevel:
data.requestedLevel,

promotionRequest:false,

requestedLevel:"",

promotionApprovedAt:
new Date()
}
);

alert(
"Promotion Approved"
);

location.reload();

});

});

document
.querySelectorAll(".rejectBtn")
.forEach((btn)=>{

btn.addEventListener("click", async()=>{

const id =
btn.dataset.id;

await updateDoc(
doc(db,"users",id),
{
promotionRequest:false,
requestedLevel:"",
promotionRejectedAt:new Date()
}
);

alert(
"Promotion Rejected"
);

location.reload();

});

});

</script>

</body>

</html>
