<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Statement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Masukkan library html2pdf di bahagian head -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen py-8">

<div class="max-w-5xl mx-auto">

<a
href="my-statement.html"
class="inline-block bg-gray-200 px-5 py-3 rounded-xl mb-5">

← My Statement

</a>

</div>


</div>

    
    <!-- KAWASAN PENYATA (Akan di-export ke PDF) -->
    <div id="statementArea" class="bg-white p-8 md:p-12 rounded-xl shadow-lg max-w-5xl mx-auto">

        <!-- HEADER -->
       <div class="flex justify-between border-b pb-6">
            <div>

<h1 id="companyName"
class="text-3xl font-bold text-[#153638]">

AL-QAWTHAR MAWARIS
SYNERGY SDN. BHD.

</h1>

<p id="registrationNo">

Registration No :
123456xxx

</p>

<h2 class="text-2xl font-bold mt-3">

OFFICIAL PAYMENT RECEIPT

</h2>

<div class="grid md:grid-cols-2 gap-6 mt-6">

<div>

<p><b>Receipt No</b></p>
<p id="receiptNo">-</p>

</div>

<div>

<p><b>Date</b></p>
<p id="receiptDate">-</p>

</div>

<div>

<p><b>Received From</b></p>
<p id="payerName">-</p>

</div>

<div>

<p><b>Reference</b></p>
<p id="referenceNo">-</p>

</div>

<div>

<p><b>Category</b></p>
<p id="serviceName">-</p>

</div>

<div>

<p><b>Payment Method</b></p>
<p id="paymentMethod">-</p>

</div>

</div>

 <table class="w-full mt-8">

<thead>

<tr class="border-b">

<th class="text-left py-3">
Description
</th>

<th class="text-right">
Amount
</th>

</tr>

</thead>

<tbody>

<tr>

<td id="description">
-
</td>

<td
id="amount"
class="text-right font-bold">

RM0.00

</td>

</tr>

</tbody>

<tfoot>

<tr class="border-t">

<td class="font-bold py-4">
TOTAL PAID
</td>

<td
id="totalPaid"
class="text-right font-bold text-green-600">

RM0.00

</td>

</tr>

</tfoot>

</table>             

<div class="border-t mt-10 pt-4 text-xs text-gray-500 flex justify-between">

<p>

This receipt is computer generated.

</p>

<p>

Generated :
<span id="generatedDate"></span>

</p>

</div>


<div class="text-right mt-6">

<button
id="printBtn"
class="bg-green-600 text-white px-6 py-3 rounded-xl">

Print PDF

</button>

</div>

<script type="module">
                
import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);              

const params =
new URLSearchParams(window.location.search);

const receiptId =
params.get("id");

async function loadReceipt(){

if(!receiptId){

alert("Receipt not found");

return;

}

const snap =
await getDoc(
doc(db,"receipts",receiptId)
);

if(!snap.exists()){

alert("Receipt not found");

return;

}

const r =
snap.data();

document.getElementById("receiptNo").innerHTML =
r.receiptNo || "-";

document.getElementById("receiptDate").innerHTML =
r.paymentDate.toDate().toLocaleDateString("ms-MY");

document.getElementById("payerName").innerHTML =
r.payerName || "-";

document.getElementById("referenceNo").innerHTML =
r.consultantNo || r.customerNo || "-";

document.getElementById("serviceName").innerHTML =
r.serviceName || "-";

document.getElementById("paymentMethod").innerHTML =
r.paymentMethod || "-";

document.getElementById("description").innerHTML =
r.serviceName || "-";

document.getElementById("amount").innerHTML =
"RM" +
Number(r.amount).toFixed(2);

document.getElementById("totalPaid").innerHTML =
"RM" +
Number(r.amount).toFixed(2);

document.getElementById("generatedDate").innerHTML =
new Date().toLocaleString("ms-MY");

}

loadReceipt();

document
.getElementById("printBtn")
.addEventListener("click",()=>{

const opt={

margin:0.5,

filename:
"Receipt-"+receiptId+".pdf",

image:{
type:"jpeg",
quality:0.98
},

html2canvas:{
scale:3
},

jsPDF:{
unit:"in",
format:"a4",
orientation:"portrait"
}

};

html2pdf()
.set(opt)
.from(
document.getElementById("statementArea")
)
.save();

});
