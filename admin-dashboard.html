<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Admin Dashboard
</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800&display=swap"
rel="stylesheet">

</head>

<body
class="bg-gray-100 min-h-screen"
style="font-family: Inter, sans-serif;">

<!-- HEADER -->
<div class="bg-[#153638] text-white p-5 shadow">

<h1 class="text-2xl font-bold">
Admin Dashboard
</h1>

<p class="text-gray-200">
Al-Qawthar Mawaris Synergy
</p>

</div>

<!-- CONTENT -->
<div class="p-5">

<button
id="logoutBtn"
class="inline-block mb-5 bg-red-500 hover:bg-red-600 transition text-white px-5 py-3 rounded-xl font-semibold">

Logout

</button>
  
<h2 class="text-xl font-bold mb-5">
Senarai Pelanggan
</h2>

<div
id="kpiCards"
class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">

<div class="bg-white p-5 rounded-xl shadow">
<h3 class="text-gray-500">
Prospek
</h3>
<p
id="prospekCount"
class="text-3xl font-bold">
0
</p>
</div>

<div class="bg-white p-5 rounded-xl shadow">
<h3 class="text-gray-500">
Ahli Aktif
</h3>
<p
id="aktifCount"
class="text-3xl font-bold">
0
</p>
</div>

<div class="bg-white p-5 rounded-xl shadow">
<h3 class="text-gray-500">
Keahlian Tamat
</h3>
<p
id="expiredCount"
class="text-3xl font-bold">
0
</p>
</div>

<div class="bg-white p-5 rounded-xl shadow">
<h3 class="text-gray-500">
Wasiat Diluluskan
</h3>
<p
id="approvedCount"
class="text-3xl font-bold">
0
</p>
</div>

<div class="bg-white p-5 rounded-xl shadow">
<h3 class="text-gray-500">
Renewal
</h3>
<p
id="renewalCount"
class="text-3xl font-bold">
0
</p>
</div>

</div>
  
<div
id="customerList"
class="space-y-4">

<p class="text-gray-500">
Memuatkan data...
</p>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
getDoc,
doc,
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  
const firebaseConfig = {

apiKey:
"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:
"alqawthar-mywaris.firebaseapp.com",

projectId:
"alqawthar-mywaris",

storageBucket:
"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:
"3498810778",

appId:
"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);

async function loadKPI(){

const usersSnap =
await getDocs(
collection(db,"users")
);

let prospek = 0;
let aktif = 0;
let tamat = 0;
let approved = 0;
let renewal = 0;

for(const userDoc of usersSnap.docs){

const user =
userDoc.data();

if(
user.paymentStatus !== "paid"
){

prospek++;

}
else{

aktif++;

}

if(user.memberSince){

renewal++;

}

const wasiatSnap =
await getDoc(
doc(
db,
"users",
userDoc.id,
"wasiat",
"maklumat"
)
);

if(wasiatSnap.exists()){

const wasiat =
wasiatSnap.data();

if(wasiat.docRef){

approved++;

}

if(wasiat.expiryDate){

const expiry =
new Date(
wasiat.expiryDate
);

if(expiry < new Date()){

tamat++;

}

}

}

}

document.getElementById(
"prospekCount"
).innerHTML =
prospek;

document.getElementById(
"aktifCount"
).innerHTML =
aktif;

document.getElementById(
"expiredCount"
).innerHTML =
tamat;

document.getElementById(
"approvedCount"
).innerHTML =
approved;

document.getElementById(
"renewalCount"
).innerHTML =
renewal;

}
  
onAuthStateChanged(auth, async(user)=>{

  if(!user){

    window.location.href =
    "login.html";

    return;

  }

  const userDoc =
  await getDoc(
    doc(
      db,
      "users",
      user.uid
    )
  );

  const userData =
  userDoc.data();

  if(userData.role !== "admin"){

    alert(
      "Akses ditolak"
    );

    window.location.href =
    "dashboard.html";

 return;
    
  }

// LOAD CUSTOMERS
const snapshot =
await getDocs(
collection(db,"users")
);

let html = "";

snapshot.forEach((doc)=>{

const user =
doc.data();

html += `

<a
href="customer-details.html?id=${doc.id}"
class="block bg-white p-5 rounded-2xl shadow hover:shadow-lg transition">

<div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">

<div>

<h3 class="font-bold text-lg">
${user.nama || "-"}
</h3>

<p class="text-gray-500 text-sm">
${user.email || "-"}
</p>

<div class="mt-4 grid grid-cols-1 sm:grid-cols-3 gap-3">

<div class="bg-gray-100 p-3 rounded-xl">

<p class="text-xs text-gray-500">
e-Wasiat
</p>

<p class="font-semibold">
${user.paymentStatus === "paid"
? "PAID"
: "UNPAID"}
</p>

</div>

<div class="bg-gray-100 p-3 rounded-xl">

<p class="text-xs text-gray-500">
Hibah
</p>

<p class="font-semibold">
${user.hibahPaymentStatus === "paid"
? "PAID"
: "UNPAID"}
</p>

</div>

<div class="bg-gray-100 p-3 rounded-xl">

<p class="text-xs text-gray-500">
Harta Sepencarian
</p>

<p class="font-semibold">
${user.pusakaPaymentStatus === "paid"
? "PAID"
: "UNPAID"}
</p>

</div>

</div>

</div>

<div class="md:text-right">

<p class="text-sm text-gray-500">
Telefon
</p>

<p class="font-semibold">
${user.telefon || "-"}
</p>

</div>

</div>

</a>

`;

});

document.getElementById(
"customerList"
).innerHTML = html;
  
});



// LOGOUT
document
.getElementById("logoutBtn")
.addEventListener("click", async()=>{

await signOut(auth);

window.location.href =
"index.html";

});

loadKPI();
  
</script>

</body>
</html>
