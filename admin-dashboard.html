<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Admin Dashboard
</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800&display=swap"
rel="stylesheet">

</head>

<body
class="bg-gray-100 min-h-screen"
style="font-family: Inter, sans-serif;">

<!-- HEADER -->
<div class="bg-[#153638] text-white p-5 shadow">

<div class="flex justify-between items-center">

<div>

<h1 class="text-2xl font-bold">
Admin Dashboard
</h1>

<p class="text-gray-200">
Al-Qawthar Mawaris Synergy
</p>

</div>

<button
id="logoutBtn"
class="bg-red-500 px-4 py-2 rounded-xl">

Logout

</button>
  
</div>

</div>
  
  
<!-- CONTENT -->
<div class="p-5">

<div class="flex flex-wrap gap-3 mb-6">

<button
id="aqmBtn"
class="w-32 bg-[#153638] hover:bg-[#1d4a4d] transition text-white py-3 rounded-xl font-semibold">
  
AQM

</button>

<button
id="aqcBtn"
class="w-32 bg-[#153638] hover:bg-[#1d4a4d] transition text-white py-3 rounded-xl font-semibold">

AQC

</button>

<button
id="accountBtn"
class="w-32 bg-[#153638] hover:bg-[#1d4a4d] transition text-white py-3 rounded-xl font-semibold">
  
Akaun

</button>

<button
id="auditBtn"
class="w-32 bg-[#153638] hover:bg-[#1d4a4d] transition text-white py-3 rounded-xl font-semibold">
  
Audit

</button>


</div>
  


<div
id="kpiCards"
class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">

 

<div class="bg-white p-5 rounded-xl shadow">
<h3 class="text-gray-500">
Prospek
</h3>
<p
id="prospekCount"
class="text-3xl font-bold">
0
</p>
</div>

<div class="bg-white p-5 rounded-xl shadow">
<h3 class="text-gray-500">
Ahli Aktif
</h3>
<p
id="aktifCount"
class="text-3xl font-bold">
0
</p>
</div>

<div class="bg-white p-5 rounded-xl shadow">
<h3 class="text-gray-500">
Keahlian Tamat
</h3>
<p
id="expiredCount"
class="text-3xl font-bold">
0
</p>
</div>

<div class="bg-white p-5 rounded-xl shadow">
<h3 class="text-gray-500">
Wasiat Diluluskan
</h3>
<p
id="approvedCount"
class="text-3xl font-bold">
0
</p>
</div>

<div class="bg-white p-5 rounded-xl shadow">
<h3 class="text-gray-500">
Renewal
</h3>
<p
id="renewalCount"
class="text-3xl font-bold">
0
</p>
</div>

</div>
  



<div
id="sectionTitle"
class="hidden">

<h2
class="text-2xl font-bold mb-4">

Pelanggan (AQM)

</h2>

<input
id="searchInput"
type="text"
placeholder="Cari nama, email, no AQM, referral atau tarikh daftar..."
class="w-full p-4 rounded-xl border border-gray-300 mb-4">

</div>

<div
id="listContainer"
class="hidden overflow-x-auto">

<table class="w-full bg-white rounded-xl overflow-hidden">

<thead class="bg-[#153638] text-white">

<tr>
  
<th class="p-3 text-center">Bil</th>
<th class="p-3 text-left">Tarikh Daftar</th>
<th class="p-3 text-left">No AQM</th>
<th class="p-3 text-left">Nama</th>
<th class="p-3 text-left">Email</th>
<th class="p-3 text-left">Referral</th>
<th class="p-3 text-center">Status</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>
  
<script type="module">


  
import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
getDoc,
doc,
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  
const firebaseConfig = {

apiKey:
"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:
"alqawthar-mywaris.firebaseapp.com",

projectId:
"alqawthar-mywaris",

storageBucket:
"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:
"3498810778",

appId:
"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);

async function loadKPI(){

const usersSnap =
await getDocs(
collection(db,"users")
);

let prospek = 0;
let aktif = 0;
let tamat = 0;
let approved = 0;
let renewal = 0;

for(const userDoc of usersSnap.docs){

const user =
userDoc.data();

if(user.role === "admin"){
continue;
}
  
if(
user.paymentStatus !== "paid"
){

prospek++;

}
else{

aktif++;

}



const wasiatSnap =
await getDoc(
doc(
db,
"users",
userDoc.id,
"wasiat",
"maklumat"
)
);

if(wasiatSnap.exists()){

const wasiat =
wasiatSnap.data();

if(wasiat.docRef){

approved++;

}

if(wasiat.renewedAt){

renewal++;

}

  
if(wasiat.expiryDate){

const expiry =
new Date(
wasiat.expiryDate
);

if(expiry < new Date()){

tamat++;

}

}

}

}

document.getElementById(
"prospekCount"
).innerHTML =
prospek;

document.getElementById(
"aktifCount"
).innerHTML =
aktif;

document.getElementById(
"expiredCount"
).innerHTML =
tamat;

document.getElementById(
"approvedCount"
).innerHTML =
approved;

document.getElementById(
"renewalCount"
).innerHTML =
renewal;

}
  
onAuthStateChanged(auth, async(user)=>{

  if(!user){

    window.location.href =
    "login.html";

    return;

  }

  const userDoc =
  await getDoc(
    doc(
      db,
      "users",
      user.uid
    )
  );

  const userData =
  userDoc.data();

  if(userData.role !== "admin"){

    alert(
      "Akses ditolak"
    );

    window.location.href =
    "dashboard.html";

 return;
    
  }

// LOAD CUSTOMERS
const snapshot =
await getDocs(
collection(db,"users")
);

let html = "";

window.customerHTML = "";

let allCustomers = [];

const users =
snapshot.docs;

users.sort((a,b)=>{

const dateA =
a.data().createdAt?.toDate() || new Date(0);

const dateB =
b.data().createdAt?.toDate() || new Date(0);

return dateB - dateA;

});

let bil = 1;

users.forEach((doc)=>{

const user = doc.data();

if(user.role === "admin"){
return;
}

const memberNo = user.memberNo || "-";

const status =
user.paymentStatus === "paid"
? "AHLI AKTIF"
: "PROSPEK";

let registerDate = "-";

if(user.createdAt){

registerDate =
user.createdAt
.toDate()
.toLocaleDateString("ms-MY");

}
  
html += `

<tr
class="border-b hover:bg-gray-50 cursor-pointer"
onclick="window.location='customer-details.html?id=${doc.id}'">

<td class="p-3">
${bil++}
</td>


<td class="p-3">

${registerDate}

</td>

<td class="p-3">

${memberNo}

</td>

<td class="p-3 font-semibold">

${user.nama || "-"}

</td>

<td class="p-3">

${user.email || "-"}

</td>

<td class="p-3">

${user.referral || "-"}

</td>

<td class="p-3 text-center">

<span
class="
px-3 py-1 rounded-full text-xs
${user.paymentStatus==="paid"
? "bg-green-100 text-green-700"
: "bg-yellow-100 text-yellow-700"}">

${status}

</span>

</td>

</tr>

`;
  
});

document.getElementById(
"tableBody"
).innerHTML = html;

window.allCustomers =
allCustomers;  
  
});



// LOGOUT
document
.getElementById("logoutBtn")
.addEventListener("click", async()=>{

await signOut(auth);

window.location.href =
"index.html";

});

document
.getElementById("aqmBtn")
.addEventListener("click", ()=>{

document
.getElementById("sectionTitle")
.classList.remove("hidden");

document
.getElementById("listContainer")
.classList.remove("hidden");

});

document
.getElementById("aqcBtn")
.addEventListener("click",()=>{

window.location.href =
"admin-aqc.html";

});

document
.getElementById("accountBtn")
.addEventListener("click",()=>{

window.location.href =
"accounts-dashboard.html";

});
  
document
.getElementById("searchInput")
.addEventListener("keyup",(e)=>{

const keyword =
e.target.value.toLowerCase();

const rows =
document.querySelectorAll(
"#tableBody tr"
);

rows.forEach((row)=>{

const text =
row.innerText.toLowerCase();

if(text.includes(keyword)){

row.style.display = "";

}
else{

row.style.display = "none";

}

});

});
  
loadKPI();
  
</script>

</body>
</html>
