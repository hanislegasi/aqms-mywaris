<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Admin Dashboard
</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800&display=swap"
rel="stylesheet">

</head>

<body
class="bg-gray-100 min-h-screen"
style="font-family: Inter, sans-serif;">

<!-- HEADER -->
<div class="bg-[#153638] text-white p-5 shadow">

<h1 class="text-2xl font-bold">
Admin Dashboard
</h1>

<p class="text-gray-200">
Al-Qawthar Mawaris Synergy
</p>

</div>

<!-- CONTENT -->
<div class="p-5">

<h2 class="text-xl font-bold mb-5">
Senarai Pelanggan
</h2>

<div
id="customerList"
class="space-y-4">

<p class="text-gray-500">
Memuatkan data...
</p>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:
"alqawthar-mywaris.firebaseapp.com",

projectId:
"alqawthar-mywaris",

storageBucket:
"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:
"3498810778",

appId:
"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

// LOAD CUSTOMERS
const snapshot =
await getDocs(
collection(db,"users")
);

let html = "";

snapshot.forEach((doc)=>{

const user =
doc.data();

html += `

<div class="bg-white p-5 rounded-2xl shadow">

<div class="flex justify-between items-center">

<div>

<h3 class="font-bold text-lg">
${user.nama || "-"}
</h3>

<p class="text-gray-500 text-sm">
${user.email || "-"}
</p>

</div>

<div class="text-right">

<p class="text-sm text-gray-500">
Telefon
</p>

<p class="font-semibold">
${user.telefon || "-"}
</p>

</div>

</div>

</div>

`;

});

document.getElementById(
"customerList"
).innerHTML = html;

</script>

</body>
</html>
