<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Akaun</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

<h2 class="text-2xl font-bold mb-6 text-center">
Daftar Akaun
</h2>

<select
id="accountType"
class="w-full border p-4 rounded-xl mb-4">

<option value="customer">
Pelanggan (AQM)
</option>

<option value="consultant">
Konsultan (AQC)
</option>

</select>
  
<form id="registerForm" class="space-y-4">

<input
id="nama"
type="text"
placeholder="Nama Penuh"
class="w-full border p-3 rounded-lg"
required>

<input
id="ic"
type="text"
placeholder="No IC"
class="w-full border p-3 rounded-lg"
required>

<input
id="email"
type="email"
placeholder="Email"
class="w-full border p-3 rounded-lg"
required>

<input
id="telefon"
type="text"
placeholder="Telefon"
class="w-full border p-3 rounded-lg"
required>

<input
id="password"
type="password"
placeholder="Password"
class="w-full border p-3 rounded-lg"
required>

<input
id="referral"
type="text"
placeholder="Kod Referral AQC"
class="w-full border p-3 rounded-lg"
required>

<p
id="referralName"
class="text-sm text-green-600">
</p>

<button
type="submit"
class="w-full bg-[#153638] text-white py-3 rounded-lg font-bold">
Daftar Akaun
</button>

</form>

<div class="text-center mt-4">
<a href="login.html" class="text-blue-600">
Sudah ada akaun?
</a>
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
updateDoc,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
  authDomain: "alqawthar-mywaris.firebaseapp.com",
  projectId: "alqawthar-mywaris",
  storageBucket: "alqawthar-mywaris.firebasestorage.app",
  messagingSenderId: "3498810778",
  appId: "1:3498810778:web:ee36e0fe42f76698046e23"
};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

const params =
new URLSearchParams(
window.location.search
);

const ref =
params.get("ref");

if(ref){

document.getElementById(
"referral"
).value = ref;

document.getElementById(
"referral"
).readOnly = true;

}

document
.getElementById("referral")
.addEventListener("blur", async()=>{

const referral =
document
.getElementById("referral")
.value
.trim();

if(!referral) return;

const usersSnap =
await getDocs(
collection(db,"consultants")
);

let sponsor = null;

usersSnap.forEach((d)=>{

const u = d.data();

if(
u.consultantNo === referral
){

sponsor = u.nama;

}

});

document
.getElementById("referralName")
.innerHTML =

sponsor
? "✓ " + sponsor
: "❌ No Konsultan tidak sah";

});
  
 document
.getElementById("registerForm")
.addEventListener("submit", async (e)=>{

e.preventDefault();

const nama =
document.getElementById("nama").value;

const ic =
document.getElementById("ic").value;

const email =
document.getElementById("email").value;

const telefon =
document.getElementById("telefon").value;

const password =
document.getElementById("password").value;

const referral =
document.getElementById("referral").value;

if(!referral){

alert(
"Sila masukkan Kod Referral"
);

return;

}

const usersSnap =
await getDocs(
collection(db,"consultants")
);

let validReferral = false;

usersSnap.forEach((d)=>{

const u = d.data();

if(
u.consultantNo === referral
){

validReferral = true;

}

});

if(!validReferral){

alert(
"Referral tidak sah"
);

return;

}  

const accountType =
document.getElementById("accountType").value;
  
try{

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const uid =
userCredential.user.uid;

  
await setDoc(
doc(db,"users",uid),
{
nama,
ic,
email,
telefon,
referral,
accountType,



  
role:"customer",

leadStatus:"REGISTERED",

paymentStatus:"unpaid",

memberNo:null,

createdAt:new Date()
}
);


  
if(
accountType === "consultant"
){

window.location.href =
"consultant-registration.html";

}
else{

window.location.href =
"login.html";

}

}
catch(error){

alert(error.message);

}

}); 

  
</script>
  
</body>
</html>
