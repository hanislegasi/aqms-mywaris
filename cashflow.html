import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
getDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:"alqawthar-mywaris.firebaseapp.com",

projectId:"alqawthar-mywaris",

storageBucket:"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:"3498810778",

appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const settingsSnap =
await getDoc(
doc(db,"settings","company")
);

const settings =
settingsSnap.data();

const companyName =
settings?.companyName || "";

const registrationNo =
settings?.registrationNo || "";

const financialYearEnd =
settings?.financialYearEnd || "";

const openingBank =
Number(
settings?.openingBankBalance || 0
);

const snap =
await getDocs(
collection(db,"ledger")
);

let sales = 0;

let commission = 0;

let override = 0;

let bank = 0;

let sales = 0;
let commission = 0;
let override = 0;
let bank = 0;

snap.forEach((d)=>{

const row = d.data();

if(
row.accountCode === "4000" ||
row.accountCode === "4100" ||
row.accountCode === "4200"
){

sales +=
Number(row.credit || 0);

}

if(row.accountCode === "5000"){

commission +=
Number(row.debit || 0);

}

if(row.accountCode === "5100"){

override +=
Number(row.debit || 0);

}

if(row.accountCode === "1000"){

bank +=
Number(row.debit || 0);

bank -=
Number(row.credit || 0);

}

});

if(
row.accountCode === "4000" ||
row.accountCode === "4100" ||
row.accountCode === "4200"
){

sales += Number(row.credit || 0);

}

if(row.accountCode === "5000"){

commission += Number(row.debit || 0);

}

if(row.accountCode === "5100"){

override += Number(row.debit || 0);

}

if(row.accountCode === "1000"){

bank += Number(row.debit || 0);
bank -= Number(row.credit || 0);

}

const openingBank =
Number(
settings?.openingBankBalance || 0
);

const operatingCashFlow =
sales -
commission -
override;

const closingBank =
openingBank +
operatingCashFlow;

<div class="text-center border-b pb-5 mb-6">

<h1 class="text-3xl font-bold">
${companyName}
</h1>

<p>
STATEMENT OF CASH FLOWS
</p>

<p>
For The Period Ended
${financialYearEnd}
</p>

</div>

<table class="w-full">

OPERATING ACTIVITIES

</td>

</tr>

<tr>

<td>

</td>

<td class="text-right">
RM${sales.toFixed(2)}
</td>

</tr>

<tr>

<td>
Consultant Commission Paid
</td>

<td class="text-right">
(RM${commission.toFixed(2)})
</td>

</tr>

<tr>

<td>
Consultant Override Paid
</td>

<td class="text-right">
(RM${override.toFixed(2)})
</td>

</tr>

<tr class="font-bold border-t">

<td>
Net Cash From Operating Activities
</td>

<td class="text-right">
RM${operatingCashFlow.toFixed(2)}
</td>

</tr>

<tr>
<td colspan="2" class="py-4"></td>
</tr>

<tr>

<td>
Opening Bank Balance
</td>

<td class="text-right">
RM${openingBank.toFixed(2)}
</td>

</tr>

<tr>

<td>
Closing Bank Balance
</td>

<td class="text-right">
RM${closingBank.toFixed(2)}
</td>

</tr>

</table>

document.getElementById(

).innerHTML = `

});
