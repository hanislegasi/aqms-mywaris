<!DOCTYPE html>
<html lang="ms">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Harta Sepencarian | MyWaris</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <!-- HEADER -->
  <div class="bg-[#153638] text-white p-5 shadow">

    <h1 class="text-2xl font-bold">
      Harta Sepencarian
    </h1>

    <p class="text-gray-200">
      Lengkapkan maklumat tuntutan harta sepencarian
    </p>

  </div>

  <!-- FORM -->
  <div class="max-w-3xl mx-auto p-5">

    <form
      id="pusakaForm"
      class="bg-white p-6 rounded-2xl shadow space-y-6">

     <!-- MAKLUMAT SUAMI -->
<div>

  <label class="block font-semibold mb-2">
    Nama Suami
  </label>

  <input
    id="namaSuami"
    type="text"
    placeholder="Nama Suami"
    class="w-full border border-gray-200 p-4 rounded-xl"
    required>

</div>

<!-- MAKLUMAT ISTERI -->
<div>

  <label class="block font-semibold mb-2">
    Nama Isteri
  </label>

  <input
    id="namaIsteri"
    type="text"
    placeholder="Nama Isteri"
    class="w-full border border-gray-200 p-4 rounded-xl"
    required>

</div>

<!-- STATUS PERKAHWINAN -->
<div>

  <label class="block font-semibold mb-2">
    Status Perkahwinan
  </label>

  <input
    id="statusPerkahwinan"
    type="text"
    placeholder="Contoh: Masih Berkahwin / Dalam Perceraian"
    class="w-full border border-gray-200 p-4 rounded-xl">

</div>

<!-- SENARAI HARTA -->
<div>

  <label class="block font-semibold mb-2">
    Senarai Harta
  </label>

  <textarea
    id="senaraiHarta"
    placeholder="Nyatakan semua harta berkaitan"
    class="w-full border border-gray-200 p-4 rounded-xl h-32"></textarea>

</div>

<!-- SUMBANGAN SUAMI -->
<div>

  <label class="block font-semibold mb-2">
    Sumbangan Suami
  </label>

  <textarea
    id="sumbanganSuami"
    placeholder="Nyatakan sumbangan suami"
    class="w-full border border-gray-200 p-4 rounded-xl h-32"></textarea>

</div>

<!-- SUMBANGAN ISTERI -->
<div>

  <label class="block font-semibold mb-2">
    Sumbangan Isteri
  </label>

  <textarea
    id="sumbanganIsteri"
    placeholder="Nyatakan sumbangan isteri"
    class="w-full border border-gray-200 p-4 rounded-xl h-32"></textarea>

</div>

<!-- TUNTUTAN -->
<div>

  <label class="block font-semibold mb-2">
    Tuntutan
  </label>

  <textarea
    id="tuntutan"
    placeholder="Nyatakan tuntutan harta sepencarian"
    class="w-full border border-gray-200 p-4 rounded-xl h-32"></textarea>

</div>

<!-- CATATAN -->
<div>

  <label class="block font-semibold mb-2">
    Catatan Tambahan
  </label>

  <textarea
    id="catatan"
    placeholder="Maklumat tambahan"
    class="w-full border border-gray-200 p-4 rounded-xl h-32"></textarea>

</div>
<!-- LAMPIRAN -->
<div class="space-y-3">

  <h2 class="text-xl font-bold text-[#153638]">
    Lampiran Dokumen
  </h2>

  <input
    type="file"
    id="fileInput"
    class="w-full border rounded-lg p-3">

  <button
    type="button"
    id="uploadBtn"
    class="bg-[#153638] hover:bg-[#1d4a4d] transition text-white px-5 py-3 rounded-lg">

    Muat Naik Lampiran

  </button>

  <div
    id="fileList"
    class="space-y-3">
  </div>

</div>
      
      <!-- BUTTON -->
      <div class="space-y-3">

        <button
          type="submit"
          class="w-full bg-[#153638] hover:bg-[#1d4a4d] transition text-white py-3 rounded-lg font-semibold">

          Simpan Maklumat Pusaka

        </button>

        <a
          href="dashboard.html"
          class="block text-center bg-gray-200 hover:bg-gray-300 transition text-gray-700 py-3 rounded-lg font-semibold">

          ← Kembali ke Dashboard

        </a>

<a
  href="preview-pusaka.html"
  class="block text-center bg-[#153638] hover:bg-[#1d4a4d] transition text-white py-3 rounded-lg font-semibold">

  Preview Pusaka →

</a>
        
      </div>

      <!-- STATUS -->
      <p
        id="status"
        class="text-center text-green-600 font-medium">
      </p>

    </form>

  </div>

  <!-- FIREBASE -->
  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      onAuthStateChanged
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      getFirestore,
      doc,
      setDoc,
      getDoc,
      collection,
  addDoc,
  getDocs
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const firebaseConfig = {

      apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

      authDomain: "alqawthar-mywaris.firebaseapp.com",

      projectId: "alqawthar-mywaris",

      storageBucket: "alqawthar-mywaris.firebasestorage.app",

      messagingSenderId: "3498810778",

      appId: "1:3498810778:web:ee36e0fe42f76698046e23"

    };

    const app =
      initializeApp(firebaseConfig);

    const auth =
      getAuth(app);

    const db =
      getFirestore(app);

    const storage =
getStorage(app);

    let currentUser = null;

    // CHECK LOGIN
    onAuthStateChanged(auth, async(user)=>{

      if(!user){

        window.location.href =
          "login.html";

        return;

      }

      currentUser = user;
      loadFiles();

      // LOAD DATA
      const docSnap =
      await getDoc(
        doc(
          db,
          "users",
          currentUser.uid,
          "pusaka",
          "maklumat"
        )
      );

      if(docSnap.exists()){

  const data =
  docSnap.data();

  document.getElementById(
    "namaSuami"
  ).value =
  data.namaSuami || "";

  document.getElementById(
    "namaIsteri"
  ).value =
  data.namaIsteri || "";

  document.getElementById(
    "statusPerkahwinan"
  ).value =
  data.statusPerkahwinan || "";

  document.getElementById(
    "senaraiHarta"
  ).value =
  data.senaraiHarta || "";

  document.getElementById(
    "sumbanganSuami"
  ).value =
  data.sumbanganSuami || "";

  document.getElementById(
    "sumbanganIsteri"
  ).value =
  data.sumbanganIsteri || "";

  document.getElementById(
    "tuntutan"
  ).value =
  data.tuntutan || "";

  document.getElementById(
    "catatan"
  ).value =
  data.catatan || "";

}

    });

// LOAD FILES
async function loadFiles(){

  const snapshot =
  await getDocs(

    collection(
      db,
      "users",
      currentUser.uid,
      "pusakaDocuments"
    )

  );

  let html = "";

  snapshot.forEach((doc)=>{

    const data =
    doc.data();

    html += `
    
    <div class="bg-gray-100 p-4 rounded-xl space-y-3">

      <div class="flex justify-between items-center">

        <p class="text-sm font-medium text-gray-700">
          ${data.fileName}
        </p>

        <a
          href="${data.fileURL}"
          target="_blank"
          class="text-[#153638] font-semibold">

          Buka

        </a>

      </div>

      ${
        data.fileName.endsWith(".pdf")

        ?

        `

        <iframe
          src="${data.fileURL}"
          class="w-full h-96 rounded-lg border">
        </iframe>

        `

        :

        `

        <img
          src="${data.fileURL}"
          class="w-full rounded-lg border">

        `
      }

    </div>
    
    `;

  });

  document.getElementById(
    "fileList"
  ).innerHTML = html;

}
    
// UPLOAD FILE
document
.getElementById("uploadBtn")
.addEventListener("click", async()=>{

  const file =
  document.getElementById("fileInput")
  .files[0];

  if(!file){

    alert("Sila pilih fail.");
    return;

  }

  try{

    const storageRef =
    ref(
      storage,
      "pusaka/" +
      currentUser.uid +
      "/" +
      file.name
    );

    await uploadBytes(
      storageRef,
      file
    );

    const downloadURL =
    await getDownloadURL(
      storageRef
    );

    await addDoc(

      collection(
        db,
        "users",
        currentUser.uid,
        "pusakaDocuments"
      ),

      {

        fileName:
        file.name,

        fileURL:
        downloadURL,

        createdAt:
        new Date()

      }

    );

    loadFiles();

  }

  catch(error){

    console.log(error);

  }

});
    
    // SUBMIT FORM
    document
      .getElementById("pusakaForm")
      .addEventListener("submit", async(e)=>{

        e.preventDefault();

        try{

          await setDoc(

            doc(
              db,
              "users",
              currentUser.uid,
              "pusaka",
              "maklumat"
            ),

            {

namaSuami:
document.getElementById("namaSuami").value,

namaIsteri:
document.getElementById("namaIsteri").value,

statusPerkahwinan:
document.getElementById("statusPerkahwinan").value,

senaraiHarta:
document.getElementById("senaraiHarta").value,

sumbanganSuami:
document.getElementById("sumbanganSuami").value,

sumbanganIsteri:
document.getElementById("sumbanganIsteri").value,

tuntutan:
document.getElementById("tuntutan").value,

catatan:
document.getElementById("catatan").value,

status:
"SUBMITTED"

}

          );

          document.getElementById(
            "status"
          ).innerHTML =

          "Maklumat harta sepencarian berjaya disimpan.";

        }

        catch(error){

          document.getElementById(
            "status"
          ).innerHTML =

          error.message;

        }

      });

  </script>

</body>
</html>
