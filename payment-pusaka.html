<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pembayaran</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-5">

<div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl">

<h1 class="text-3xl font-bold text-[#153638] mb-2">
Harta Sepencarian
</h1>

<p class="text-gray-500 mb-8">
Bayaran Pendaftaran
</p>

<div class="bg-gray-100 rounded-2xl p-5 mb-8">

<div class="flex justify-between mb-3">

<span>
Produk
</span>

<span class="font-semibold">
Harta Sepencarian
</span>

</div>

<div class="flex justify-between">

<span>
Jumlah
</span>

<span class="text-2xl font-bold text-[#153638]">
RM800
</span>

</div>

</div>

<button
id="payBtn"
class="w-full bg-[#153638] hover:bg-[#1d4a4d] transition text-white py-4 rounded-2xl font-semibold">

Bayar Sekarang

</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
updateDoc,
getDoc,
increment,
collection,
getDocs,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const firebaseConfig = {

apiKey: "AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",
authDomain: "alqawthar-mywaris.firebaseapp.com",
projectId: "alqawthar-mywaris",
storageBucket: "alqawthar-mywaris.firebasestorage.app",
messagingSenderId: "3498810778",
appId: "1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

currentUser = user;

});

document
.getElementById("payBtn")
.addEventListener("click", async()=>{

try{

// ambil counter
const counterRef =
doc(
db,
"system",
"counter"
);

const counterSnap =
await getDoc(counterRef);

const currentNo =
counterSnap.data().memberCounter || 0;

const newNo =
currentNo + 1;

// update counter
await updateDoc(
counterRef,
{
memberCounter:
increment(1)
}
);
  
// generate AQM number
const latestCounter =
await getDoc(counterRef);

const memberNo =
"AQM" +
String(
latestCounter.data().memberCounter
).padStart(4,"0");

  



// update user
await updateDoc(

doc(
db,
"users",
currentUser.uid
),

{

pusakaPaymentStatus:"paid",

memberNo,

memberSince:
new Date().toISOString()

}

);

await addDoc(
collection(db,"ledger"),
{

date:new Date(),

account:"Sales - Harta Sepencarian",

category:"income",

description:
memberNo + " " + customer.nama,

debit:0,

credit:800

}
);
  
const customerSnap =
await getDoc(
doc(
db,
"users",
currentUser.uid
)
);

const customer =
customerSnap.data();

const usersSnap =
await getDocs(
collection(db,"users")
);

const allUsers = [];

usersSnap.forEach((d)=>{

allUsers.push({
id:d.id,
...d.data()
});

});

function getOverrideRate(level){

if(level === "AQC") return 0;
if(level === "AQC-AS") return 3;
if(level === "AQC-UM") return 7;
if(level === "MGAM") return 12;

return 0;

}

function findConsultant(no){

return allUsers.find(
u => u.consultantNo === no
);

}

let currentConsultant =
findConsultant(
customer.referral
);

while(currentConsultant){

const upline =
findConsultant(
currentConsultant.upline
);

if(!upline) break;

const diffRate =
Math.max(
0,
getOverrideRate(
upline.consultantLevel
)
-
getOverrideRate(
currentConsultant.consultantLevel
)
);

const overrideAmount =
800 * diffRate / 100;

await updateDoc(
doc(
db,
"users",
upline.id
),
{
totalOverriding:
increment(
overrideAmount
)
}
);

await addDoc(
collection(
db,
"overrideHistory"
),
{

createdAt:
new Date(),

customerNo:
memberNo,

customerName:
customer.nama,

fromConsultant:
currentConsultant.consultantNo,

fromName:
currentConsultant.nama,

fromLevel:
currentConsultant.consultantLevel,

receiver:
upline.consultantNo,

receiverName:
upline.nama,

receiverLevel:
upline.consultantLevel,

sales:800,

diffRate:
diffRate,

override:
overrideAmount

}
);

currentConsultant =
upline;

}
  
alert(
"Pembayaran berjaya"
);

window.location.href =
"dashboard.html";

}

catch(error){

console.log(error);

}

});

</script>

</body>
</html>
