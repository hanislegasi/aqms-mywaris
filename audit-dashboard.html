<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Audit Centre</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="bg-[#153638] text-white p-5">

<h1 class="text-2xl font-bold">

Audit Centre

</h1>

</div>

<div class="max-w-6xl mx-auto p-5">

<a
href="admin-dashboard.html"
class="bg-gray-200 px-5 py-3 rounded-xl inline-block mb-5">

← Dashboard

</a>

<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-5">

<div class="bg-white rounded-xl shadow p-5">

<h2 class="font-bold text-lg">

Trial Balance

</h2>

<p id="tbStatus"
class="mt-3 text-xl font-bold">

Checking...

</p>

</div>

<div class="bg-white rounded-xl shadow p-5">

<h2 class="font-bold text-lg">

Profit & Loss

</h2>

<p id="plStatus"
class="mt-3 text-xl font-bold">

Checking...

</p>

</div>

<div class="bg-white rounded-xl shadow p-5">

<h2 class="font-bold text-lg">

Balance Sheet

</h2>

<p id="bsStatus"
class="mt-3 text-xl font-bold">

Checking...

</p>

</div>

<div class="bg-white rounded-xl shadow p-5">

<h2 class="font-bold text-lg">

Payment Voucher

</h2>

<p id="pvStatus"
class="mt-3 text-xl font-bold">

Checking...

</p>

</div>

<div class="bg-white rounded-xl shadow p-5">

<h2 class="font-bold text-lg">

Audit Score

</h2>

<p id="auditScore"
class="mt-3 text-3xl font-bold text-green-600">

100%

</p>

</div>

</div>

<button
id="runAudit"
class="mt-8 bg-[#153638] text-white px-6 py-3 rounded-xl">

Run Audit

</button>

</div>

<script type="module">  

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import{
getFirestore,
collection,
getDocs
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  
const firebaseConfig = {

apiKey:"AIzaSyCR3hpOyMowg4yLMxBw3Iu3QkepGvSE0MU",

authDomain:"alqawthar-mywaris.firebaseapp.com",

projectId:"alqawthar-mywaris",

storageBucket:"alqawthar-mywaris.firebasestorage.app",

messagingSenderId:"3498810778",

appId:"1:3498810778:web:ee36e0fe42f76698046e23"

};

const app =
initializeApp(firebaseConfig);

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  
const db =
getFirestore(app);

const auth =
getAuth(app);  

async function runAudit(){

const snap =
await getDocs(
collection(db,"ledger")
);

let debit=0;
let credit=0;

snap.forEach(d=>{

const row=d.data();

debit+=Number(row.debit||0);
credit+=Number(row.credit||0);

});

document.getElementById("tbStatus").innerHTML=

Math.abs(debit-credit)<0.01

?

"✅ Balanced"

:

"❌ Not Balanced";


const pv =
await getDocs(
collection(db,"paymentVouchers")
);

let pending=0;

pv.forEach(d=>{

if(d.data().status=="PENDING"){

pending++;

}

});

document.getElementById("pvStatus").innerHTML=

pending==0

?

"✅ No Pending"

:

pending+" Pending";


document.getElementById("plStatus").innerHTML=
"✅ Verified";

document.getElementById("bsStatus").innerHTML=
"✅ Verified";


let score=100;

if(Math.abs(debit-credit)>0.01){

score-=40;

}

if(pending>0){

score-=10;

}

document.getElementById("auditScore").innerHTML=
score+"%";

}

document
.getElementById("runAudit")
.addEventListener("click", async()=>{

const btn =
document.getElementById("runAudit");

btn.disabled = true;
btn.innerHTML = "Running...";

await runAudit();

btn.innerHTML = "Run Audit";
btn.disabled = false;

});

runAudit();
  

</script>

</body>
</html>
